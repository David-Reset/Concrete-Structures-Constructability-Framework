<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constructability Framework — RC Design Guidance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1a; --surface: #111827; --surface-light: #1a2234;
    --border: #2a3548; --text: #e2e8f0; --text-muted: #8899aa;
    --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
    --red: #ef4444; --orange: #f97316; --yellow: #eab308; --green: #22c55e;
    --red-bg: rgba(239,68,68,0.12); --orange-bg: rgba(249,115,22,0.12);
    --yellow-bg: rgba(234,179,8,0.1); --green-bg: rgba(34,197,94,0.1);
    --link: #60a5fa; --link-hover: #93c5fd; --img-bg: #1e2a3a;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg: #f4f6fb; --surface: #ffffff; --surface-light: #eef2f8;
    --border: #d3dbe8; --text: #1c2430; --text-muted: #5a6678;
    --accent: #2563eb; --accent-glow: rgba(37,99,235,0.10);
    --red: #dc2626; --orange: #ea580c; --yellow: #b45309; --green: #16a34a;
    --red-bg: rgba(220,38,38,0.10); --orange-bg: rgba(234,88,12,0.10);
    --yellow-bg: rgba(180,83,9,0.10); --green-bg: rgba(22,163,74,0.10);
    --link: #2563eb; --link-hover: #1d4ed8; --img-bg: #e2e8f0;
    color-scheme: light;
  }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif; min-height:100vh; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation:fadeIn 0.3s ease; }
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
  .header-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
  .header-sub{font-size:11px;color:var(--text-muted)}

  .breadcrumb{padding:10px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;background:var(--surface)}
  .breadcrumb-link{color:var(--accent);cursor:pointer} .breadcrumb-link:hover{text-decoration:underline}
  .breadcrumb-sep{color:var(--text-muted)} .breadcrumb-current{color:var(--text)}

  .content{padding:28px 32px;max-width:900px;margin:0 auto}
  .section-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
  .section-desc{font-size:14px;color:var(--text-muted);line-height:1.6;max-width:600px}

  .dim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-top:24px}
  .dim-card{padding:20px 22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s}
  .dim-card:hover{border-color:var(--accent);background:var(--surface-light)}
  .dim-icon{font-size:26px;margin-bottom:10px} .dim-name{font-size:15px;font-weight:700;margin-bottom:6px}
  .dim-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:12px}
  .dim-count{font-size:11px;color:var(--accent);font-weight:600}

  .back-link{font-size:12px;color:var(--accent);cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
  .back-link:hover{text-decoration:underline}
  .dim-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .dim-header-icon{font-size:30px} .dim-header-title{font-size:24px;font-weight:800;letter-spacing:-0.5px}

  .item-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .item-row{padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:space-between;transition:all 0.2s}
  .item-row.available{cursor:pointer} .item-row.available:hover{border-color:var(--accent);background:var(--surface-light)}
  .item-row.unavailable{opacity:0.45}
  .item-name{font-size:14px;font-weight:600} .item-meta{font-size:11px;color:var(--text-muted);margin-top:4px}
  .item-arrow{color:var(--accent);font-size:18px}
  .item-coming{font-size:10px;color:var(--text-muted);padding:4px 10px;background:var(--surface-light);border-radius:4px;border:1px solid var(--border)}

  .entry-title{font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:6px}
  .entry-meta{font-size:12px;color:var(--text-muted);margin-bottom:24px}
  .question-box{padding:20px 24px;background:var(--accent-glow);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;margin-bottom:28px}
  .decision-path{padding:14px 18px;background:var(--accent-glow);border:1px solid var(--accent);border-radius:8px;margin-bottom:24px}
  .decision-path .dp-label{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
  .decision-path .dp-label svg{width:13px;height:13px;flex-shrink:0}
  .decision-path .dp-text{font-size:13px;color:var(--text);line-height:1.6}
  .decision-path .dp-routes{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .decision-path .dp-route{font-size:13px;color:var(--text);line-height:1.5}
  .decision-path .dp-cue{color:var(--text-muted)}
  .decision-path .dp-link{color:var(--accent);cursor:pointer;font-weight:600}
  .decision-path .dp-link:hover{text-decoration:underline}
  .label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
  .img-hint{font-size:11px;color:var(--text-muted);opacity:0.75;margin:-2px 0 10px;display:flex;align-items:center;gap:5px}
  .img-hint svg{width:12px;height:12px;fill:var(--text-muted);flex-shrink:0}
  .label-accent{color:var(--accent)}
  .question-text{font-size:15px;color:var(--text);line-height:1.6}
  .param-box{padding:14px 18px;background:var(--surface-light);border:1px solid var(--border);border-radius:8px;margin-bottom:28px}
  .param-value{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);margin-top:4px}
  .consideration-text{font-size:14px;color:var(--text);line-height:1.7;opacity:0.9;margin-bottom:28px}

  .threshold-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
  .threshold-band{display:flex;gap:16px;padding:14px 18px;border-radius:8px;align-items:flex-start}
  .threshold-range{width:125px;min-width:125px;max-width:125px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;padding-top:1px;line-height:1.35;white-space:normal;overflow-wrap:break-word}
  .threshold-rating{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .threshold-guidance{font-size:13px;color:var(--text);line-height:1.6;margin-top:4px;opacity:0.85}

  .alt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:28px}
  .alt-item{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;background:var(--surface-light);border-radius:6px;border:1px solid var(--border)}
  .alt-num{width:22px;height:22px;border-radius:50%;background:rgba(59,130,246,0.15);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
  .alt-text{font-size:13px;color:var(--text);opacity:0.9;line-height:1.6}
  .alt-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
  .alt-desc{font-size:13px;color:var(--text);opacity:0.85;line-height:1.6}

  .applicability-box{margin-top:28px;margin-bottom:28px;padding:14px 18px;background:var(--yellow-bg);border:1px solid rgba(234,179,8,0.28);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0}
  .applicability-text{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;margin-bottom:12px}
  .applicability-list{display:flex;flex-direction:column;gap:8px}
  .applicability-item{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9}
  .applicability-item strong{color:var(--text)}
  .applicability-item ul{padding-left:22px;margin:8px 0}
  .applicability-item li{margin-bottom:6px}

  .worked-example-box{margin-top:8px;margin-bottom:28px;padding:18px 22px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.25);border-left:3px solid var(--accent);border-radius:0 8px 8px 0}
  .worked-example-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
  .worked-example-caveat{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.55;margin-bottom:14px}
  .worked-example-headline{font-size:14px;font-weight:600;color:var(--text);line-height:1.6;margin-bottom:14px}
  .worked-example-table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:13px}
  .worked-example-table th{text-align:left;padding:8px 10px;background:var(--surface-light);border:1px solid var(--border);color:var(--text);font-weight:700;font-size:12px}
  .worked-example-table td{padding:8px 10px;border:1px solid var(--border);color:var(--text);opacity:0.9}
  .soffit-sheet-bracing-table th.we-col-green,
  .soffit-sheet-bracing-table td.we-col-green{border-left:1px solid rgba(34,197,94,0.45);border-right:1px solid rgba(34,197,94,0.45)}
  .soffit-sheet-bracing-table th.we-col-green{box-shadow:inset 0 3px 0 var(--green)}
  .soffit-sheet-bracing-table th.we-col-yellow,
  .soffit-sheet-bracing-table td.we-col-yellow{border-left:1px solid rgba(234,179,8,0.45);border-right:1px solid rgba(234,179,8,0.45)}
  .soffit-sheet-bracing-table th.we-col-yellow{box-shadow:inset 0 3px 0 var(--yellow)}
  .soffit-sheet-bracing-table th.we-col-orange,
  .soffit-sheet-bracing-table td.we-col-orange{border-left:1px solid rgba(249,115,22,0.48);border-right:1px solid rgba(249,115,22,0.48)}
  .soffit-sheet-bracing-table th.we-col-orange{box-shadow:inset 0 3px 0 var(--orange)}
  .worked-example-table-cap{font-size:12px;font-weight:700;color:var(--text);margin:16px 0 4px;opacity:0.85}
  .worked-example-figure{margin:16px 0 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .worked-example-figure img{display:block;width:100%;max-height:420px;object-fit:contain;background:#fff;cursor:pointer}
  .worked-example-figure figcaption{padding:12px 14px;background:var(--surface-light);border-top:1px solid var(--border);font-size:12.5px;color:var(--text);line-height:1.6;opacity:0.88}
  .worked-example-figure figcaption strong{display:block;color:var(--text);font-weight:700;margin-bottom:3px;opacity:1}
  .worked-example-howto{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;margin-bottom:4px}
  .worked-example-howto strong{color:var(--text);opacity:1}
  .worked-example-howto em{color:var(--text-muted);font-style:italic}
  .worked-example-howto ul{padding-left:22px;margin:8px 0;list-style:disc}
  .worked-example-howto li{margin-bottom:6px;line-height:1.6}
  .worked-example-assumptions{margin-top:16px;padding-top:14px;border-top:1px solid rgba(59,130,246,0.18)}
  .worked-example-assumptions-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .worked-example-assumptions ul{padding-left:20px;margin:6px 0;list-style:disc}
  .worked-example-assumptions li{font-size:12px;color:var(--text);line-height:1.55;opacity:0.75;margin-bottom:4px}
  .worked-example-assumptions-note{font-size:12px;color:var(--text-muted);line-height:1.55;margin-top:8px;font-style:italic}

  .evidence-box{padding:14px 18px;background:var(--surface-light);border-radius:8px;border:1px solid var(--border)}
  .evidence-text{font-size:13px;color:var(--text);line-height:1.6;opacity:0.8}
  .evidence-text ul,.applicability-text ul,.consideration-text ul,.alt-desc ul{padding-left:22px;margin:8px 0}
  .evidence-text li,.applicability-text li,.consideration-text li,.alt-desc li{margin-bottom:6px}

  .related-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;margin-bottom:28px}
  .related-card{display:block;text-align:left;width:100%;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.2s}
  .related-card:hover{border-color:var(--accent);background:var(--surface-light)}
  .related-top{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .related-name-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
  .related-name{font-size:14px;font-weight:600;color:var(--text)}
  .related-dim{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--text-muted);background:var(--surface-light);border:1px solid var(--border);border-radius:4px;padding:2px 8px;letter-spacing:0.3px}
  .related-dim span.ico{font-size:11px;line-height:1}
  .related-arrow{color:var(--accent);font-size:18px;flex-shrink:0}
  .related-note{font-size:12px;color:var(--text);line-height:1.6;opacity:0.8;margin-top:8px}

  .date-stamp{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:24px}
  .date-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
  .date-value{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);margin-top:2px}

  .comments-section{margin-top:28px}
  .comment-card{padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
  .comment-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .comment-by{font-size:13px;font-weight:700;color:var(--text)}
  .comment-role{font-size:11px;color:var(--accent);font-weight:600}
  .comment-verified{font-size:10px;font-weight:700;color:var(--green)}
  .comment-flag{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--yellow);text-transform:uppercase;letter-spacing:1px}
  .comment-date{font-size:11px;color:var(--text-muted)}
  .comment-region{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:2px 8px;background:var(--surface-light);border:1px solid var(--border);border-radius:4px}
  .comment-body{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9}
  .comment-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:12px}
  .comment-image-fig{margin:0}
  .comment-image-fig img{width:100%;height:120px;object-fit:cover;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:opacity .15s}
  .comment-image-fig img:hover{opacity:.85}
  .comment-image-cap{font-size:11px;color:var(--text-muted);line-height:1.4;margin-top:4px}

  .entry-actions{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px}
  .entry-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
  .entry-btn:hover{border-color:var(--accent);background:var(--surface-light)}
  .entry-btn .ico{font-size:15px}
  .entry-actions-hint{flex-basis:100%;font-size:11px;color:var(--text-muted);line-height:1.5;margin-top:4px}

  .suggest-banner{margin-top:16px;padding:18px 22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;transition:all 0.2s}
  .suggest-banner:hover{border-color:var(--accent);background:var(--surface-light)}
  .suggest-banner-title{font-size:15px;font-weight:700;color:var(--text)}
  .suggest-banner-sub{font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:3px;max-width:560px}
  .suggest-banner-btn{flex-shrink:0;font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:26px 28px;animation:fadeIn 0.25s ease}
  .modal-title{font-size:19px;font-weight:800;letter-spacing:-0.3px;margin-bottom:14px}
  .modal-dim{font-size:13px;color:var(--text);background:var(--accent-glow);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;margin-bottom:16px;line-height:1.5}
  .modal-body{font-size:13.5px;color:var(--text);line-height:1.65}
  .modal-body p{margin-bottom:12px;opacity:0.92}
  .modal-body ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin:0 0 14px}
  .modal-body li{position:relative;padding-left:20px;opacity:0.92}
  .modal-body li::before{content:'';position:absolute;left:4px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .modal-link{color:var(--accent);cursor:pointer;font-weight:600}
  .modal-link:hover{text-decoration:underline}
  .modal-fineprint{font-size:11.5px;color:var(--text-muted);border-top:1px solid var(--border);padding-top:12px;margin-bottom:0}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  /* related-entries add checklist */
  .ra-intro{font-size:13.5px;color:var(--text);line-height:1.6;margin-bottom:14px}
  .ra-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .ra-selectall{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);cursor:pointer;user-select:none}
  .ra-selectall input{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
  .ra-count{font-size:12px;color:var(--text-muted)}
  .ra-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin:0;max-height:46vh;overflow-y:auto}
  .ra-row{display:flex;gap:11px;align-items:flex-start;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 13px;cursor:pointer;transition:border-color .15s}
  .lp-newrow{margin:10px 0 2px}
  .np-input{width:100%;min-width:0;box-sizing:border-box;margin:2px 0 4px}
  .ra-row:hover{border-color:var(--accent)}
  .ra-row input{margin-top:2px;width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)}
  .ra-text{flex:1;min-width:0}
  .ra-name{display:block;font-size:13.5px;font-weight:700;color:var(--text);line-height:1.35}
  .ra-dim{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);margin-top:3px}
  .ra-note{display:block;font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:6px}
  .entry-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .entry-btn.primary:hover{background:#2f6fd6;border-color:#2f6fd6}
  /* ===== GUIDED TRIAGE ===== */
  .triage-launch{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}
  .triage-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--accent-glow);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;flex-shrink:0}
  .triage-btn:hover{background:var(--accent);color:#fff}
  .triage-btn .ico{font-size:15px;line-height:1}
  .triage-launch-hint{font-size:12px;color:var(--text-muted);line-height:1.5;max-width:420px}
  .triage-progress{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px}
  .triage-q{font-size:16px;font-weight:700;color:var(--text);line-height:1.45;margin-bottom:6px}
  .triage-q-sub{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:4px}

<div id="app"><div class="content" style="text-align:center;padding-top:80px;color:var(--text-muted)">Loading framework...</div></div>
<script>
// ===== STATE =====
let dimensions = [];
let guide = null;
let state = { view:'home', dimId:null, itemId:null, locationFilter:null, evidenceFilter:'all', sharedPreview:null, elementFilter:[], phaseFilter:[], sortMode:'default', sortDir:'desc' };
let searchQuery='';
let searchRegion=null;

// ===== HELPERS =====
function colorVar(c){const m={green:'--green',orange:'--orange',red:'--red',yellow:'--yellow'};return `var(${m[c]||'--green'})`}
function bgVar(c){const m={green:'--green-bg',orange:'--orange-bg',red:'--red-bg',yellow:'--yellow-bg'};return `var(${m[c]||'--green-bg'})`}

function evidenceSupportLevel(d){return d&&d.evidenceSupport&&d.evidenceSupport.level?String(d.evidenceSupport.level).toLowerCase():''}
function evidenceSupportLabel(level){const m={high:'High',medium:'Medium',low:'Low'};return m[level]||''}
function evidenceSupportPill(d){const level=evidenceSupportLevel(d);if(!level)return'';return `<span class="evidence-support-pill ${level}">Evidence support: ${evidenceSupportLabel(level)}</span>`}
function evidenceSupportBox(d){const level=evidenceSupportLevel(d);if(!level)return'';const summary=d.evidenceSupport.summary||'';return `<div class="evidence-support-box"><div class="evidence-support-head"><div class="label" style="margin-bottom:0">Evidence Support</div>${evidenceSupportPill(d)}</div>${summary?`<div class="evidence-support-text">${summary}</div>`:''}</div>`}
function getDim(){return dimensions.find(d=>d.id===state.dimId)}
function getItem(){const dim=getDim();return dim?dim.items.find(it=>it.id===state.itemId)||null:null}
// Stable id helper — must match the slug rule used when ids are authored in data.json.
function slugify(s){return (s||'').toLowerCase().replace(/&/g,' and ').replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')}

// ===== RELATED ENTRIES =====
// Resolves an {id} reference to a live, available entry (or null), searching all dimensions.
function resolveRef(ref){
  for(const dim of dimensions){
    const item=dim.items.find(it=>it.id===ref.id);
    if(item){
      if(!item.available)return null;
      return {dimId:dim.id,id:item.id,name:item.name,dimName:dim.name,dimIcon:dim.icon};
    }
  }
  return null;
}
// Combines links authored on this entry (forward) with links that point AT it
// from any other entry (reverse), so a relationship only needs to be written once.
function getRelatedEntries(curId,curData){
  const out=[],seen=new Set();
  const add=(ref,note)=>{
    const r=resolveRef(ref);
    if(!r)return;
    if(r.id===curId||seen.has(r.id))return;
    seen.add(r.id);
    out.push(Object.assign(r,{note:note||''}));
  };
  (curData.relatedEntries||[]).forEach(ref=>add(ref,ref.note));
  dimensions.forEach(dim=>dim.items.forEach(it=>{
    if(!it.available||!it.data||!it.data.relatedEntries)return;
    it.data.relatedEntries.forEach(ref=>{
      if(ref.id===curId){
        add({id:it.id},ref.note);
      }
    });
  }));
  return out;
}

// Words too common to be useful as search terms.
const SEARCH_STOP=new Set("a an the of to in on for and or with at by is are be do does should i my we you it this that what when where how near not no use using need want can could would there then than into onto over under through via as if it's".split(' '));
// Bridge between the words a searcher types and the words an entry uses. Extend freely.
const SEARCH_SYN={
  rebar:'reinforcement bar',rebars:'reinforcement bar',bars:'bar reinforcement',
  mesh:'mat reinforcement',shutter:'formwork',shuttering:'formwork',form:'formwork',
  boundary:'boundary obstruction fence',fence:'fence obstruction boundary',wall:'wall upturn',
  falling:'fall',fell:'fall',reuse:'cycle reuse repeated',reusing:'cycle reuse repeated',
  pt:'post-tensioned',rc:'reinforced concrete',column:'column vertical',hole:'void opening penetration',
  gap:'clearance gap',spacing:'clearance spacing',pour:'pour placement placing',cure:'curing',
  cracking:'crack cracking',stirrups:'stirrup'
};
// Each meaningful word the user types becomes a "concept" group: the word plus its synonyms.
// An entry "covers" a concept if it matches any word in that group.
function searchConcepts(q){
  const raw=(q||'').toLowerCase().match(/[a-z0-9][a-z0-9\-]*/g)||[];
  const groups=[];
  raw.forEach(t=>{
    if(t.length<2||SEARCH_STOP.has(t))return;
    const variants=new Set([t]);
    (SEARCH_SYN[t]||'').split(' ').forEach(s=>{if(s)variants.add(s);});
    groups.push([...variants]);
  });
  return groups;
}
function matchesRegion(it,f){
  if(!f)return true;
  if(!it.data)return false;
  const R=entryRegions(it.data);
  // A state filter also surfaces country-level entries (per the framework's regional model).
  if(f.state)return R.some(r=>r.country===f.country&&(r.state===f.state||!r.state));
  return R.some(r=>r.country===f.country);
}
// Returns [text, weight, isSnippetSource] for each searchable field of an entry.
function entryFields(it,dim){
  const da=it.data||{};
  const thr=(da.thresholds||[]).map(t=>t.guidance||'').join(' ');
  const alts=(da.alternatives||[]).map(a=>typeof a==='string'?a:((a.title||'')+' '+(a.description||''))).join(' ');
  return [
    [cleanText(it.name),5,false],
    [cleanText(da.question||''),4,true],
    [cleanText((da.keywords||[]).join(' ')),4,false],
    [cleanText(da.parameter||''),2,true],
    [cleanText(da.background||''),2,true],
    [cleanText(dim.name),2,false],
    [cleanText(thr),1,true],
    [cleanText(alts),1,true],
    [cleanText(locLabel(da.location)),1,false]
  ];
}
function runSearch(q){
  const groups=searchConcepts(q);

  const flat=[...new Set(groups.flat())];
  const reOf={}; flat.forEach(t=>reOf[t]=new RegExp('\\b'+escRe(t)));

  const docs=[]; const df={}; flat.forEach(t=>df[t]=0);
  dimensions.forEach(dim=>dim.items.forEach(it=>{
    if(!it.available||!it.data)return;
    if(!matchesRegion(it,searchRegion))return;
    const fields=entryFields(it,dim).map(f=>[f[0].toLowerCase(),f[1],f[2],f[0]]); // [low,weight,isSrc,orig]
    const combined=fields.map(f=>f[0]).join(' ');
    flat.forEach(t=>{if(reOf[t].test(combined))df[t]++;});

  }));

function buildSnippet(fields,terms){

// Canonical public deep link to an entry (strips a trailing index.html so it
// matches the GitHub Pages directory URL; the #dimId/id hash drives routing).

// ===== PROJECT REVIEW LIST =====
// UI name: "Project review list" — a list of framework ENTRIES a user collects to
// review against ONE project they're working on (NOT a list of projects).
// In code this feature is abbreviated to "projectList" everywhere — e.g.
//   state.view === 'projectList'      // the view
//   getProjectList() / addToProjectList() / removeFromProjectList()
//   the '#project-list' URL hash (with a legacy '#review-list' alias)
//   CSS classes like .project-card, .project-list-panel
// The short identifier is intentional and stable; only the user-facing labels
// rendered to screen say "Project review list". Don't rename the identifiers.
const PROJECT_LIST_KEY='constructabilityProjectList.v1';            // legacy single-list key (folded into the workspace on first load)
const LEGACY_REVIEW_LIST_KEY='constructabilityReviewList.v1';       // older legacy key
const WORKSPACE_KEY='constructabilityProjectWorkspace.v1';          // current store: many named lists + an active one
const PROJECT_FILE_FORMAT='constructability-project-list';          // marker written into single-list export files
const WORKSPACE_FILE_FORMAT='constructability-project-workspace';   // marker written into "export all lists" files
const DEFAULT_PROJECT_PURPOSE="This checklist contains constructability framework entries selected for this project's constructability review. Each item is a design-stage prompt, not a compliance assessment or formal sign-off. Open the full entry for thresholds, applicability, recommended actions and evidence.";
// ---- list + workspace model -------------------------------------------------
// A "list" is one named project review list: {id, name, purpose, ids[], created, updated}.
// The "workspace" holds every list plus which one is active: {lists:[...], activeId}.
// The whole single-list API below (getProjectList / saveProjectList / addToProjectList /
// removeFromProjectList / …) is preserved and simply operates on the ACTIVE list, so every
// existing caller — the detail page, the share flow, the exporters — keeps working untouched.
function genListId(){
  let r='';
  try{if(window.crypto&&crypto.randomUUID)r=crypto.randomUUID().replace(/-/g,'').slice(0,10);}catch(e){}
  if(!r)r=Math.random().toString(36).slice(2,10);
  return 'L-'+r+'-'+Date.now().toString(36).slice(-4);
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function defaultProjectList(){return {id:genListId(),name:'',purpose:DEFAULT_PROJECT_PURPOSE,ids:[],created:todayStr(),updated:''};}
function normaliseList(parsed){
  if(!parsed)return defaultProjectList();
  // Legacy support if an early prototype stored only an array of ids.
  if(Array.isArray(parsed))return {id:genListId(),name:'',purpose:DEFAULT_PROJECT_PURPOSE,ids:parsed.filter(Boolean),created:todayStr(),updated:''};
  return {
    id:(typeof parsed.id==='string'&&parsed.id)?parsed.id:genListId(),
    name:parsed.name||'',
    purpose:(parsed.purpose!==undefined?parsed.purpose:DEFAULT_PROJECT_PURPOSE),
    ids:Array.isArray(parsed.ids)?[...new Set(parsed.ids.filter(Boolean))]:[],
    created:parsed.created||todayStr(),
    updated:parsed.updated||''
  };
}
function defaultWorkspace(){const l=defaultProjectList();return {lists:[l],activeId:l.id};}
function normaliseWorkspace(parsed){
  if(!parsed||!Array.isArray(parsed.lists)||!parsed.lists.length)return defaultWorkspace();
  const lists=parsed.lists.map(normaliseList);
  let activeId=parsed.activeId;
  if(!lists.some(l=>l.id===activeId))activeId=lists[0].id;
  return {lists,activeId};
}
// Pull a pre-workspace single list (or its older array form) if one exists, so an
// upgrading user's saved list is preserved as the first list in the new workspace.
function readLegacySingleList(){
  try{
    const stored=localStorage.getItem(PROJECT_LIST_KEY);
    if(stored)return normaliseList(JSON.parse(stored));
    const legacy=localStorage.getItem(LEGACY_REVIEW_LIST_KEY);
    if(legacy)return normaliseList(JSON.parse(legacy));
  }catch(e){}
  return null;
}
function getWorkspace(){
  try{
    const stored=localStorage.getItem(WORKSPACE_KEY);
    if(stored)return normaliseWorkspace(JSON.parse(stored));
    const legacy=readLegacySingleList();
    if(legacy&&(legacy.ids.length||legacy.name)){
      const ws={lists:[legacy],activeId:legacy.id};
      saveWorkspace(ws);
      return ws;
    }
    const fresh=defaultWorkspace();
    saveWorkspace(fresh);
    return fresh;
  }catch(e){return defaultWorkspace();}
}
function saveWorkspace(ws){
  try{localStorage.setItem(WORKSPACE_KEY,JSON.stringify({lists:ws.lists,activeId:ws.activeId}));}catch(e){}
  return ws;
}
// ---- active-list compatibility layer (existing API, now workspace-backed) ----
function getProjectList(){const ws=getWorkspace();return ws.lists.find(l=>l.id===ws.activeId)||ws.lists[0];}
function saveProjectList(list){
  const ws=getWorkspace();
  const cleanIds=[...new Set((list.ids||[]).filter(Boolean))];
  const targetId=list.id||ws.activeId;
  const idx=ws.lists.findIndex(l=>l.id===targetId);
  const merged={
    id:(idx>=0?ws.lists[idx].id:targetId),
    name:list.name||'',
    purpose:(list.purpose!==undefined?list.purpose:DEFAULT_PROJECT_PURPOSE),
    ids:cleanIds,
    created:(idx>=0?ws.lists[idx].created:todayStr()),
    updated:todayStr()
  };
  if(idx>=0)ws.lists[idx]=merged; else {ws.lists.push(merged);ws.activeId=merged.id;}
  saveWorkspace(ws);
  return merged;
}
function projectCount(){return getProjectList().ids.length;}
function isInProjectList(id){return getProjectList().ids.includes(id);}
function setProjectListName(v){const list=getProjectList();list.name=v;saveProjectList(list);}
function setProjectListPurpose(v){const list=getProjectList();list.purpose=v;saveProjectList(list);}
function addToProjectList(id){const list=getProjectList();if(!list.ids.includes(id))list.ids.push(id);saveProjectList(list);render();}
function removeFromProjectList(id){const list=getProjectList();list.ids=list.ids.filter(x=>x!==id);saveProjectList(list);render();}
function toggleProjectList(id){isInProjectList(id)?removeFromProjectList(id):addToProjectList(id);}
function goProjectList(){window.location.hash='project-list';}
function resolveEntryId(id){

// ===== ADD-TO-LISTS PICKER =====
// Adding is always an explicit choice — never a silent drop into a hidden
// "active" list. The picker lists every project review list with a checkbox,
// pre-ticked where the entry already is, so one entry can go onto one list,
// several lists at once, or be removed by un-ticking.
let _relatedTargets=[];
let _bulkPending=[];
function closeAddPicker(){const m=document.getElementById('addPickerOverlay');if(m)m.remove();}
function lpChecks(){return Array.from(document.querySelectorAll('#addPickerOverlay .lp-check'));}
function lpListRowsHtml(checkedSet){
  return getWorkspace().lists.map(l=>{

// Create a list without navigating away (keeps the picker open).
function createListSilently(name,ids){
  const ws=getWorkspace();
  const l={id:genListId(),name:(name||'').trim(),purpose:DEFAULT_PROJECT_PURPOSE,ids:[...new Set((ids||[]).filter(Boolean))],created:todayStr(),updated:todayStr()};
  ws.lists.push(l);saveWorkspace(ws);
  return l.id;

// ----- name dialog -----
// A small styled prompt for naming a list. It pre-fills the next free
// "Project review list N" and selects it, so typing replaces it immediately;
// leaving it as-is (or blank) keeps the generic name. Cancel returns null.
let _nameCb=null,_nameSuggested='';
function nextGenericListName(){
  const names=new Set(getWorkspace().lists.map(l=>(l.name||'').trim().toLowerCase()));
  let n=1;while(names.has(('project review list '+n)))n++;
  return 'Project review list '+n;
}
function closeNamePrompt(){const m=document.getElementById('namePromptOverlay');if(m)m.remove();}
function promptListName(title,onDone,okLabel,suggestedOverride,introOverride){
  closeNamePrompt();
  _nameCb=onDone;
  _nameSuggested=(suggestedOverride!==undefined?suggestedOverride:nextGenericListName());
  const intro=introOverride!==undefined?introOverride:'Give it a name so you can tell your projects apart \u2014 or just keep the suggested one.';
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='namePromptOverlay';
  overlay.onclick=function(){submitNamePrompt(true);};
  overlay.innerHTML='<div class="modal" onclick="event.stopPropagation()">'
    +'<div class="modal-title">'+escHtml(title)+'</div>'
    +'<div class="ra-intro">'+escHtml(intro)+'</div>'
    +'<input id="namePromptInput" class="project-name-input np-input" type="text" autocomplete="off" value="'+escAttr(_nameSuggested)+'" onfocus="this.select()" onkeydown="namePromptKey(event)">'
    +'<div class="modal-actions">'
    +'<button class="entry-btn" onclick="submitNamePrompt(true)">Cancel</button>'
    +'<button class="entry-btn primary" onclick="submitNamePrompt(false)">'+escHtml(okLabel||'Create list')+'</button>'
    +'</div></div>';
  document.body.appendChild(overlay);
  const inp=document.getElementById('namePromptInput');
  if(inp){try{inp.focus();inp.select();}catch(e){}}
}
function namePromptKey(e){
  if(e.key==='Enter'){e.preventDefault();submitNamePrompt(false);}
  else if(e.key==='Escape'){e.preventDefault();submitNamePrompt(true);}
}
function submitNamePrompt(cancelled){
  const inp=document.getElementById('namePromptInput');
  const raw=inp?inp.value.trim():'';
  const cb=_nameCb;const suggested=_nameSuggested;
  closeNamePrompt();_nameCb=null;
  if(!cb)return;
  if(cancelled){cb(null);return;}
  cb(raw||suggested||'Project review list 1');
}
function lpNewList(){
  promptListName('Name the new project review list',function(name){
    if(name===null)return;

}
function openAddPicker(entryId){
  closeAddPicker();
  const r=resolveEntryId(entryId);
  const ename=r?escHtml(r.item.name):'this entry';
  const checked=new Set(entryListIds(entryId));
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='addPickerOverlay';overlay.onclick=closeAddPicker;
  overlay.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Add to project review lists</div>
    <div class="ra-intro">Choose which list(s) <strong>${ename}</strong> should be on. Tick more than one to add it to several at once; un-tick to remove.</div>
    <div class="ra-list" id="lpList">${lpListRowsHtml(checked)}</div>
    <div class="lp-newrow"><button class="entry-btn" onclick="lpNewList()">+ New list…</button></div>
    <div class="modal-actions">
      <button class="entry-btn" onclick="closeAddPicker()">Cancel</button>
      <button class="entry-btn primary" onclick="confirmAddPicker('${entryId}')">Done</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

function confirmAddPicker(entryId){
  const checkedIds=new Set(lpChecks().filter(c=>c.checked).map(c=>c.value));
  closeAddPicker();
  const ws=getWorkspace();
  const addedTo=[],toName=[];
  ws.lists.forEach(l=>{
    const has=l.ids.includes(entryId);
    const wasEmpty=l.ids.length===0;
    if(checkedIds.has(l.id)&&!has){
      l.ids.push(entryId);l.updated=todayStr();addedTo.push(l.id);
      if(wasEmpty&&!(l.name&&l.name.trim()))toName.push(l.id);
    }
    else if(!checkedIds.has(l.id)&&has){l.ids=l.ids.filter(x=>x!==entryId);l.updated=todayStr();}
  });
  saveWorkspace(ws);render();
  // Only nudge to name a list the first time it gets content, and only if unnamed.
  nameUnnamedTargets(toName);
  // Offer this entry's related entries onto the same lists it was just added to.
  if(addedTo.length){
    const related=relatedNotInLists(entryId,addedTo);
    if(related.length)showRelatedAddPanel(entryId,related,addedTo);
  }
}
// Prompt to name any unnamed lists among the given ids (usually just the default).
function nameUnnamedTargets(listIds){
  if(!listIds||!listIds.length)return;
  const ws=getWorkspace();
  const unnamed=ws.lists.filter(l=>listIds.includes(l.id)&&!(l.name&&l.name.trim()));
  if(!unnamed.length)return;
  let i=0;
  (function next(){
    if(i>=unnamed.length){render();return;}
    const target=unnamed[i++];
    promptListName('Name your list',function(name){
      if(name){const w=getWorkspace();const t=w.lists.find(x=>x.id===target.id);if(t){t.name=name;t.updated=todayStr();saveWorkspace(w);}}
      next();
    },'Save name',undefined,'You just started a list that doesn\u2019t have a name yet. Give it one so you can find it again \u2014 or keep the suggested name.');
  })();
}
// Bulk add (triage results): pick which list(s) to drop the whole set onto.
function openBulkAddPicker(ids){
  _bulkPending=ids.slice();
  closeAddPicker();
  const n=ids.length;
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='addPickerOverlay';overlay.onclick=closeAddPicker;
  overlay.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Add ${n} ${n===1?'entry':'entries'} to project review lists</div>
    <div class="ra-intro">Choose which list(s) these ${n} ${n===1?'entry':'entries'} should go onto.</div>
    <div class="ra-list" id="lpList">${lpListRowsHtml(new Set())}</div>
    <div class="lp-newrow"><button class="entry-btn" onclick="lpNewList()">+ New list…</button></div>
    <div class="modal-actions">
      <button class="entry-btn" onclick="closeAddPicker()">Cancel</button>
      <button class="entry-btn primary" onclick="confirmBulkAddPicker()">Add to selected</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}
function confirmBulkAddPicker(){
  const chosen=lpChecks().filter(c=>c.checked).map(c=>c.value);
  const ids=_bulkPending.slice();_bulkPending=[];
  closeAddPicker();
  if(!chosen.length||!ids.length)return;
  const ws=getWorkspace();
  const toName=ws.lists.filter(l=>chosen.includes(l.id)&&l.ids.length===0&&!(l.name&&l.name.trim())).map(l=>l.id);
  addManyToLists(ids,chosen);
  nameUnnamedTargets(toName);
}
// Add several entries to several lists at once (no removals).
function addManyToLists(ids,listIds){
  const ws=getWorkspace();
  ws.lists.forEach(l=>{
    if(listIds.includes(l.id)){
      ids.forEach(id=>{if(!l.ids.includes(id))l.ids.push(id);});
      l.updated=todayStr();
    }
  });
  saveWorkspace(ws);render();
}
// Related entries for `id` that are missing from at least one of the chosen lists.
function relatedNotInLists(id,listIds){
  const r=resolveEntryId(id);
  if(!r)return [];
  const chosen=getWorkspace().lists.filter(l=>listIds.includes(l.id));
  return getRelatedEntries(id,r.data).filter(x=>chosen.some(l=>!l.ids.includes(x.id)));
}
function addManyToProjectList(ids){
  const list=getProjectList();
  ids.forEach(id=>{if(!list.ids.includes(id))list.ids.push(id);});
  saveProjectList(list);render();
}
function closeRelatedAddPanel(){const m=document.getElementById('relatedAddOverlay');if(m)m.remove();}
function raChecks(){return Array.from(document.querySelectorAll('#relatedAddOverlay .ra-check'));}
function toggleAllRelated(src){raChecks().forEach(c=>{c.checked=src.checked;});updateRelatedAddCount();}
function updateRelatedAddCount(){
  const checks=raChecks(),sel=checks.filter(c=>c.checked).length;
  const btn=document.getElementById('raAddBtn');
  if(btn){btn.textContent=sel?`Add selected (${sel})`:'Add selected';btn.disabled=!sel;btn.style.opacity=sel?'1':'0.5';btn.style.cursor=sel?'pointer':'not-allowed';}
  const all=document.getElementById('raSelectAll');
  if(all){all.checked=sel===checks.length&&checks.length>0;all.indeterminate=sel>0&&sel<checks.length;}
  const cnt=document.getElementById('raCount');
  if(cnt)cnt.textContent=`${sel} of ${checks.length} selected`;
}
function confirmAddRelated(){
  const ids=raChecks().filter(c=>c.checked).map(c=>c.value);
  closeRelatedAddPanel();
  if(ids.length)addManyToLists(ids,_relatedTargets);
}
function showRelatedAddPanel(id,related,targets){
  _relatedTargets=Array.isArray(targets)&&targets.length?targets:[getWorkspace().activeId];
  closeRelatedAddPanel();
  const src=resolveEntryId(id);
  const name=src?escHtml(src.item.name):'This entry';
  const n=related.length;
  const rows=related.map(r=>`<label class="ra-row">
      <input type="checkbox" class="ra-check" value="${r.id}" checked onchange="updateRelatedAddCount()">
      <span class="ra-text">
        <span class="ra-name">${escHtml(r.name)}</span>
        <span class="ra-dim"><span class="ico">${r.dimIcon||''}</span>${escHtml(r.dimName)}</span>
        ${r.note?`<span class="ra-note">${escHtml(r.note)}</span>`:''}
      </span>
    </label>`).join('');
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='relatedAddOverlay';
  overlay.onclick=closeRelatedAddPanel;
  overlay.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Added — related entries</div>
    <div class="ra-intro"><strong>${name}</strong> was added to ${_relatedTargets.length===1?'that list':(_relatedTargets.length+' lists')}. It relates to ${n} other ${n===1?'entry':'entries'} — tick any you'd also like to add to the same ${_relatedTargets.length===1?'list':'lists'}.</div>
    <div class="ra-toolbar">
      <label class="ra-selectall"><input type="checkbox" id="raSelectAll" checked onchange="toggleAllRelated(this)"> Select all</label>
      <span class="ra-count" id="raCount"></span>
    </div>
    <div class="ra-list">${rows}</div>
    <div class="modal-actions">
      <button class="entry-btn" onclick="closeRelatedAddPanel()">Skip</button>
      <button class="entry-btn primary" id="raAddBtn" onclick="confirmAddRelated()">Add selected</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  updateRelatedAddCount();
}
function copyTextFallback(text){
  const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');alert('Checklist copied to clipboard.');}catch(e){alert('Could not copy automatically. The checklist text will open in a prompt.');prompt('Copy checklist:',text);}
  ta.remove();
}
function projectExportRows(){
  return projectItems().map(({dim,item,data})=>({
    title:cleanText(item.name),
    dimension:cleanText(dim.name),
    question:cleanText(data.question||''),
    parameter:cleanText(data.parameter||''),

function pdfTextClean(s){
  return cleanText(s||'').replace(/[“”]/g,'"').replace(/[‘’]/g,"'").replace(/[–—]/g,'-').replace(/≤/g,'<=').replace(/≥/g,'>=').replace(/×/g,'x').replace(/°/g,' deg').replace(/…/g,'...').replace(/[^\x09\x0A\x0D\x20-\x7E]/g,'');
}
function pdfEscape(s){return pdfTextClean(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');}
function makePdf(lines,annotations){
  const enc=new TextEncoder();
  const objects=[];
  function obj(s){objects.push(s);return objects.length;}
  obj('<< /Type /Catalog /Pages 2 0 R >>');
  obj('PAGES_PLACEHOLDER');
  const font1=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
  const font2=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
  const pageIds=[];
  const contentByPage=new Map();
  lines.forEach(l=>{if(!contentByPage.has(l.page))contentByPage.set(l.page,[]);contentByPage.get(l.page).push(l);});
  const annByPage=new Map();
  annotations.forEach(a=>{if(!annByPage.has(a.page))annByPage.set(a.page,[]);annByPage.get(a.page).push(a);});
  const pageCount=Math.max(...lines.map(l=>l.page),0)+1;
  for(let p=0;p<pageCount;p++){
    const annIds=[];
    (annByPage.get(p)||[]).forEach(a=>{
      const w=Math.max(80,Math.min(495,(a.text||'').length*5.2));
      annIds.push(obj(`<< /Type /Annot /Subtype /Link /Rect [${a.x} ${a.y-3} ${a.x+w} ${a.y+11}] /Border [0 0 0] /A << /S /URI /URI (${pdfEscape(a.url)}) >> >>`));
    });
    const stream=(contentByPage.get(p)||[]).map(l=>{
      const f=l.bold?'/F2':'/F1';
      const colour=l.color?`${l.color} rg `:'';
      const textOp=`BT ${f} ${l.size} Tf 1 0 0 1 ${l.x.toFixed(1)} ${l.y.toFixed(1)} Tm (${pdfEscape(l.text)}) Tj ET`;
      const w=Math.max(20,Math.min(495,(l.text||'').length*l.size*0.48));
      const underline=l.underline?`\nq ${l.color||'0 0 0'} RG 0.7 w ${l.x.toFixed(1)} ${(l.y-2).toFixed(1)} m ${(l.x+w).toFixed(1)} ${(l.y-2).toFixed(1)} l S Q`:'';
      return l.color?`q ${colour}${textOp} Q${underline}`:`${textOp}${underline}`;
    }).join('\n');
    const contentId=obj(`<< /Length ${enc.encode(stream).length} >>\nstream\n${stream}\nendstream`);
    const annotsStr=annIds.length?` /Annots [${annIds.map(id=>id+' 0 R').join(' ')}]`:'';
    const pageId=obj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 ${font1} 0 R /F2 ${font2} 0 R >> >> /Contents ${contentId} 0 R${annotsStr} >>`);
    pageIds.push(pageId);
  }
  objects[1]=`<< /Type /Pages /Kids [${pageIds.map(id=>id+' 0 R').join(' ')}] /Count ${pageIds.length} >>`;
  let pdf='%PDF-1.4\n';
  const offsets=[0];
  objects.forEach((o,i)=>{offsets[i+1]=enc.encode(pdf).length;pdf+=`${i+1} 0 obj\n${o}\nendobj\n`;});
  const xref=enc.encode(pdf).length;
  pdf+=`xref\n0 ${objects.length+1}\n0000000000 65535 f \n`;
  for(let i=1;i<=objects.length;i++)pdf+=String(offsets[i]).padStart(10,'0')+' 00000 n \n';
  pdf+=`trailer\n<< /Size ${objects.length+1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
  return new Blob([enc.encode(pdf)],{type:'application/pdf'});
}
function downloadProjectPdf(){
  const rows=projectExportRows();
  if(!rows.length){alert('Your project review list is empty.');return;}
  const lines=[],ann=[];
  const margin=50,bottom=52,width=495;
  let page=0,y=792;
  function newPage(){page++;y=792;}
  function addLine(text,size=10,bold=false,indent=0,gap=14,linkUrl='',opts={}){
    if(y<bottom+gap)newPage();
    const x=margin+indent;
    lines.push({page,x,y,text,size,bold,color:opts.color||'',underline:!!opts.underline});
    if(linkUrl)ann.push({page,x,y,text,url:linkUrl});
    y-=gap;
  }
  function wrap(text,size=10,indent=0){
    const maxChars=Math.max(24,Math.floor((width-indent)/(size*0.48)));
    const words=pdfTextClean(text).split(/\s+/).filter(Boolean);
    const out=[];let cur='';
    words.forEach(w=>{if((cur+' '+w).trim().length>maxChars){if(cur)out.push(cur);cur=w;}else cur=(cur+' '+w).trim();});
    if(cur)out.push(cur);
    return out;
  }
  function addWrapped(label,text,size=10,indent=0){
    if(label)addLine(label,size,true,indent,13);
    wrap(text,size,indent).forEach(l=>addLine(l,size,false,indent,13));
    y-=4;
  }
  addLine('Project Constructability Checklist',18,true,0,24);
  addLine('Project review list: '+projectExportTitle(),11,true,0,16);
  addLine('Generated: '+projectExportDate()+'    Selected entries: '+rows.length,10,false,0,18);
  addWrapped('Purpose',projectExportPurpose(),10,0);
  y-=4;
  rows.forEach((r,i)=>{
    if(y<165)newPage();
    addLine((i+1)+'. [ ] '+r.title,13,true,0,18);
    addLine('Dimension: '+r.dimension,10,false,14,14);
    addWrapped('Design question:',r.question,10,14);
    addWrapped('Design parameter:',r.parameter,10,14);
    addLine('Open full framework entry',10,false,14,18,r.url,{color:'0 0.25 0.85',underline:true});
    y-=8;
  });
  const blob=makePdf(lines,ann);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=safeFileName(projectExportTitle(),'pdf');
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},0);
}

// Drop nameless, empty lists once real lists exist, so a bulk import doesn't leave
// the blank default list cluttering the hub. Always keeps at least one list.
function pruneEmptyUnnamed(ws){
  if(ws.lists.length<=1)return ws;
  const kept=ws.lists.filter(l=>l.ids.length||(l.name&&l.name.trim()));
  if(kept.length){
    ws.lists=kept;
    if(!ws.lists.some(l=>l.id===ws.activeId))ws.activeId=ws.lists[0].id;
  }
  return ws;
}
function importListFile(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{handleImportedListText(String(r.result||''));};

function handleImportedListText(text){
  let obj=null;try{obj=JSON.parse(text);}catch(e){alert('That file is not a valid review-list export \u2014 it could not be read as JSON.');return;}
  if(obj&&obj.format===WORKSPACE_FILE_FORMAT&&Array.isArray(obj.lists))return importWorkspaceObject(obj);
  if(!obj||obj.format!==PROJECT_FILE_FORMAT||!Array.isArray(obj.ids)){alert('That file is not a constructability project review list export.');return;}
  const valid=validSharedIds(obj.ids.filter(x=>typeof x==='string'));
  if(!valid.length){alert('None of the entries in that file exist in the current framework, so there is nothing to import.');return;}
  const ws=getWorkspace();
  const existing=obj.id?ws.lists.find(l=>l.id===obj.id):null;
  if(existing){
    if(confirm('This file is a saved copy of \u201c'+(existing.name||'an untitled list')+'\u201d. Update that list with the imported version? Choose Cancel to import it as a separate new list instead.')){
      existing.name=(obj.name!==undefined?obj.name:existing.name)||'';
      existing.purpose=obj.purpose!==undefined?obj.purpose:existing.purpose;
      existing.ids=valid;existing.updated=todayStr();
      ws.activeId=existing.id;saveWorkspace(ws);
      state.view='projectList';window.location.hash='project-list';render();window.scrollTo({top:0,left:0,behavior:'auto'});
      alert('Updated \u201c'+(existing.name||'untitled list')+'\u201d from the file ('+valid.length+(valid.length===1?' entry':' entries')+').');
      return;
    }
  }
  // No existing list with this id: import as a brand-new list, but KEEP the file's
  // own id so that re-importing the same file later updates this list instead of
  // creating yet another duplicate.
  const ws2=getWorkspace();
  let newId=(obj.id&&typeof obj.id==='string')?obj.id:genListId();
  if(ws2.lists.some(l=>l.id===newId))newId=genListId();
  const nl={id:newId,name:obj.name||'Imported project review list',purpose:(obj.purpose!==undefined?obj.purpose:DEFAULT_PROJECT_PURPOSE),ids:valid,created:todayStr(),updated:todayStr()};
  ws2.lists.push(nl);ws2.activeId=nl.id;saveWorkspace(ws2);
  state.sharedPreview=null;state.view='projectList';window.location.hash='project-list';render();window.scrollTo({top:0,left:0,behavior:'auto'});
  alert('Imported a new project review list ('+valid.length+(valid.length===1?' entry':' entries')+').');
}
// Bulk import of an "export all lists" file: each incoming list updates the
// matching list (same id) or is added as a new one, so your other lists are kept.
function importWorkspaceObject(obj){
  const incoming=obj.lists.map(normaliseList).map(l=>{l.ids=validSharedIds(l.ids);return l;})
    .filter(l=>l.ids.length||(l.name&&l.name.trim())); // drop fully-empty, unnamed lists
  if(!incoming.length){alert('That backup did not contain any project review lists that exist in the current framework.');return;}
  const ws=getWorkspace();
  let updated=0,added=0;
  incoming.forEach(l=>{
    const ex=ws.lists.find(x=>x.id===l.id);
    if(ex){ex.name=l.name;ex.purpose=l.purpose;ex.ids=l.ids;ex.updated=todayStr();updated++;}
    else{ws.lists.push({id:l.id,name:l.name,purpose:l.purpose,ids:l.ids,created:l.created||todayStr(),updated:todayStr()});added++;}
  });
  ws.activeId=incoming[0].id;
  pruneEmptyUnnamed(ws);
  saveWorkspace(ws);
  state.sharedPreview=null;state.view='projectIndex';window.location.hash='project-lists';render();window.scrollTo({top:0,left:0,behavior:'auto'});
  const bits=[];if(added)bits.push(added+' added');if(updated)bits.push(updated+' updated');
  alert('Imported '+incoming.length+' project review '+(incoming.length===1?'list':'lists')+(bits.length?(' ('+bits.join(', ')+')'):'')+'.');
}

// Human labels + kind for every fact, used to explain why an entry surfaced.
const DEFAULT_FACT_META=(()=>{
  const m={};
  const P={'slab-suspended':'Suspended slabs','beam-suspended':'Suspended beams','slab-on-ground':'Ground-bearing slab','footing':'Footings / ground beams','wall':'Concrete walls','column':'Concrete columns','pile':'Piles / piers'};
  const C={'exposed-concrete':'Exposed concrete','watertight':'Watertight structure','repeated-floors':'Repeated floors','slab-level-change':'Slab level changes','upstand-near-obstruction':'Upstand near an obstruction','deep-vertical-at-slab':'Deep vertical element at a slab','founded-on-rock':'Founded on rock','reactive-ground':'Reactive ground','bushfire-area':'Bushfire area','access-constrained':'Constrained site access','construction-stage-loading':'Construction-stage loading'};
  const I={'choosing-vertical-system':'Choosing the vertical system','choosing-floor-framing':'Choosing the floor framing','considering-screw-piles':'Considering screw piles'};
  const U={'universal-drawing-clarity':'Drawing clarity','universal-buildability':'Buildability good-practice','universal-site-safety':'Site & temporary stability'};
  for(const k in P)m[k]={label:P[k],kind:'presence',pri:1};
  for(const k in C)m[k]={label:C[k],kind:'condition',pri:3};
  for(const k in I)m[k]={label:I[k],kind:'intent',pri:3};
  for(const k in U)m[k]={label:U[k],kind:'universal',pri:2};
  return m;
})();

// Derive fact metadata (label + priority) from a triage config, so the questionnaire
// is fully data-driven: adding a question in data.json's triageConfig needs no code change.
function buildFactMeta(T){
  const m={};
  (T.gates||[]).forEach(g=>{const cond=g.kind==='condition';m[g.fact]={label:g.reason||g.label||g.fact,kind:cond?'condition':'presence',pri:cond?3:1};});
  (T.questions||[]).forEach(q=>{m[q.fact]={label:q.reason||(q.prompt||'').replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,' ').trim()||q.fact,kind:q.source==='intent'?'intent':'condition',pri:3};});
  (T.universal||[]).forEach(u=>{m[u.fact]={label:u.reason||u.label||u.fact,kind:'universal',pri:2};});
  return m;
}

// Build the set of established facts, then surface every available entry whose trigger is met.
function triageCollect(){
  const satisfied=new Set();   // facts that count as present
  const maybeFacts=new Set();  // facts established via "Not sure"
  triage.gateSel.forEach(f=>satisfied.add(f));
  triage.answers.forEach((val,f)=>{
    if(val==='yes'){satisfied.add(f);}
    else if(val==='maybe'){satisfied.add(f);maybeFacts.add(f);}
  });
  triage.uniSel.forEach(f=>satisfied.add(f));

  // trigger = array of slots; each slot is an array of facts (OR within, AND across slots)
  const triggerMet=trig=>Array.isArray(trig)&&trig.length>0&&trig.every(slot=>Array.isArray(slot)&&slot.some(f=>satisfied.has(f)));
  // pick the most informative satisfied fact in a trigger to explain the suggestion
  const reasonFor=trig=>{
    const facts=[];
    trig.forEach(slot=>slot.forEach(f=>{if(satisfied.has(f)&&!facts.includes(f))facts.push(f);}));
    if(!facts.length)return '';
    facts.sort((a,b)=>((FACT_META[b]?.pri||0)-(FACT_META[a]?.pri||0)));
    const f=facts[0];
    const lbl=FACT_META[f]?.label||f;
    return maybeFacts.has(f)?`${lbl} (you weren't sure)`:lbl;
  };

  const inList=new Set(getProjectList().ids);
  const entries=[],skipped=[];
  for(const dim of dimensions){
    for(const item of dim.items){
      if(!item.available||!item.data)continue;
      const trig=item.data.triage;
      if(!triggerMet(trig))continue;
      // an entry can name facts that SUPPRESS it (e.g. a downstream entry hidden
      // while an upstream decision is still open). If any excluded fact is established, skip.
      const excl=item.data.triageExclude;
      if(Array.isArray(excl)&&excl.some(f=>satisfied.has(f)))continue;
      const row={id:item.id,name:item.name,dimName:dim.name,dimIcon:dim.icon,reason:reasonFor(trig)};
      if(inList.has(item.id))skipped.push(row);else entries.push(row);
    }
  }
  return {entries,skipped};
}

function triageFinish(){
  const {entries,skipped}=triageCollect();
  closeTriage();
  showTriageResults(entries,skipped);
}
function showTriageResults(entries,skipped){
  const n=entries.length;
  let body;
  if(!n){
    const msg=skipped.length
      ?`Everything this triage suggested is already on your project review list &mdash; nothing more to add.`
      :`No entries matched these answers. Try the search above, or browse the dimensions &mdash; and if the framework doesn't cover your issue, you can <span class="search-empty-link" onclick="closeTriageResults();goSuggest()">suggest a new entry</span>.`;
    body=`<div class="triage-empty">${msg}</div>
      <div class="modal-actions"><button class="entry-btn primary" onclick="closeTriageResults()">Done</button></div>`;
  }else{
    const rows=entries.map(e=>`<label class="ra-row">
      <input type="checkbox" class="tr-check" value="${e.id}" checked onchange="updateTriageCount()">
      <span class="ra-text">
        <span class="ra-name">${safeText(e.name)}</span>
        <span class="ra-dim"><span class="ico">${e.dimIcon||''}</span>${safeText(e.dimName)}</span>
        ${e.reason?`<span class="ra-note">Suggested by: ${safeText(e.reason)}</span>`:''}
      </span>
    </label>`).join('');
    const skipNote=skipped.length?`<div class="triage-q-sub" style="margin-top:10px">${skipped.length} suggested ${skipped.length===1?'entry is':'entries are'} already on your list and ${skipped.length===1?'was':'were'} left out.</div>`:'';
    body=`<div class="ra-intro">Based on your answers, these ${n} ${n===1?'entry is':'entries are'} worth reviewing. Untick anything that doesn't apply, then add the rest to your project review list.</div>
      <div class="ra-toolbar">
        <label class="ra-selectall"><input type="checkbox" id="trSelectAll" checked onchange="toggleAllTriage(this)"> Select all</label>
        <span class="ra-count" id="trCount"></span>
      </div>
      <div class="ra-list">${rows}</div>
      ${skipNote}
      <div class="modal-actions">
        <button class="entry-btn" onclick="closeTriageResults()">Cancel</button>
        <button class="entry-btn primary" id="trAddBtn" onclick="confirmTriageAdd()">Add selected</button>
      </div>`;
  }
  const o=document.createElement('div');
  o.className='modal-overlay';o.id='triageResultOverlay';o.onclick=closeTriageResults;
  o.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Suggested entries to review</div>${body}</div>`;
  document.body.appendChild(o);
  if(n)updateTriageCount();
}
function closeTriageResults(){const o=document.getElementById('triageResultOverlay');if(o)o.remove();}
function trChecks(){return Array.from(document.querySelectorAll('#triageResultOverlay .tr-check'));}
function toggleAllTriage(src){trChecks().forEach(c=>{c.checked=src.checked;});updateTriageCount();}
function updateTriageCount(){
  const checks=trChecks(),sel=checks.filter(c=>c.checked).length;
  const btn=document.getElementById('trAddBtn');
  if(btn){btn.textContent=sel?`Add selected (${sel})`:'Add selected';btn.disabled=!sel;btn.style.opacity=sel?'1':'0.5';btn.style.cursor=sel?'pointer':'not-allowed';}

// ===== LOAD DATA =====
async function loadData(){
  try{
    const resp=await fetch('data.json');
    const data=await resp.json();
    if(data.triageConfig){TRIAGE=data.triageConfig;FACT_META=buildFactMeta(TRIAGE);}
    dimensions=data.dimensions;
    guide=data.guide||null;
    // Safety net: guarantee every entry has a unique id even if one was omitted in data.json.
    const seenIds=new Set();
    dimensions.forEach(dim=>dim.items.forEach(it=>{
      if(!it.id)it.id=slugify(it.name);
      let base=it.id,n=2;
      while(seenIds.has(it.id)){it.id=base+'-'+n;n++;}
      seenIds.add(it.id);
    }));
  }catch(e){
    document.getElementById('app').innerHTML='<div class="content" style="text-align:center;padding-top:80px;color:var(--red)">Error loading framework data. Make sure data.json is in the same folder as this file.</div>';
  }
}

// ===== SHAREABLE PROJECT LIST (via ?plist= link) =====
// A project review list can be shared as a plain link with no server. The
// selected entry ids (plus an optional name/purpose) are encoded into a
// `?plist=` query param. Opening the link decodes them and, depending on what
// the recipient already has saved, either adopts the set outright (empty list)
// or offers view / merge / replace. Entry ids are stable, so links survive
// entries being renamed. The param is carried in the query string rather than
// the hash so it never collides with the hash-based view router.
let _sharedIncoming=null;
function _b64urlEncode(str){
  const utf8=unescape(encodeURIComponent(str));
  return btoa(utf8).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function _b64urlDecode(b64){
  let s=b64.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  return decodeURIComponent(escape(atob(s)));
}
function buildSharePayload(){
  const list=getProjectList();
  const ids=[...new Set((list.ids||[]).filter(Boolean))];
  const payload={i:ids};
  if(list.name&&list.name.trim())payload.n=list.name.trim();
  // Only carry the purpose if it has been customised — keeps default links short.
  if(list.purpose&&list.purpose.trim()&&list.purpose.trim()!==DEFAULT_PROJECT_PURPOSE.trim())payload.p=list.purpose.trim();
  return payload;
}
function projectShareUrl(){
  const base=(location.origin+location.pathname).replace(/index\.html$/,'');
  return base+'?plist='+_b64urlEncode(JSON.stringify(buildSharePayload()))+'#project-list';
}
function copyProjectShareLink(){
  const n=projectItems().length;
  if(!n){alert('Your project review list is empty — add some entries before sharing.');return;}
  const url=projectShareUrl();
  const done=()=>alert('Share link copied. Opening it offers this review set ('+n+(n===1?' entry':' entries')+') to whoever you send it to.');
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done).catch(()=>prompt('Copy this share link:',url));}
  else prompt('Copy this share link:',url);
}
function decodeSharePayload(raw){
  try{
    const obj=JSON.parse(_b64urlDecode(raw));
    const ids=Array.isArray(obj.i)?obj.i.filter(x=>typeof x==='string'):[];
    return {name:typeof obj.n==='string'?obj.n:'',purpose:typeof obj.p==='string'?obj.p:DEFAULT_PROJECT_PURPOSE,ids};
  }catch(e){return null;}
}
function validSharedIds(ids){return [...new Set(ids)].filter(id=>!!resolveEntryId(id));}
// Called once at startup. Reads ?plist=, then decides what to do based on
// whether the recipient already has a saved list.
function handleShareLink(){
  const m=location.search.match(/[?&]plist=([^&#]+)/);
  if(!m)return;
  // Strip the param immediately so a refresh or bookmark doesn't re-trigger the import.
  try{history.replaceState(null,'',location.pathname+location.hash);}catch(e){}
  const shared=decodeSharePayload(m[1]);
  if(!shared){alert('This share link could not be read — it may be incomplete or corrupted.');return;}
  const valid=validSharedIds(shared.ids);
  if(!valid.length){alert('This shared review list has no entries that exist in the current framework.');return;}
  shared.ids=valid;
  _sharedIncoming=shared;
  const mine=getProjectList();
  if(!mine.ids.length){
    // Nothing to protect — adopt the shared list directly.
    saveProjectList({name:shared.name||'',purpose:shared.purpose,ids:shared.ids});
    state.view='projectList';state.sharedPreview=null;render();
    alert('Loaded a shared review list ('+shared.ids.length+(shared.ids.length===1?' entry':' entries')+').');
    return;
  }
  // They already have a list — let them choose what happens to it.
  render();
  openShareImportModal(shared,mine.ids.length);
}
function openShareImportModal(shared,mineCount){
  closeShareModal();
  const n=shared.ids.length;
  const ov=document.createElement('div');
  ov.className='share-modal-overlay';ov.id='shareModal';
  ov.innerHTML='<div class="share-modal" role="dialog" aria-modal="true" aria-label="Imported project review list">'
    +'<div class="share-modal-title">Someone shared a project review list</div>'
    +'<div class="share-modal-body">'
    +'<p>This link contains <strong>'+n+'</strong> '+(n===1?'entry':'entries')+(shared.name?(' \u2014 \u201c'+escHtml(shared.name)+'\u201d'):'')+'.</p>'
    +'<p>You already have your own project review list with <strong>'+mineCount+'</strong> '+(mineCount===1?'entry':'entries')+'. What would you like to do?</p>'
    +'</div>'
    +'<div class="share-modal-actions">'
    +'<button class="entry-btn primary" onclick="shareImportAsNew()">Import as a new list</button>'
    +'<button class="entry-btn" onclick="shareMerge()">Merge into current list</button>'
    +'<button class="entry-btn" onclick="shareViewOnly()">Just view it</button>'
    +'<button class="entry-btn danger" onclick="closeShareModal()">Cancel</button>'
    +'</div></div>';
  document.body.appendChild(ov);
}
function closeShareModal(){const m=document.getElementById('shareModal');if(m)m.remove();}
function shareViewOnly(){
  closeShareModal();
  state.sharedPreview=_sharedIncoming;
  state.view='projectList';
  render();window.scrollTo({top:0,left:0,behavior:'auto'});
}
function shareMerge(){
  closeShareModal();
  const s=_sharedIncoming;if(!s)return;
  const list=getProjectList();
  const before=new Set(list.ids);
  s.ids.forEach(id=>{if(!list.ids.includes(id))list.ids.push(id);});
  if(!list.name&&s.name)list.name=s.name; // adopt the shared name only if mine is blank
  saveProjectList(list);
  const added=getProjectList().ids.filter(id=>!before.has(id)).length;
  state.sharedPreview=null;state.view='projectList';render();window.scrollTo({top:0,left:0,behavior:'auto'});
  alert(added?('Added '+added+' new '+(added===1?'entry':'entries')+' to your list.'):'All shared entries were already on your list.');
}
function shareReplace(){
  if(!confirm('Replace your current list with the shared one? Your existing selection will be discarded.'))return;
  closeShareModal();
  const s=_sharedIncoming;if(!s)return;
  saveProjectList({name:s.name||'',purpose:s.purpose,ids:s.ids});
  state.sharedPreview=null;state.view='projectList';render();window.scrollTo({top:0,left:0,behavior:'auto'});
}
// Workspace-safe default for an incoming shared link: land it as its own new

function shareImportAsNew(){

function globalFacetValues(field){const s=new Set();allAvailableEntries().forEach(e=>{if(Array.isArray(e.data[field]))e.data[field].forEach(v=>s.add(v));});return s;}
function facetCount(field,v){return allAvailableEntries().filter(e=>Array.isArray(e.data[field])&&e.data[field].includes(v)).length;}
// Contextual count: of the in-scope `items` that already pass every active filter,
// how many also carry tag v — i.e. exactly how many entries would remain if this
// chip were added. Because facets AND together, this updates as selections change:
// pick "slab" and the other chips drop to their overlap with slab.
function contextualFacetCount(items,field,v){
  return items.filter(it=>it&&it.available&&it.data&&itemMatchesFilter(it)&&Array.isArray(it.data[field])&&it.data[field].includes(v)).length;
}
// One facet chip carrying its live contextual count. An unselected chip whose
// count is 0 is a dead end (clicking it would empty the list), so it's dimmed and
// disabled; selected chips stay clickable so they can always be turned off.
function facetChip(items,field,v,selected,toggleFn){
  const n=contextualFacetCount(items,field,v);
  const dead=!selected&&n===0;
  return `<button class="facet-chip${selected?' on':''}${dead?' dead':''}"${dead?' disabled':''} onclick="${toggleFn}('${escAttr(v)}')">${escHtml(v)}<span class="facet-chip-n">${n}</span></button>`;
}
// All locations across every live entry (cross-cutting), as Map<country, Set<state>>.
function globalLocations(){const locs=new Map();allAvailableEntries().forEach(e=>{entryRegions(e.data).forEach(r=>{if(!locs.has(r.country))locs.set(r.country,new Set());if(r.state)locs.get(r.country).add(r.state);});});return locs;}
function browseRegionOptions(){
  let opts='<option value="">All regions</option>';
  for(const [country,states] of globalLocations()){
    const csel=state.locationFilter&&state.locationFilter.country===country&&!state.locationFilter.state?'selected':'';
    opts+=`<option value="${country}" ${csel}>${country}</option>`;
    for(const st of [...states].sort()){
      const ssel=state.locationFilter&&state.locationFilter.country===country&&state.locationFilter.state===st?'selected':'';
      opts+=`<option value="${country}|${st}" ${ssel}>&nbsp;&nbsp;${st}, ${country}</option>`;
    }
  }
  return opts;
}

// Cross-cutting browse: every live entry across all five dimensions, narrowed by region, element and/or stage.

  <div class="facet-filter">
    ${regionRow}
    <div class="facet-row"><span class="facet-label">Element</span><div class="facet-chips">${elChips}</div></div>
