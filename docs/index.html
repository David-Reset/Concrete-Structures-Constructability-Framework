<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constructability Framework — RC Design Guidance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1a; --surface: #111827; --surface-light: #1a2234;
    --border: #2a3548; --text: #e2e8f0; --text-muted: #8899aa;
    --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
    --red: #ef4444; --orange: #f97316; --yellow: #eab308; --green: #22c55e;
    --red-bg: rgba(239,68,68,0.12); --orange-bg: rgba(249,115,22,0.12);
    --yellow-bg: rgba(234,179,8,0.1); --green-bg: rgba(34,197,94,0.1);
  }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif; min-height:100vh; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation:fadeIn 0.3s ease; }
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
  .header-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
  .header-sub{font-size:11px;color:var(--text-muted)}

  .breadcrumb{padding:10px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;background:var(--surface)}
  .breadcrumb-link{color:var(--accent);cursor:pointer} .breadcrumb-link:hover{text-decoration:underline}
  .breadcrumb-sep{color:var(--text-muted)} .breadcrumb-current{color:var(--text)}

  .content{padding:28px 32px;max-width:900px;margin:0 auto}
  .section-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
  .section-desc{font-size:14px;color:var(--text-muted);line-height:1.6;max-width:600px}

  .dim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-top:24px}
  .dim-card{padding:20px 22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s}
  .dim-card:hover{border-color:var(--accent);background:var(--surface-light)}
  .dim-icon{font-size:26px;margin-bottom:10px} .dim-name{font-size:15px;font-weight:700;margin-bottom:6px}
  .dim-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:12px}
  .dim-count{font-size:11px;color:var(--accent);font-weight:600}

  .back-link{font-size:12px;color:var(--accent);cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
  .back-link:hover{text-decoration:underline}
  .dim-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .dim-header-icon{font-size:30px} .dim-header-title{font-size:24px;font-weight:800;letter-spacing:-0.5px}

  .item-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .item-row{padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:space-between;transition:all 0.2s}
  .item-row.available{cursor:pointer} .item-row.available:hover{border-color:var(--accent);background:var(--surface-light)}
  .item-row.unavailable{opacity:0.45}
  .item-name{font-size:14px;font-weight:600} .item-meta{font-size:11px;color:var(--text-muted);margin-top:4px}
  .item-arrow{color:var(--accent);font-size:18px}
  .item-coming{font-size:10px;color:var(--text-muted);padding:4px 10px;background:var(--surface-light);border-radius:4px;border:1px solid var(--border)}

  .entry-title{font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:6px}
  .entry-meta{font-size:12px;color:var(--text-muted);margin-bottom:24px}
  .question-box{padding:20px 24px;background:var(--accent-glow);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;margin-bottom:28px}
  .label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
  .label-accent{color:var(--accent)}
  .question-text{font-size:15px;color:var(--text);line-height:1.6}
  .param-box{padding:14px 18px;background:var(--surface-light);border:1px solid var(--border);border-radius:8px;margin-bottom:28px}
  .param-value{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);margin-top:4px}
  .consideration-text{font-size:14px;color:var(--text);line-height:1.7;opacity:0.9;margin-bottom:28px}

  .threshold-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
  .threshold-band{display:flex;gap:16px;padding:14px 18px;border-radius:8px;align-items:flex-start}
  .threshold-range{width:125px;min-width:125px;max-width:125px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;padding-top:1px;line-height:1.35;white-space:normal;overflow-wrap:break-word}
  .threshold-rating{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .threshold-guidance{font-size:13px;color:var(--text);line-height:1.6;margin-top:4px;opacity:0.85}

  .alt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:28px}
  .alt-item{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;background:var(--surface-light);border-radius:6px;border:1px solid var(--border)}
  .alt-num{width:22px;height:22px;border-radius:50%;background:rgba(59,130,246,0.15);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
  .alt-text{font-size:13px;color:var(--text);opacity:0.9;line-height:1.6}
  .alt-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
  .alt-desc{font-size:13px;color:var(--text);opacity:0.85;line-height:1.6}

  .applicability-box{margin-top:28px;margin-bottom:28px;padding:14px 18px;background:var(--yellow-bg);border:1px solid rgba(234,179,8,0.28);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0}
  .applicability-text{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;margin-bottom:12px}
  .applicability-list{display:flex;flex-direction:column;gap:8px}
  .applicability-item{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9}
  .applicability-item strong{color:var(--text)}
  .applicability-item ul{padding-left:22px;margin:8px 0}
  .applicability-item li{margin-bottom:6px}

  .worked-example-box{margin-top:8px;margin-bottom:28px;padding:18px 22px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.25);border-left:3px solid var(--accent);border-radius:0 8px 8px 0}
  .worked-example-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
  .worked-example-caveat{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.55;margin-bottom:14px}
  .worked-example-headline{font-size:14px;font-weight:600;color:var(--text);line-height:1.6;margin-bottom:14px}
  .worked-example-table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:13px}
  .worked-example-table th{text-align:left;padding:8px 10px;background:var(--surface-light);border:1px solid var(--border);color:var(--text);font-weight:700;font-size:12px}
  .worked-example-table td{padding:8px 10px;border:1px solid var(--border);color:var(--text);opacity:0.9}
  .worked-example-howto{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;margin-bottom:4px}
  .worked-example-howto strong{color:var(--text);opacity:1}
  .worked-example-howto em{color:var(--text-muted);font-style:italic}
  .worked-example-howto ul{padding-left:22px;margin:8px 0;list-style:disc}
  .worked-example-howto li{margin-bottom:6px;line-height:1.6}
  .worked-example-assumptions{margin-top:16px;padding-top:14px;border-top:1px solid rgba(59,130,246,0.18)}
  .worked-example-assumptions-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .worked-example-assumptions ul{padding-left:20px;margin:6px 0;list-style:disc}
  .worked-example-assumptions li{font-size:12px;color:var(--text);line-height:1.55;opacity:0.75;margin-bottom:4px}
  .worked-example-assumptions-note{font-size:12px;color:var(--text-muted);line-height:1.55;margin-top:8px;font-style:italic}

  .evidence-box{padding:14px 18px;background:var(--surface-light);border-radius:8px;border:1px solid var(--border)}
  .evidence-text{font-size:13px;color:var(--text);line-height:1.6;opacity:0.8}
  .evidence-text ul,.applicability-text ul,.consideration-text ul,.alt-desc ul{padding-left:22px;margin:8px 0}
  .evidence-text li,.applicability-text li,.consideration-text li,.alt-desc li{margin-bottom:6px}

  .date-stamp{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:24px}
  .date-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
  .date-value{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);margin-top:2px}

  .examples-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px;margin-bottom:20px}
  .example-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
  .example-card img{width:100%;max-height:200px;object-fit:cover;display:block;background:#1e2a3a}
  .example-caption{padding:14px 16px;background:var(--surface-light);border-top:1px solid var(--border);flex:1}
  .example-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:8px}
  .example-tag.concern{background:var(--red-bg);color:var(--red)}
  .example-tag.acceptable{background:var(--yellow-bg);color:var(--yellow)}
  .example-tag.recommended{background:var(--green-bg);color:var(--green)}
  .example-desc{font-size:13px;color:var(--text);line-height:1.6;opacity:0.8}

  .supporting-images-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;margin-bottom:28px;align-items:stretch}
  .supporting-image-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
  .supporting-image-card img{width:100%;height:160px;object-fit:cover;display:block;background:#1e2a3a;flex-shrink:0}
  .supporting-image-title{padding:14px 16px;font-size:13px;color:var(--text);background:var(--surface-light);border-top:1px solid var(--border);line-height:1.6;opacity:0.8;flex:1}
  .supporting-image-title strong{color:var(--text);font-weight:700;display:block;margin-bottom:6px;opacity:1}
  .supporting-image-card img,.example-card img{cursor:pointer;transition:opacity 0.2s}
  .supporting-image-card img:hover,.example-card img:hover{opacity:0.8}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:fadeIn 0.2s ease}
  .lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}

  .loc-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text-muted);background:var(--surface-light);border:1px solid var(--border);border-radius:4px;padding:2px 8px;letter-spacing:0.3px}
  .loc-tag svg{width:10px;height:10px;fill:var(--text-muted);flex-shrink:0}
  .loc-filter{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
  .loc-filter-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
  .loc-filter select{background:var(--surface-light);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;outline:none}
  .loc-filter select:focus{border-color:var(--accent)}
  .loc-filter-count{font-size:11px;color:var(--text-muted);margin-left:auto}

  /* ===== GUIDE CARD (home grid) ===== */
  .guide-card{position:relative;background:linear-gradient(135deg,rgba(59,130,246,0.13),rgba(99,102,241,0.06));border-color:rgba(59,130,246,0.45)}
  .guide-card:hover{border-color:var(--accent);background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(99,102,241,0.1))}
  .guide-pill{position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;background:var(--accent);padding:3px 9px;border-radius:20px}
  .guide-card .dim-count{color:var(--accent)}

  /* ===== GUIDE VIEW ===== */
  .guide-sub{font-size:13px;color:var(--text-muted);line-height:1.6;max-width:660px;margin:6px 0 14px}
  .guide-callout{margin-top:22px;padding:18px 22px;background:var(--yellow-bg);border:1px solid rgba(234,179,8,0.28);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0}
  .guide-point{margin-bottom:14px} .guide-point:last-child{margin-bottom:0}
  .guide-point-lead{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
  .guide-point-text{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9}

  .legend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0 8px}
  .legend-item{display:flex;gap:12px;padding:14px 16px;border-radius:8px;align-items:flex-start}
  .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px}
  .legend-rating{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .legend-meaning{font-size:13px;color:var(--text);line-height:1.55;opacity:0.85}

  .anatomy-block{display:grid;grid-template-columns:240px 1fr;gap:22px;align-items:start;margin-bottom:12px;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
  .anatomy-side{display:flex;gap:10px;align-items:flex-start}
  .anatomy-num{width:24px;height:24px;border-radius:50%;background:var(--accent-glow);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'JetBrains Mono',monospace}
  .anatomy-field{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
  .anatomy-caption{font-size:12px;color:var(--text-muted);line-height:1.55}
  .anatomy-component{min-width:0}
  .guide-more{font-size:13px;color:var(--text);line-height:1.65;opacity:0.9;margin-top:6px;padding:14px 18px;background:var(--surface-light);border:1px solid var(--border);border-radius:8px}
  .guide-link,.shape-link{color:var(--accent);cursor:pointer;font-weight:600;white-space:nowrap}
  .guide-link:hover,.shape-link:hover{text-decoration:underline}

  .trace-flow{display:flex;align-items:stretch;gap:10px;margin:10px 0 8px;flex-wrap:wrap}
  .trace-step{flex:1;min-width:150px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
  .trace-step-label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:6px}
  .trace-step-value{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.3}
  .trace-step-sub{font-size:12px;color:var(--text-muted);line-height:1.5}
  .trace-arrow{display:flex;align-items:center;color:var(--accent);font-size:20px;font-weight:700}



  .dimension-guide-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:10px 0 8px}
  .dimension-guide-card{padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column}
  .dimension-guide-icon{font-size:24px;margin-bottom:8px;line-height:1}
  .dimension-guide-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:14px}
  .dimension-guide-label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:8px}
  .dimension-guide-text{font-size:12px;color:var(--text);line-height:1.55;opacity:0.8;margin-bottom:0}
  .dimension-guide-question{font-size:13px;color:var(--text);font-weight:600;line-height:1.5;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}

  /* ===== WHAT IS THE FRAMEWORK (two obligations) ===== */
  .whatis-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 0}
  .whatis-col{padding:18px 20px;border-radius:10px;display:flex;flex-direction:column;border:1px solid var(--border)}
  .whatis-col.compliance{background:var(--surface);opacity:0.78}
  .whatis-col.duty{background:rgba(59,130,246,0.06);border-color:rgba(59,130,246,0.35)}
  .whatis-heading{font-size:16px;font-weight:800;letter-spacing:-0.2px;color:var(--text);margin-bottom:2px}
  .whatis-col.duty .whatis-heading{color:var(--accent)}
  .whatis-sub{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:14px}
  .whatis-items{list-style:none;padding:0;margin:0 0 14px;display:flex;flex-direction:column;gap:8px}
  .whatis-items li{font-size:13px;color:var(--text);line-height:1.5;opacity:0.92;padding-left:18px;position:relative}
  .whatis-items li::before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;background:var(--text-muted)}
  .whatis-col.duty .whatis-items li::before{background:var(--accent)}
  .whatis-foot{font-size:12px;color:var(--text-muted);line-height:1.55;margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}
  .whatis-foot strong{color:var(--text)}
  .whatis-payoff{margin-top:auto;padding-top:12px;border-top:1px solid rgba(59,130,246,0.3)}
  .whatis-foot-lead{font-size:12px;color:var(--text-muted);line-height:1.55;margin-bottom:12px}
  .whatis-framework{padding:14px 16px;background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(99,102,241,0.09));border:1px solid var(--accent);border-radius:8px}
  .whatis-framework-badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;background:var(--accent);padding:4px 11px;border-radius:20px;margin-bottom:9px}
  .whatis-framework-text{font-size:13px;color:var(--text);line-height:1.6}
  .whatis-caption{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;margin-top:14px;padding:14px 18px;background:var(--surface-light);border:1px solid var(--border);border-radius:8px}

    .shape-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:10px 0 8px}
  .shape-card{padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column}
  .shape-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);background:var(--accent-glow);padding:3px 10px;border-radius:4px;align-self:flex-start;margin-bottom:10px}
  .shape-param{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:8px}
  .shape-desc{font-size:12px;color:var(--text-muted);line-height:1.55;margin-bottom:12px}
  .shape-thresholds{gap:6px;margin-bottom:14px}
  .shape-thresholds .threshold-band{padding:9px 12px;align-items:center}
  .shape-thresholds .threshold-range{width:auto;min-width:0;max-width:none;font-size:12px}
  .shape-thresholds .threshold-rating{font-size:9px}
  .shape-link{margin-top:auto;font-size:12px}

  .faq-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .faq-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .faq-q{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:14px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text)}
  .faq-q:hover{background:var(--surface-light)}
  .faq-chevron{color:var(--accent);font-size:20px;font-weight:400;flex-shrink:0;line-height:1}
  .faq-a{display:none;padding:0 18px 16px;font-size:13px;color:var(--text);line-height:1.65;opacity:0.85}
  .faq-a.open{display:block}

  @media(max-width:640px){
    .content{padding:20px 16px} .header{padding:16px} .breadcrumb{padding:10px 16px}
    .dim-grid{grid-template-columns:1fr} .examples-grid{grid-template-columns:1fr}
    .supporting-images-grid{grid-template-columns:1fr 1fr} .date-stamp{flex-direction:column;gap:8px}
    .legend-grid{grid-template-columns:1fr} .shape-grid{grid-template-columns:1fr} .dimension-guide-grid{grid-template-columns:1fr} .whatis-grid{grid-template-columns:1fr}
    .anatomy-block{grid-template-columns:1fr;gap:12px} .trace-arrow{transform:rotate(90deg);width:100%;justify-content:center}
  }
</style>
</head>
<body>
<div id="app"><div class="content" style="text-align:center;padding-top:80px;color:var(--text-muted)">Loading framework...</div></div>
<script>
// ===== STATE =====
let dimensions = [];
let guide = null;
let state = { view:'home', dimId:null, itemIndex:null, locationFilter:null };

// ===== HELPERS =====
function colorVar(c){const m={green:'--green',orange:'--orange',red:'--red',yellow:'--yellow'};return `var(${m[c]||'--green'})`}
function bgVar(c){const m={green:'--green-bg',orange:'--orange-bg',red:'--red-bg',yellow:'--yellow-bg'};return `var(${m[c]||'--green-bg'})`}
function getDim(){return dimensions.find(d=>d.id===state.dimId)}
function getItem(){const dim=getDim();return dim?dim.items[state.itemIndex]:null}

// ===== LOCATION HELPERS =====
const PIN_SVG='<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>';
function locLabel(loc){if(!loc)return'';return loc.state?`${loc.state}, ${loc.country}`:loc.country}
function locTag(loc){if(!loc)return'';return `<span class="loc-tag">${PIN_SVG} ${locLabel(loc)}</span>`}
function getLocations(dim){
  const locs=new Map();
  dim.items.forEach(item=>{
    if(item.available&&item.data&&item.data.location){
      const loc=item.data.location;
      if(!locs.has(loc.country))locs.set(loc.country,new Set());
      if(loc.state)locs.get(loc.country).add(loc.state);
    }
  });
  return locs;
}
function itemMatchesFilter(item){
  if(!state.locationFilter)return true;
  if(!item.available||!item.data||!item.data.location)return !state.locationFilter;
  const loc=item.data.location;
  const f=state.locationFilter;
  if(f.state)return loc.country===f.country&&loc.state===f.state;
  return loc.country===f.country;
}

// ===== LOAD DATA =====
async function loadData(){
  try{
    const resp=await fetch('data.json');
    const data=await resp.json();
    dimensions=data.dimensions;
    guide=data.guide||null;
  }catch(e){
    document.getElementById('app').innerHTML='<div class="content" style="text-align:center;padding-top:80px;color:var(--red)">Error loading framework data. Make sure data.json is in the same folder as this file.</div>';
  }
}

// ===== RENDER =====
function render(){
  const app=document.getElementById('app');
  app.innerHTML=renderHeader()+(state.view==='guide'?renderBreadcrumb()+renderGuideView():state.view==='entry'?renderBreadcrumb()+renderEntryDetail():state.view==='dimension'?renderBreadcrumb()+renderDimensionView():renderHomeView());
}

function renderHeader(){
  return `<div class="header"><div class="header-left"><div class="logo">C</div><div><div class="header-title">Constructability Framework</div><div class="header-sub">Design Guidance</div></div></div></div>`;
}

function renderBreadcrumb(){
  const dim=getDim(),item=getItem();
  let h='<div class="breadcrumb"><span class="breadcrumb-link" onclick="goHome()">Framework</span>';
  if(state.view==='guide'){return h+'<span class="breadcrumb-sep">›</span><span class="breadcrumb-current">'+(guide?guide.title:'Guide')+'</span></div>';}
  if(dim){
    h+='<span class="breadcrumb-sep">›</span>';
    if(item){h+=`<span class="breadcrumb-link" onclick="goDimension('${dim.id}')">${dim.name}</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">${item.name}</span>`}
    else{h+=`<span class="breadcrumb-current">${dim.name}</span>`}
  }
  return h+'</div>';
}

function renderHomeView(){
  const cards=dimensions.map(d=>`<div class="dim-card" onclick="goDimension('${d.id}')"><div class="dim-icon">${d.icon}</div><div class="dim-name">${d.name}</div><div class="dim-desc">${d.description}</div><div class="dim-count">${d.items.length} items →</div></div>`).join('');
  const guideCard=guide?`<div class="dim-card guide-card" onclick="goGuide()"><div class="guide-pill">Start here</div><div class="dim-icon">${guide.icon}</div><div class="dim-name">${guide.title}</div><div class="dim-desc">${guide.tagline}</div><div class="dim-count">Open guide →</div></div>`:'';
  return `<div class="content animate-in"><div style="margin-bottom:24px"><h1 class="section-title">Framework Dimensions</h1><p class="section-desc">Select a constructability dimension to explore general guidance, design entries with threshold-based ratings, and recommended actions for design decisions.</p></div><div class="dim-grid">${guideCard}${cards}</div></div>`;
}

// ===== GUIDE (how-to-use) =====
function findEntry(dimId,name){
  const dim=dimensions.find(d=>d.id===dimId);
  if(!dim)return null;
  const index=dim.items.findIndex(it=>it.name===name);
  if(index<0)return null;
  return {dim,item:dim.items[index],index};
}
// The fragments below mirror the markup used in renderEntryDetail so the guide
// shows the genuine live entry components rather than stale screenshots.
function gThresholds(d,compact){
  return d.thresholds.map(t=>`<div class="threshold-band" style="background:${bgVar(t.color)};border:1px solid ${colorVar(t.color)}33;"><div class="threshold-range" style="color:${colorVar(t.color)}">${t.range}</div><div style="flex:1"><div class="threshold-rating" style="color:${colorVar(t.color)}">${t.rating}</div>${compact?'':`<div class="threshold-guidance">${t.guidance}</div>`}</div></div>`).join('');
}
function gActions(d){
  return (d.alternatives||[]).filter(a=>a).map((a,i)=>{
    if(typeof a==='string')return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text">${a}</div></div>`;
    return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text"><div class="alt-title">${a.title}</div><div class="alt-desc">${a.description}</div></div></div>`;
  }).join('');
}
function gApplicability(d){
  if(!d.applicability)return '';
  const a=d.applicability;
  return `<div class="applicability-box" style="margin-top:0;margin-bottom:0"><div class="label" style="color:var(--yellow)">Applicability and Limitations</div>${a.appliesWhere?`<div class="applicability-text"><strong>Applies where:</strong> ${a.appliesWhere}</div>`:''}${a.checks&&a.checks.length>0?`<div class="applicability-text" style="margin-bottom:8px"><strong>Check before applying this guidance:</strong></div><div class="applicability-list">${a.checks.map(c=>`<div class="applicability-item"><strong>${c.title}:</strong> ${c.description}</div>`).join('')}</div>`:''}${a.note?`<div class="applicability-text" style="margin-top:12px;margin-bottom:0"><strong>Note:</strong> ${a.note}</div>`:''}</div>`;
}
function gAnatomyBlock(n,field,inner){
  return `<div class="anatomy-block"><div class="anatomy-side"><div class="anatomy-num">${n}</div><div><div class="anatomy-field">${field.label}</div><div class="anatomy-caption">${field.caption}</div></div></div><div class="anatomy-component">${inner}</div></div>`;
}
function toggleFaq(i){
  const a=document.getElementById('faq-a-'+i),c=document.getElementById('faq-chev-'+i);
  if(!a)return;
  const open=a.classList.toggle('open');
  if(c)c.textContent=open?'–':'+';
}

function renderGuideView(){
  if(!guide)return `<div class="content animate-in"><div class="back-link" onclick="goHome()">← Back to dimensions</div><p class="section-desc">Guide content not found. Make sure data.json includes a "guide" object.</p></div>`;
  const g=guide;
  let html=`<div class="back-link" onclick="goHome()">← Back to dimensions</div><div class="dim-header"><span class="dim-header-icon">${g.icon}</span><h1 class="dim-header-title">${g.title}</h1></div><p class="section-desc">${g.intro}</p>`;

  // What is the framework — two obligations, framework nested INSIDE the duty column
  if(g.whatIs){
    const w=g.whatIs;
    const fwCard=w.framework?`<div class="whatis-framework"><div class="whatis-framework-badge">${w.framework.label}</div><div class="whatis-framework-text">${w.framework.text}</div></div>`:'';
    const cols=(w.columns||[]).map(c=>{
      const items=(c.items||[]).map(i=>`<li>${i}</li>`).join('');
      let payoff='';
      if(c.kind==='duty'){
        payoff=`<div class="whatis-payoff">${c.foot?`<div class="whatis-foot-lead">${c.foot}</div>`:''}${fwCard}</div>`;
      }else if(c.foot){
        payoff=`<div class="whatis-foot">${c.foot}</div>`;
      }
      return `<div class="whatis-col ${c.kind}"><div class="whatis-heading">${c.heading}</div><div class="whatis-sub">${c.sub}</div><ul class="whatis-items">${items}</ul>${payoff}</div>`;
    }).join('');
    html+=`<div class="label" style="margin-top:30px">${w.title}</div><p class="guide-sub">${w.intro}</p><div class="whatis-grid">${cols}</div>`;
    if(w.caption){html+=`<div class="whatis-caption">${w.caption}</div>`;}
  }

  // Five dimensions / root-cause explanation — routing first, before the rating mechanics
  if(g.dimensionsGuide){
    const cards=g.dimensionsGuide.items.map(it=>{
      const dim=dimensions.find(d=>d.id===it.dimId);
      if(!dim)return '';
      return `<div class="dimension-guide-card"><div class="dimension-guide-icon">${dim.icon}</div><div class="dimension-guide-name">${dim.name}</div><div class="dimension-guide-label">Root cause</div><div class="dimension-guide-text">${it.rootCause}</div><div class="dimension-guide-question">${it.question}</div></div>`;
    }).join('');
    html+=`<div class="label" style="margin-top:36px">${g.dimensionsGuide.title}</div><p class="guide-sub">${g.dimensionsGuide.intro}</p><div class="dimension-guide-grid">${cards}</div>${g.dimensionsGuide.note?`<div class="guide-more">${g.dimensionsGuide.note}</div>`:''}`;
  }

  // Engineering-judgement callout, placed up front so it cannot be missed
  if(g.judgement){
    html+=`<div class="guide-callout"><div class="label" style="color:var(--yellow)">${g.judgement.title}</div>${g.judgement.points.map(p=>`<div class="guide-point"><div class="guide-point-lead">${p.lead}</div><div class="guide-point-text">${p.text}</div></div>`).join('')}</div>`;
  }


  // Rating legend in the four live colours
  if(g.ratingLegend){
    html+=`<div class="label" style="margin-top:32px">${g.ratingLegend.title}</div><p class="guide-sub">${g.ratingLegend.intro}</p><div class="legend-grid">${g.ratingLegend.items.map(it=>`<div class="legend-item" style="background:${bgVar(it.color)};border:1px solid ${colorVar(it.color)}33"><div class="legend-dot" style="background:${colorVar(it.color)}"></div><div><div class="legend-rating" style="color:${colorVar(it.color)}">${it.rating}</div><div class="legend-meaning">${it.meaning}</div></div></div>`).join('')}</div>`;
  }

  // Anatomy of a real entry, rendered from live components
  if(g.anatomy){
    const a=g.anatomy,ref=a.entryRef,found=findEntry(ref.dimId,ref.name),ad=found?found.item.data:null;
    html+=`<div class="label" style="margin-top:36px">${a.title}</div><p class="guide-sub">${a.intro}</p>`;
    if(ad){
      const f=a.fields;
      html+=gAnatomyBlock(1,f[0],`<div class="question-box" style="margin-bottom:0"><div class="label label-accent">Design Question</div><div class="question-text">${ad.question}</div></div>`);
      html+=gAnatomyBlock(2,f[1],`<div class="param-box" style="margin-bottom:0"><div class="label">Design Parameter</div><div class="param-value">${ad.parameter}</div></div>`);
      html+=gAnatomyBlock(3,f[2],`<div class="label">Design Guidance</div><div class="threshold-list" style="margin-top:10px;margin-bottom:0">${gThresholds(ad,false)}</div>`);
      html+=gAnatomyBlock(4,f[3],gApplicability(ad));
      html+=gAnatomyBlock(5,f[4],`<div class="label">Recommended Actions</div><div class="alt-list" style="margin-top:10px;margin-bottom:0">${gActions(ad)}</div>`);
      html+=`<div class="guide-more">${a.moreFields} ${found?`<span class="guide-link" onclick="goEntry('${ref.dimId}',${found.index})">Open the full entry →</span>`:''}</div>`;
    }else{
      html+=`<p class="guide-sub">Reference entry not found in data.json.</p>`;
    }
  }

  // condition -> band -> response trace
  if(g.trace){
    const steps=g.trace.steps.map((s,i)=>`<div class="trace-step" style="${s.color?`background:${bgVar(s.color)};border-color:${colorVar(s.color)}66`:''}"><div class="trace-step-label">${s.label}</div><div class="trace-step-value" style="${s.color?`color:${colorVar(s.color)}`:''}">${s.value}</div><div class="trace-step-sub">${s.sub}</div></div>${i<g.trace.steps.length-1?'<div class="trace-arrow">→</div>':''}`).join('');
    html+=`<div class="label" style="margin-top:36px">${g.trace.title}</div><p class="guide-sub">${g.trace.intro}</p><div class="trace-flow">${steps}</div>`;
  }

  // The parameter takes different shapes (numeric / categorical / qualitative)
  if(g.shapes){
    const cards=g.shapes.items.map(s=>{
      const found=findEntry(s.entryRef.dimId,s.entryRef.name),sd=found?found.item.data:null;
      return `<div class="shape-card"><div class="shape-tag">${s.shape}</div><div class="shape-param">${sd?sd.parameter:''}</div><div class="shape-desc">${s.desc}</div><div class="threshold-list shape-thresholds">${sd?gThresholds(sd,true):''}</div>${found?`<div class="shape-link" onclick="goEntry('${s.entryRef.dimId}',${found.index})">See full entry →</div>`:''}</div>`;
    }).join('');
    html+=`<div class="label" style="margin-top:36px">${g.shapes.title}</div><p class="guide-sub">${g.shapes.intro}</p><div class="shape-grid">${cards}</div>`;
  }

  // FAQ accordion
  if(g.faq){
    html+=`<div class="label" style="margin-top:36px">${g.faq.title}</div><div class="faq-list">${g.faq.items.map((f,i)=>`<div class="faq-item"><div class="faq-q" onclick="toggleFaq(${i})"><span>${f.q}</span><span class="faq-chevron" id="faq-chev-${i}">+</span></div><div class="faq-a" id="faq-a-${i}">${f.a}</div></div>`).join('')}</div>`;
  }

  return `<div class="content animate-in">${html}</div>`;
}

function renderDimensionView(){
  const dim=getDim();
  
  // Build location filter options
  const locs=getLocations(dim);
  let filterHtml='';
  if(locs.size>0){
    let opts='<option value="">All regions</option>';
    for(const [country,states] of locs){
      opts+=`<option value="${country}" ${state.locationFilter&&state.locationFilter.country===country&&!state.locationFilter.state?'selected':''}>${country}</option>`;
      for(const st of [...states].sort()){
        const val=`${country}|${st}`;
        opts+=`<option value="${val}" ${state.locationFilter&&state.locationFilter.state===st?'selected':''}>&nbsp;&nbsp;${st}, ${country}</option>`;
      }
    }
    const matchCount=dim.items.filter(item=>itemMatchesFilter(item)).length;
    const totalAvail=dim.items.filter(item=>item.available).length;
    const countText=state.locationFilter?`Showing ${matchCount} of ${totalAvail} entries`:'';
    filterHtml=`<div class="loc-filter"><div class="loc-filter-label">Region</div><select onchange="setLocationFilter(this.value)">${opts}</select><div class="loc-filter-count">${countText}</div></div>`;
  }

  const items=dim.items.map((item,i)=>{
    const matches=itemMatchesFilter(item);
    const hidden=state.locationFilter&&!matches&&item.available?'style="display:none"':'';
    const cls=item.available?'item-row available':'item-row unavailable';
    const onclick=item.available?`onclick="goEntry('${dim.id}',${i})"`:'';
    const loc=item.available&&item.data&&item.data.location?locTag(item.data.location):'';
    const right=item.available?`<div style="text-align:right"><div class="item-arrow">→</div>${item.data?`<div class="item-meta">Reviewed ${item.data.dateReviewed || item.data.dateAdded}</div>`:''}</div>`:'<div class="item-coming">Coming soon</div>';
    const meta=item.available&&item.data?`<div class="item-meta">Parameter: ${item.data.parameter}</div>`:'';
    return `<div class="${cls}" ${onclick} ${hidden}><div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div class="item-name">${item.name}</div>${loc}</div>${meta}</div>${right}</div>`;
  }).join('');

  let guidanceHtml='';
  if(dim.generalGuidance&&dim.generalGuidance.length>0){
    guidanceHtml=`<div style="margin-top:20px;margin-bottom:24px;padding:18px 22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;"><div class="label" style="margin-bottom:10px">General Guidance</div>${dim.generalGuidance.map(g=>`<div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;"><div style="color:var(--accent);font-size:14px;margin-top:1px;flex-shrink:0;">•</div><div style="font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;">${g}</div></div>`).join('')}</div>`;
  }

  return `<div class="content animate-in"><div class="back-link" onclick="goHome()">← Back to dimensions</div><div class="dim-header"><span class="dim-header-icon">${dim.icon}</span><h1 class="dim-header-title">${dim.name}</h1></div><p class="section-desc">${dim.description}</p>${guidanceHtml}${filterHtml}<div class="label">Entries</div><div class="item-list">${items}</div></div>`;
}

function renderEntryDetail(){
  const dim=getDim(),item=getItem(),d=item.data;

  const thresholds=d.thresholds.map(t=>`<div class="threshold-band" style="background:${bgVar(t.color)};border:1px solid ${colorVar(t.color)}33;"><div class="threshold-range" style="color:${colorVar(t.color)}">${t.range}</div><div style="flex:1"><div class="threshold-rating" style="color:${colorVar(t.color)}">${t.rating}</div><div class="threshold-guidance">${t.guidance}</div></div></div>`).join('');

  const alts=(d.alternatives||[]).filter(a=>a).map((a,i)=>{
    if(typeof a==='string'){
      return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text">${a}</div></div>`;
    }
    return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text"><div class="alt-title">${a.title}</div><div class="alt-desc">${a.description}</div></div></div>`;
  }).join('');

  const applicabilityHtml=d.applicability?`
    <div class="applicability-box">
      <div class="label" style="color:var(--yellow)">Applicability and Limitations</div>
      ${d.applicability.appliesWhere?`<div class="applicability-text"><strong>Applies where:</strong> ${d.applicability.appliesWhere}</div>`:''}
      ${d.applicability.checks&&d.applicability.checks.length>0?`
        <div class="applicability-text" style="margin-bottom:8px"><strong>Check before applying this guidance:</strong></div>
        <div class="applicability-list">
          ${d.applicability.checks.map(c=>`<div class="applicability-item"><strong>${c.title}:</strong> ${c.description}</div>`).join('')}
        </div>
      `:''}
      ${d.applicability.note?`<div class="applicability-text" style="margin-top:12px;margin-bottom:0"><strong>Note:</strong> ${d.applicability.note}</div>`:''}
    </div>
  `:'';

  const notesHtml=d.additionalNotes?`<div style="margin-top:12px;padding:12px 16px;background:var(--surface-light);border:1px solid var(--border);border-radius:6px;"><div style="font-size:10px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Note</div><div style="font-size:13px;color:var(--text);line-height:1.6;opacity:0.85;">${d.additionalNotes}</div></div>`:'';

  const workedExampleHtml=d.workedExample?(()=>{
    const we=d.workedExample;
    const tableHtml=we.tableHeaders&&we.tableRows?`<table class="worked-example-table"><thead><tr>${we.tableHeaders.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${we.tableRows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'';
    const assumptionsHtml=we.assumptions&&we.assumptions.length>0?`<div class="worked-example-assumptions"><div class="worked-example-assumptions-title">${we.assumptionsTitle||'How these numbers were derived'}</div><ul>${we.assumptions.map(a=>`<li>${a}</li>`).join('')}</ul>${we.assumptionsNote?`<div class="worked-example-assumptions-note">${we.assumptionsNote}</div>`:''}</div>`:'';
    return `<div class="worked-example-box"><div class="worked-example-title">${we.title||'Worked example'}</div>${we.caveat?`<div class="worked-example-caveat">${we.caveat}</div>`:''}${we.headline?`<div class="worked-example-headline">${we.headline}</div>`:''}${tableHtml}${we.howToUse?`<div class="worked-example-howto"><strong>How to use it:</strong> ${we.howToUse}</div>`:''}${assumptionsHtml}</div>`;
  })():'';

  const examplesHtml=d.examples&&d.examples.length>0?`<div style="margin-top:28px"><div class="label">Examples</div><div class="examples-grid">${d.examples.map(ex=>`<div class="example-card">${ex.image?`<img src="${ex.image}" alt="${ex.caption}" onclick="openLightbox('${ex.image}')">`:''}<div class="example-caption"><div class="example-tag ${ex.tag}">${ex.tag==='concern'?'Concern':ex.tag==='acceptable'?'Acceptable':'Recommended'}</div><div class="example-desc">${ex.caption}</div></div></div>`).join('')}</div></div>`:'';

  const supportingImagesHtml=d.supportingImages&&d.supportingImages.length>0?`<div style="margin-top:20px"><div class="label">Supporting Images</div><div class="supporting-images-grid">${d.supportingImages.map(sp=>`<div class="supporting-image-card">${sp.image?`<img src="${sp.image}" alt="${sp.title}" onclick="openLightbox('${sp.image}')">`:''}<div class="supporting-image-title">${sp.title}</div></div>`).join('')}</div></div>`:'';

  return `<div class="content animate-in">
    <div class="back-link" onclick="goDimension('${dim.id}')">← Back to ${dim.name}</div>
    <div class="entry-title">${item.name}</div>
    <div class="entry-meta">Dimension: ${dim.name} · Reinforced Concrete ${d.location?' · '+locTag(d.location):''}</div>
    <div class="question-box"><div class="label label-accent">Design Question</div><div class="question-text">${d.question}</div></div>
    ${d.background?`<div class="label">Background</div><div class="consideration-text">${d.background}</div>`:''}
    <div class="param-box"><div class="label">Design Parameter</div><div class="param-value">${d.parameter}</div></div>
    <div class="label">Design Guidance</div><div class="threshold-list" style="margin-top:10px">${thresholds}</div>
    ${notesHtml}
    ${workedExampleHtml}
    ${applicabilityHtml}
    ${alts.length>0?`<div class="label" style="margin-top:28px">Recommended Actions</div><div class="alt-list" style="margin-top:10px">${alts}</div>`:''}
    ${d.evidence?`<div class="evidence-box"><div class="label">Evidence Basis</div><div class="evidence-text">${d.evidence}</div></div>`:''}
    ${examplesHtml}
    ${supportingImagesHtml}
    <div class="date-stamp"><div><div class="date-label">Entry Added</div><div class="date-value">${d.dateAdded}</div></div><div><div class="date-label">Last Reviewed</div><div class="date-value">${d.dateReviewed}</div></div></div>
  </div>`;
}

// ===== LIGHTBOX =====
function openLightbox(src){const lb=document.createElement('div');lb.className='lightbox';lb.onclick=()=>lb.remove();lb.innerHTML=`<img src="${src}">`;document.body.appendChild(lb)}

// ===== HASH-BASED NAVIGATION =====
function goHome(){window.location.hash=''}
function goGuide(){window.location.hash='guide'}
function goDimension(id){state.locationFilter=null;window.location.hash=id}
function goEntry(dimId,idx){window.location.hash=dimId+'/'+idx}
function setLocationFilter(val){
  if(!val){state.locationFilter=null}
  else if(val.includes('|')){const[c,s]=val.split('|');state.locationFilter={country:c,state:s}}
  else{state.locationFilter={country:val}}
  render();
}

function parseHash(){
  const hash=window.location.hash.replace(/^#\/?/,'');
  if(!hash){state.view='home';state.dimId=null;state.itemIndex=null;state.locationFilter=null;}
  else if(hash==='guide'){state.view='guide';state.dimId=null;state.itemIndex=null;state.locationFilter=null;}
  else if(hash.includes('/')){
    const[dimId,idx]=hash.split('/');
    state.view='entry';state.dimId=dimId;state.itemIndex=parseInt(idx,10);
  }else{
    state.view='dimension';state.dimId=hash;state.itemIndex=null;state.locationFilter=null;
  }
}

window.addEventListener('hashchange',()=>{parseHash();render()});

// ===== INIT =====
async function init(){
  await loadData();
  parseHash();
  render();
}
init();
</script>
</body>
</html>
