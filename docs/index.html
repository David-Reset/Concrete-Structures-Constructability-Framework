// ===== RECENTLY ADDED / BY DATE =====
function fmtDate(s){
  if(!s)return '';
  const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(s);
  if(!m)return s;
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(m[3],10)+' '+(months[parseInt(m[2],10)-1]||'')+' '+m[1];
}
// Shared date line for every entry row: always show Added; show "updated" only
// when the entry was reviewed after it was added. Single source of truth so all
// views (dimension, search, evidence index, recent, by-date) stay consistent.
function dateMeta(o){
  const added=o&&o.dateAdded?o.dateAdded:'';
  const rev=o&&o.dateReviewed?o.dateReviewed:'';
  if(!added&&!rev)return '';
  if(!added)return `<div class="item-meta">Updated ${fmtDate(rev)}</div>`;
  const upd=(rev&&rev>added)?`<div class="item-meta" style="margin-top:2px;color:var(--link)">updated ${fmtDate(rev)}</div>`:'';
  return `<div class="item-meta">Added ${fmtDate(added)}</div>${upd}`;
}
// The date an entry was last "touched" — the later of when it was added and when
// it was last reviewed. This is what the home strip and by-date view order on, so
// a revised old entry surfaces alongside brand-new ones (recent *activity*).
function activityDate(d){const a=d&&d.dateAdded?d.dateAdded:'';const r=d&&d.dateReviewed?d.dateReviewed:'';return a>r?a:r;}

// ===== ENTRY SORTING (shared across the browse + dimension views) =====
// One preference, remembered per browser, applied everywhere: 'default' keeps each
// list's authored/curated order untouched; 'added'/'reviewed' sort by date with a
// direction toggle. Undated or not-yet-live entries always sink to the bottom, so
// the arrow only ever reorders dated, available entries.
const SORT_MODE_KEY='entrySort.mode.v1', SORT_DIR_KEY='entrySort.dir.v1';
function loadSortPref(){try{
  const m=localStorage.getItem(SORT_MODE_KEY);
  if(m==='added'||m==='reviewed'||m==='default')state.sortMode=m;
  const d=localStorage.getItem(SORT_DIR_KEY);
  if(d==='asc'||d==='desc')state.sortDir=d;
}catch(e){}}
function setSortMode(v){state.sortMode=(v==='added'||v==='reviewed')?v:'default';try{localStorage.setItem(SORT_MODE_KEY,state.sortMode);}catch(e){}render();}
function toggleSortDir(){if(state.sortMode==='default')return;state.sortDir=state.sortDir==='asc'?'desc':'asc';try{localStorage.setItem(SORT_DIR_KEY,state.sortDir);}catch(e){}render();}
// The date a row is keyed on for the current sort. 'reviewed' falls back to the
// added date when an entry has never been revised, so it still slots in sensibly.
function entrySortValue(data,key){
  if(!data)return '';
  if(key==='added')return data.dateAdded||'';
  if(key==='reviewed')return data.dateReviewed||data.dateAdded||'';
  return '';
}
// Returns a sorted COPY; never mutates the input. In 'default' mode the list is
// returned untouched so the caller's authored order is preserved.
function applyEntrySort(list,getData,getName,getAvail){
  if(state.sortMode==='default')return list;
  const dir=state.sortDir==='asc'?-1:1; // base order is desc = newest first
  const key=state.sortMode;
  return list.slice().sort((a,b)=>{
    const aAv=getAvail?!!getAvail(a):true,bAv=getAvail?!!getAvail(b):true;
    if(aAv!==bAv)return aAv?-1:1;             // available entries first, always
    const av=entrySortValue(getData(a),key),bv=entrySortValue(getData(b),key);
    if(!!av!==!!bv)return av?-1:1;            // dated entries before undated, always
    if(av!==bv)return (av<bv?1:-1)*dir;       // newest first, flipped by the arrow
    return (getName(a)||'').localeCompare(getName(b)||'');
  });
}
function renderSortControl(defaultLabel){
  const mode=state.sortMode,dir=state.sortDir,isDefault=mode==='default';
  const dl=defaultLabel||'Framework order';
  const opt=(v,l)=>`<option value="${v}"${mode===v?' selected':''}>${l}</option>`;
  const arrowTxt=dir==='asc'?'\u2191 Oldest':'\u2193 Newest';
  const arrowTitle=isDefault?'Pick a date sort to change direction':(dir==='asc'?'Oldest first — click for newest':'Newest first — click for oldest');
  return `<div class="sort-control"><span class="sort-label">Sort</span><select class="sort-select" onchange="setSortMode(this.value)">${opt('default',dl)}${opt('added','Date added')}${opt('reviewed','Date updated')}</select><button class="sort-dir${isDefault?' disabled':''}" ${isDefault?'disabled ':''}onclick="toggleSortDir()" title="${arrowTitle}">${arrowTxt}</button></div>`;
}
// Live entries ordered by most recent activity — the later of dateAdded and
// dateReviewed — newest first, so a freshly revised old entry surfaces alongside
// brand-new ones. Ties break on dateAdded then name so the order is stable. Pass
// n to cap the list (e.g. the home page 3).
function recentEntries(n){
  const list=allAvailableEntries().filter(e=>e.data&&(e.data.dateAdded||e.data.dateReviewed));
  list.sort((a,b)=>{
    const aa=activityDate(a.data),ba=activityDate(b.data);
    if(aa!==ba)return aa<ba?1:-1;
    const ad=a.data.dateAdded||'',bd=b.data.dateAdded||'';
    if(ad!==bd)return ad<bd?1:-1;
    return (a.item.name||'').localeCompare(b.item.name||'');
  });
  return n?list.slice(0,n):list;
}
function renderRecentRow(e){
  const dim=e.dim,it=e.item,d=e.data;
  const loc=regionTag(d);
  const support=evidenceSupportPill(d);
  const param=d.parameter?`<div class="evidence-index-meta"><strong>Parameter:</strong> ${d.parameter}</div>`:'';
  const right=`<div style="text-align:right;flex-shrink:0"><div class="item-arrow">→</div>${dateMeta(d)}</div>`;
  return `<div class="item-row available evidence-index-result" onclick="goEntry('${dim.id}','${it.id}')"><div class="evidence-index-main"><div class="evidence-index-top"><span class="item-name">${escHtml(it.name)}</span><span class="related-dim"><span class="ico">${dim.icon}</span>${escHtml(dim.name)}</span>${loc}</div>${param}${support?`<div class="search-result-meta">${support}</div>`:''}</div>${right}</div>`;
}
// The home-page "Recent activity" strip exists to signal the framework is alive.
// It orders by most recent activity (added OR revised), so a freshly reworked old
// entry counts as recent, not just brand-new additions.
// It is a single collapsible: COLLAPSED BY DEFAULT, but the header line still
// carries the signal (the date of the newest entry) so the closed state isn't
// dead. Expanding reveals the rows; the open/closed choice is remembered per
// browser via localStorage so a returning visitor keeps their preference.
const RECENT_EXPANDED_KEY='recentlyAddedExpanded.v1';
function isRecentExpanded(){try{return localStorage.getItem(RECENT_EXPANDED_KEY)==='true';}catch(e){return false;}}
function setRecentExpanded(v){try{localStorage.setItem(RECENT_EXPANDED_KEY,v?'true':'false');}catch(e){}}
function toggleRecentExpanded(){setRecentExpanded(!isRecentExpanded());render();}
function renderRecentlyAdded(){
  const recent=recentEntries(3);
  if(!recent.length)return '';
  const expanded=isRecentExpanded();
  const latest=(recent[0]&&recent[0].data)?fmtDate(activityDate(recent[0].data)):'';
  const sig=latest?`<span class="recent-toggle-sig">latest ${latest}</span>`:'';
  const icon=expanded?'\u2212':'+'; // − when open, + when closed
  const header=`<div class="recent-toggle" role="button" tabindex="0" aria-expanded="${expanded}" aria-label="${expanded?'Collapse':'Expand'} recent activity" onclick="toggleRecentExpanded()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleRecentExpanded();}"><span class="recent-toggle-icon">${icon}</span><span class="recent-toggle-label">Recent activity</span>${sig}</div>`;
  if(!expanded)return `<div class="recent-wrap">${header}</div>`;
  const rows=recent.map(renderRecentRow).join('');
  return `<div class="recent-wrap">${header}<div class="item-list" style="margin-top:12px">${rows}</div><div style="margin-top:13px"><span class="breadcrumb-link" style="font-size:12px;font-weight:600" onclick="goByDate()">View all entries by date →</span></div></div>`;
}
function renderByDateView(){
  const list=recentEntries();
  const rows=list.map(renderRecentRow).join('');
  const n=list.length;
  return `<div class="content animate-in"><div class="back-link" onclick="goHome()">← Back to dimensions</div><div class="dim-header"><span class="dim-header-icon">🕑</span><h1 class="dim-header-title">All entries by date</h1></div><p class="section-desc">Every live entry, most recent activity first — a brand-new entry and a revision to an existing one both count as activity. Each row shows when it was added and, where it has been revised since, when it was last updated.</p><div class="label">${n} ${n===1?'entry':'entries'}</div><div class="item-list">${rows}</div></div>`;
}

// ===== EVIDENCE SUPPORT INDEX =====
function allAvailableEntries(){
  const out=[];
  dimensions.forEach(dim=>dim.items.forEach(it=>{
    if(it.available&&it.data){out.push({dim,item:it,data:it.data});}
  }));
  return out;
}
function evidenceSupportCounts(){
  const counts={all:0,high:0,medium:0,low:0};
  allAvailableEntries().forEach(e=>{
    const level=evidenceSupportLevel(e.data);
    counts.all++;
    if(counts[level]!==undefined)counts[level]++;
  });
  return counts;
}
function setEvidenceFilter(level){state.evidenceFilter=level||'all';render();}
function evidenceTypeMarkup(num,name,note){
  return `<div class="evidence-type"><div class="evidence-type-num">${num}</div><div><div class="evidence-type-name">${name}</div>${note?`<div class="evidence-type-note">${note}</div>`:''}</div></div>`;
}
function renderEvidenceRubric(){
  const highTypes=[
    [1,'Direct measurement / field data','Same element or parameter.'],
    [2,'First-principles physical derivation','Established dimensions or mechanics.'],
    [3,'Regulatory duty or mandatory code provision','Especially safety and communication duties.'],
    [4,'Peer-reviewed research directly on point',''],
    [5,'Authoritative industry guidance','Directly on point — e.g. SRIA, CCAA, RTA technical notes.'],
    [6,'Primary research conducted for the framework','Example: structured supplier review.'],
    [7,'Documented real project case','A concern / recommended example that occurred.']
  ];
  const mediumTypes=[
    [8,'Industry or contractor consultation','Useful, but not a measured threshold.'],
    [9,'General or analogous literature','Right phenomenon, different domain; applied by inference.']
  ];
  const lowTypes=[
    [9,'General or analogous literature only','No corroborating measurement, derivation, guidance, duty, research, or case.'],
    [10,'Unaided practitioner judgement','A strengthening flag before publication.']
  ];
  return `<div class="label">How the rating is decided</div>
  <p class="section-desc" style="max-width:760px;margin-bottom:6px">Most entries give you <span class="evidence-key">cut-off numbers</span> to act on — for example, <em>fold depth over 600&nbsp;mm</em>. Some instead just recommend a <span class="evidence-key">choice</span> — <em>chamfer the corner or don't</em>. The rating measures how much you can trust those numbers or that choice. Three questions decide it:</p>
  <section class="evidence-steps">
    <div class="evidence-step"><div class="evidence-step-num">1</div><div class="evidence-step-text"><strong>What kind of evidence sits behind it?</strong> Measured on site, calculated from real component sizes, required by a duty or code, taken from a study or industry guidance, or based on experience. The list further down ranks these, strongest first.</div></div>
    <div class="evidence-step"><div class="evidence-step-num">2</div><div class="evidence-step-text"><strong>Does that evidence actually cover the numbers?</strong> For an entry with cut-offs, is there real evidence behind <em>each</em> cut-off, or are some of them a sensible estimate? For an entry that recommends a choice, is that choice itself backed up?</div></div>
    <div class="evidence-step"><div class="evidence-step-num">3</div><div class="evidence-step-text"><strong>Does more than one independent source point the same way?</strong> A single source on its own is never enough for a High rating.</div></div>
  </section>
  <div class="label">The three levels</div>
  <section class="evidence-hierarchy-grid">
    <article class="evidence-tier-card high"><div class="evidence-tier-head"><div class="evidence-tier-titlerow"><div class="evidence-tier-title">High</div><div class="evidence-tier-range">strong + confirmed</div></div><div class="evidence-tier-rule">The numbers (or the recommended choice) come from strong evidence — measured, calculated from real dimensions, or set by a duty, code or industry guidance — <strong>and</strong> at least one other independent source or real project confirms it. Use them broadly as written; any doubt is about exact precision, not whether they sit in the right place. One source alone is never High.</div></div><div class="evidence-type-list">${highTypes.map(t=>evidenceTypeMarkup(...t)).join('')}</div></article>
    <article class="evidence-tier-card medium"><div class="evidence-tier-head"><div class="evidence-tier-titlerow"><div class="evidence-tier-title">Medium</div><div class="evidence-tier-range">supported, some judgement</div></div><div class="evidence-tier-rule">The issue is well established and genuinely supported, but at least one cut-off number (or the exact recommended choice) is a reasoned judgement rather than something measured, derived, or set by a duty, code or guidance. Use the numbers as a well-founded starting point and apply your own judgement to your project.</div></div><div class="evidence-type-list">${mediumTypes.map(t=>evidenceTypeMarkup(...t)).join('')}</div><div class="evidence-shared-note"><strong>Note:</strong> general or analogous literature (item 9) can support a Medium when it is paired with a real example, a relevant source, or a well-supported mechanism — not on its own.</div></article>
    <article class="evidence-tier-card low"><div class="evidence-tier-head"><div class="evidence-tier-titlerow"><div class="evidence-tier-title">Low</div><div class="evidence-tier-range">mostly judgement</div></div><div class="evidence-tier-rule">Rests mainly on experience, or a loose comparison borrowed from another field, with nothing measured, calculated or backed by a duty, code or guidance to confirm it. The numbers are rough. Treat it as a prompt to investigate, not a figure to rely on — these are generally not published live.</div></div><div class="evidence-type-list">${lowTypes.map(t=>evidenceTypeMarkup(...t)).join('')}</div></article>
  </section>
  <div class="label">What counts as evidence — strongest at the top</div>
  <p class="section-desc" style="max-width:760px;margin:6px 0 -6px">These are the kinds of evidence behind the levels above. Higher items can set where a cut-off sits; lower items mainly confirm or suggest.</p>`;
}
function renderEvidenceSupportView(){
  const counts=evidenceSupportCounts();
  const active=state.evidenceFilter||'all';
  const labels={all:'All',high:'High',medium:'Medium',low:'Low'};
  const notes={
    all:'Every live entry',
    high:'Strong evidence on the numbers, confirmed by a second source',
    medium:'Well supported, but some numbers are a reasoned call',
    low:'Mostly judgement — treat as a prompt, not a figure'
  };
  const order=['all','high','medium','low'];
  const summary=order.map(level=>`<div class="evidence-summary-card ${active===level?'active':''}" onclick="setEvidenceFilter('${level}')"><div class="evidence-summary-label">${labels[level]}</div><div class="evidence-summary-count">${counts[level]}</div><div class="evidence-summary-note">${notes[level]}</div></div>`).join('');
  const buttons=order.map(level=>`<button class="evidence-filter-btn ${active===level?'active':''}" onclick="setEvidenceFilter('${level}')">${labels[level]} (${counts[level]})</button>`).join('');
  const filtered=allAvailableEntries().filter(e=>active==='all'||evidenceSupportLevel(e.data)===active);
  const sorted=applyEntrySort(filtered,e=>e.data,e=>e.item&&e.item.name,()=>true);
  const rows=sorted.map(e=>{
    const dim=e.dim,it=e.item,d=e.data;
    const reviewed=dateMeta(d);
    const loc=regionTag(d);
    const support=evidenceSupportPill(d);
    const right=`<div style="text-align:right;flex-shrink:0"><div class="item-arrow">→</div>${reviewed}</div>`;
    const evSummary=d.evidenceSupport&&d.evidenceSupport.summary?`<div class="evidence-index-summary">${d.evidenceSupport.summary}</div>`:'';
    return `<div class="item-row available evidence-index-result" onclick="goEntry('${dim.id}','${it.id}')"><div class="evidence-index-main"><div class="evidence-index-top"><span class="item-name">${escHtml(it.name)}</span><span class="related-dim"><span class="ico">${dim.icon}</span>${escHtml(dim.name)}</span>${loc}</div><div class="evidence-index-meta"><strong>Parameter:</strong> ${d.parameter}</div><div class="search-result-meta">${support}</div>${evSummary}</div>${right}</div>`;
  }).join('');
  const shown=filtered.length;
  const suffix=active==='all'?'all evidence support levels':`${labels[active]} evidence support`;
  return `<div class="content evidence-content animate-in"><div class="back-link" onclick="goHome()">← Back to dimensions</div><div class="dim-header"><span class="dim-header-icon">📊</span><h1 class="dim-header-title">Evidence support index</h1></div><div class="section-desc">Evidence support is assigned from the hierarchy below. It tests <span class="evidence-key">how much you can trust the numbers or the recommendation in an entry</span> — not whether the constructability issue is important, useful, or worth considering.</div><div class="evidence-callout"><strong>A lower rating does not mean an entry is weak or should be ignored.</strong> Every published entry captures a real constructability question that may affect design decisions. A High rating often just means the issue is already well known, well documented, or easy to measure. <span class="evidence-key">Medium or Low entries can be just as valuable</span> — they are often newer, more practical, more site-specific, or less formally studied. Read them as prompts, apply more of your own judgement, and recognise the numbers carry a wider margin. <span class="evidence-key">Medium is the level most live entries are expected to reach</span>, and that is intentional: High generally requires an entry\u2019s specific thresholds to be measured or derived, so it stays the exception rather than the norm. A Medium rating marks a well-reasoned, actionable idea put into the open for discussion \u2014 and an open invitation for the evidence that could strengthen it.</div><div class="evidence-lead"><p>The rating also shows <strong>where contribution is needed</strong>. A Medium or Low rating may mean the issue is backed by practical experience but needs stronger formal evidence, or that literature exists but the cut-offs, project relevance or regional application would benefit from more field examples. You can strengthen the framework by contributing academic sources, field measurements, contractor feedback, design examples, project case studies or regional experience that confirm, refine or challenge the guidance.</p></div>${renderEvidenceRubric()}<div class="evidence-index-section-label"><div class="label" style="margin-bottom:0">Live entry index</div></div><div class="evidence-summary-grid">${summary}</div><div class="evidence-filter">${buttons}</div><div class="list-head"><div class="label" style="margin-bottom:0">${shown} ${shown===1?'entry':'entries'} — ${suffix}</div>${renderSortControl()}</div><div class="item-list">${rows}</div></div>`;
}

// ===== GUIDE (how-to-use) =====
function findEntryById(id){
  for(const dim of dimensions){
    const item=dim.items.find(it=>it.id===id);
    if(item)return {dim,item};
  }
  return null;
}
// The fragments below mirror the markup used in renderEntryDetail so the guide
// shows the genuine live entry components rather than stale screenshots.
function gThresholds(d,compact){
  return d.thresholds.map(t=>`<div class="threshold-band" style="background:${bgVar(t.color)};border:1px solid ${colorVar(t.color)}33;"><div class="threshold-range" style="color:${colorVar(t.color)}">${t.range}</div><div style="flex:1"><div class="threshold-rating" style="color:${colorVar(t.color)}">${t.rating}</div>${compact?'':`<div class="threshold-guidance">${t.guidance}</div>`}</div></div>`).join('');
}
function gActions(d){
  return (d.alternatives||[]).filter(a=>a).map((a,i)=>{
    if(typeof a==='string')return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text">${a}</div></div>`;
    return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text"><div class="alt-title">${a.title}</div><div class="alt-desc">${a.description}</div></div></div>`;
  }).join('');
}
function regionLogHtml(d){
  if(!d)return'';
  const origin=d.location?locLabel(d.location):'';
  const confs=(d.confirmations||[]).filter(r=>r&&r.country);

  const originLine=origin?`<div class="region-line"><span class="region-pin">${PIN_SVG}</span><span><strong>Evidence gathered in:</strong> ${escHtml(origin)}</span></div>`:'';
  const confLines=confs.map(r=>{
    const lbl=r.state?`${r.state}, ${r.country}`:r.country;

    return `<div class="region-line"><span class="region-check">✓</span><span>${escHtml(lbl)}${meta?` <span class="region-meta">${meta}</span>`:''}</span></div>`;
  }).join('');
  const confBlock=confs.length?`<div class="region-sub">Also confirmed to apply in</div>${confLines}`:'';
  return `<div class="region-box"><div class="label" style="margin-bottom:2px">Regional applicability</div>${originLine}${confBlock}</div>`;

function gAnatomyBlock(n,field,inner){

function renderGuideView(){

  let html=`<div class="back-link" onclick="goHome()">← Back to dimensions</div><div class="dim-header"><span class="dim-header-icon">${g.icon}</span><h1 class="dim-header-title">${g.title}</h1></div>${g.intro?`<p class="section-desc">${g.intro}</p>`:''}`;

  // What is the framework — two obligations, each side ending in its own tool card
  if(g.whatIs){
    const w=g.whatIs;
    const cols=(w.columns||[]).map(c=>{
      const items=(c.items||[]).map(i=>`<li>${i}</li>`).join('');
      const card=c.card?`<div class="whatis-card ${c.kind}"><div class="whatis-card-badge">${c.card.label}</div><div class="whatis-card-text">${c.card.text}</div></div>`:'';

    if(w.caption){html+=`<div class="whatis-caption">${w.caption}</div>`;}
  }

  // How to use it — consolidated: the two ways, then finding entries, then building a review list
  if(g.howToUse){
    const h=g.howToUse;
    const pts=(h.points||[]).map(p=>`<li>${p}</li>`).join('');
    html+=`<div class="guide-h">${h.title}</div>${h.intro?`<p class="guide-sub">${h.intro}</p>`:''}${pts?`<ul class="whatis-items">${pts}</ul>`:''}${h.aside?`<p class="guide-sub">${h.aside}</p>`:''}`;

    if(h.note){html+=`<div class="guide-more">${h.note}</div>`;}

  // Five dimensions / root-cause explanation — routing first, before the rating mechanics

    html+=`<div class="guide-h">${g.faq.title}</div><div class="faq-list">${g.faq.items.map((f,i)=>`<div class="faq-item"><div class="faq-q" onclick="toggleFaq(${i})"><span>${f.q}</span><span class="faq-chevron" id="faq-chev-${i}">+</span></div><div class="faq-a" id="faq-a-${i}">${f.a}</div></div>`).join('')}</div>`;
  }

  return `<div class="content animate-in">${html}</div>`;
}

function renderDimensionView(){
  const dim=getDim();
  
  let filterHtml=renderFacetFilters(dim);

  const ordered=applyEntrySort(dim.items,it=>it.data,it=>it.name,it=>!!it.available);
  const items=ordered.map((item,i)=>{
    const matches=itemMatchesFilter(item);
    const hidden=anyFacetActive()&&!matches&&item.available?'style="display:none"':'';
    const cls=item.available?'item-row available':'item-row unavailable';
    const onclick=item.available?`onclick="goEntry('${dim.id}','${item.id}')"`:'';
    const loc=item.available&&item.data?regionTag(item.data):'';
    const right=item.available?`<div style="text-align:right"><div class="item-arrow">→</div>${item.data?dateMeta(item.data):''}</div>`:'<div class="item-coming">Coming soon</div>';
    const support=item.available&&item.data?evidenceSupportPill(item.data):'';
    const meta=item.available&&item.data?`<div class="item-meta">Parameter: ${item.data.parameter}</div>${support?`<div class="item-meta" style="margin-top:8px">${support}</div>`:''}`:'';
    return `<div class="${cls}" ${onclick} ${hidden}><div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div class="item-name">${item.name}</div>${loc}${item.available?metaTagChips(item.data):''}</div>${meta}</div>${right}</div>`;
  }).join('');

  let guidanceHtml='';
  if(dim.generalGuidance&&dim.generalGuidance.length>0){
    guidanceHtml=`<div style="margin-top:20px;margin-bottom:24px;padding:18px 22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;"><div class="label" style="margin-bottom:10px">General Guidance</div>${dim.generalGuidance.map(g=>`<div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;"><div style="color:var(--accent);font-size:14px;margin-top:1px;flex-shrink:0;">•</div><div style="font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;">${g}</div></div>`).join('')}</div>`;
  }

  return `<div class="content animate-in"><div class="back-link" onclick="goHome()">← Back to dimensions</div><div class="dim-header"><span class="dim-header-icon">${dim.icon}</span><h1 class="dim-header-title">${dim.name}</h1></div><p class="section-desc">${dim.description}</p>${guidanceHtml}${filterHtml}<div class="list-head"><div class="label" style="margin-bottom:0">Entries</div>${renderSortControl()}</div><div class="item-list">${items}</div><div class="suggest-banner" onclick="goSuggest('${dim.id}')"><div class="suggest-banner-text"><div class="suggest-banner-title">Missing something in ${dim.name}?</div><div class="suggest-banner-sub">Suggest a new entry for this dimension — the form opens filed under ${dim.name}.</div></div><div class="suggest-banner-btn">Suggest an entry →</div></div></div>`;
}

// Renders approved comments stored on the entry (d.comments). Tolerant of missing
// fields: name defaults to "Anonymous"; role, date, region, verified are optional.
function renderComments(d){
  const cs=(d.comments||[]).filter(c=>c&&(c.body||(Array.isArray(c.images)&&c.images.length)));
  if(!cs.length)return '';
  const cards=cs.map(c=>{
    const by=c.by||'Anonymous';
    const role=c.role?`<span class="comment-role">${c.role}</span>`:'';
    const verified=c.verified?`<span class="comment-verified" title="Verified by the maintainer">✓ verified</span>`:'';
    const date=c.date?`<span class="comment-date">${c.date}</span>`:'';
    const regionTxt=c.region?(typeof c.region==='string'?c.region:locTag(c.region)):'';
    const region=regionTxt?`<span class="comment-region">${regionTxt}</span>`:'';
    const regional=c.about&&/region/i.test(c.about)?`<span class="comment-flag">Regional</span>`:'';
    // Optional images: each entry may be a bare "images/x.jpg" string or an {image,caption} object.
    const imgs=(Array.isArray(c.images)?c.images:[]).map(im=>typeof im==='string'?{image:im}:im).filter(im=>im&&im.image);
    const gallery=imgs.length?`<div class="comment-images">${imgs.map(im=>{
      const src=escAttr(im.image);
      const click=escAttr(escJsSingle(im.image));
      const cap=im.caption?`<figcaption class="comment-image-cap">${im.caption}</figcaption>`:'';
      return `<figure class="comment-image-fig"><img src="${src}" alt="${escAttr(im.caption||'')}" onclick="openLightbox('${click}')">${cap}</figure>`;
    }).join('')}</div>`:'';
    const body=c.body?`<div class="comment-body">${c.body}</div>`:'';
    return `<div class="comment-card"><div class="comment-head"><span class="comment-by">${by}</span>${role}${verified}${regional}${date}${region}</div>${body}${gallery}</div>`;
  }).join('');
  return `<div class="comments-section"><div class="label">Comments (${cs.length})</div>${cards}</div>`;
}

// Orienting line for entries that sit in a small decision pathway.
// role:"start" shows a forward map to its two branches; role:"branch" shows a
// single backward precondition pointing to the strategy entry. Links resolve
// through resolveEntryId so they survive renames and skip unavailable targets.
function decisionPathPanel(d){
  const dp=d.decisionPath; if(!dp) return '';
  const icon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-8"/><path d="M12 13l-6-8"/><path d="M12 13l6-8"/></svg>';
  const link=id=>{const r=resolveEntryId(id); return r?`<span class="dp-link" onclick="goEntry('${r.dim.id}','${r.item.id}')">${r.item.name}</span>`:'';};
  if(dp.role==='start'){
    const gb=link(dp.groundBearing), ps=link(dp.pileSupported);
    return `<div class="decision-path">
      <div class="dp-label">${icon}Decision path · Start here</div>
      <div class="dp-text">This is the first of the reactive-ground decisions. Settle deep-vs-shallow here, then read only the branch you land on:</div>
      <div class="dp-routes">
        ${gb?`<div class="dp-route"><span class="dp-cue">Staying ground-bearing →</span> ${gb}</div>`:''}
        ${ps?`<div class="dp-route"><span class="dp-cue">Founding below, on piles →</span> ${ps}</div>`:''}
      </div>
    </div>`;
  }
  if(dp.role==='branch'){
    const start=link(dp.start); if(!start) return '';
    const kindLabel=dp.branchKind==='ground-bearing'?'Ground-bearing branch':dp.branchKind==='pile-supported'?'Pile-supported branch':'Branch';
    const lead=dp.branchKind==='ground-bearing'
      ?"Already settled on a ground-bearing slab? You're in the right place. If you haven't made that call yet, start with the reactive-ground strategy:"
      :dp.branchKind==='pile-supported'
        ?"Already settled on founding below, on piles? You're in the right place. If you haven't made that call yet, start with the reactive-ground strategy:"
        :"This entry is one branch of a larger decision. If you haven't settled the strategy yet, start with the reactive-ground strategy:";
    return `<div class="decision-path">
      <div class="dp-label">${icon}Decision path · ${kindLabel}</div>
      <div class="dp-text">${lead}</div>
      <div class="dp-routes">
        <div class="dp-route"><span class="dp-cue">Decide on ground-bearing vs piles →</span> ${start}</div>
      </div>
    </div>`;
  }
  return '';
}

function renderEntryDetail(){
  const dim=getDim(),item=getItem();
  if(!dim||!item||!item.available||!item.data){
    return `<div class="content animate-in"><div class="back-link" onclick="goHome()">← Back to dimensions</div><p class="section-desc">Entry not found — it may have been renamed or removed. <span class="breadcrumb-link" onclick="goHome()">Return to the framework home →</span></p></div>`;
  }
  const d=item.data;

  const thresholds=d.thresholds.map(t=>`<div class="threshold-band" style="background:${bgVar(t.color)};border:1px solid ${colorVar(t.color)}33;"><div class="threshold-range" style="color:${colorVar(t.color)}">${t.range}</div><div style="flex:1"><div class="threshold-rating" style="color:${colorVar(t.color)}">${t.rating}</div><div class="threshold-guidance">${t.guidance}</div></div></div>`).join('');

  const alts=(d.alternatives||[]).filter(a=>a).map((a,i)=>{
    if(typeof a==='string'){
      return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text">${a}</div></div>`;
    }
    return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text"><div class="alt-title">${a.title}</div><div class="alt-desc">${a.description}</div></div></div>`;
  }).join('');

  const applicabilityHtml=d.applicability?`
    <div class="applicability-box">
      <div class="label" style="color:var(--yellow)">Applicability and Limitations</div>
      ${d.applicability.appliesWhere?`<div class="applicability-text"><strong>Applies where:</strong> ${d.applicability.appliesWhere}</div>`:''}
      ${d.applicability.checks&&d.applicability.checks.length>0?`
        <div class="applicability-text" style="margin-bottom:8px"><strong>Check before applying this guidance:</strong></div>
        <div class="applicability-list">
          ${d.applicability.checks.map(c=>`<div class="applicability-item"><strong>${c.title}:</strong> ${c.description}</div>`).join('')}
        </div>
      `:''}
      ${d.applicability.note?`<div class="applicability-text" style="margin-top:12px;margin-bottom:0"><strong>Note:</strong> ${d.applicability.note}</div>`:''}
    </div>
  `:'';

  const notesHtml=d.additionalNotes?`<div style="margin-top:12px;padding:12px 16px;background:var(--surface-light);border:1px solid var(--border);border-radius:6px;"><div style="font-size:10px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Note</div><div style="font-size:13px;color:var(--text);line-height:1.6;opacity:0.85;">${d.additionalNotes}</div></div>`:'';

  const workedExampleHtml=d.workedExample?(()=>{
    const we=d.workedExample;
    const mkTbl=(hdrs,rows,cap,bands)=>{
      if(!hdrs||!rows)return'';
      const useBands=we.tableStyle==='soffitSheetBracing'&&Array.isArray(bands);
      const tableClass=`worked-example-table${useBands?' soffit-sheet-bracing-table':''}`;
      const colClass=i=>useBands&&bands[i]?` class="we-col-${bands[i]}"`:'';
      return `${cap?`<div class="worked-example-table-cap">${cap}</div>`:''}<table class="${tableClass}"><thead><tr>${hdrs.map((h,i)=>`<th${colClass(i)}>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map((c,i)=>`<td${colClass(i)}>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    };
    const weFigure=(fig)=>{
      if(!fig||!fig.image)return'';
      const alt=fig.alt||cleanText(fig.caption||'Worked example figure');
      return `<figure class="worked-example-figure"><img src="${fig.image}" alt="${escAttr(alt)}" onclick="openLightbox('${fig.image}')">${fig.caption?`<figcaption>${fig.caption}</figcaption>`:''}</figure>`;
    };
    const tableHtml=mkTbl(we.tableHeaders,we.tableRows,we.tableCaption,we.tableColumnBands)+weFigure(we.figureBeforeTable2)+mkTbl(we.tableHeaders2,we.tableRows2,we.tableCaption2,we.tableColumnBands2)+mkTbl(we.tableHeaders3,we.tableRows3,we.tableCaption3,we.tableColumnBands3);
    const assumptionsHtml=we.assumptions&&we.assumptions.length>0?`<div class="worked-example-assumptions"><div class="worked-example-assumptions-title">${we.assumptionsTitle||'How these numbers were derived'}</div><ul>${we.assumptions.map(a=>`<li>${a}</li>`).join('')}</ul>${we.assumptionsNote?`<div class="worked-example-assumptions-note">${we.assumptionsNote}</div>`:''}</div>`:'';
    return `<div class="worked-example-box"><div class="worked-example-title">${we.title||'Worked example'}</div>${we.caveat?`<div class="worked-example-caveat">${we.caveat}</div>`:''}${we.headline?`<div class="worked-example-headline">${we.headline}</div>`:''}${tableHtml}${we.howToUse?`<div class="worked-example-howto"><strong>How to use it:</strong> ${we.howToUse}</div>`:''}${assumptionsHtml}</div>`;
  })():'';

  const imgHint=`<div class="img-hint"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14zm.5-7v2H8v2H6V9H4V7h2V5h2v2z"/></svg> Click any image to enlarge</div>`;
  const examplesHtml=d.examples&&d.examples.length>0?`<div style="margin-top:28px"><div class="label">Examples</div>${imgHint}<div class="examples-grid${d.examples.length===1?' imgs-1':d.examples.length===2?' imgs-2':''}">${d.examples.map(ex=>{
    const imgSrc=escAttr(ex.image||'');
    const imgClick=escAttr(escJsSingle(ex.image||''));
    const imgAlt=escAttr(cleanText(ex.caption||'Example image'));
    const tag=escAttr(ex.tag||'');
    const tagLabel=ex.tag==='concern'?'Concern':ex.tag==='acceptable'?'Acceptable':'Recommended';
    return `<div class="example-card">${ex.image?`<img src="${imgSrc}" alt="${imgAlt}" onclick="openLightbox('${imgClick}')">`:''}<div class="example-caption"><div class="example-tag ${tag}">${tagLabel}</div><div class="example-desc">${ex.caption||''}</div></div></div>`;
  }).join('')}</div></div>`:'';

  const related=getRelatedEntries(item.id,d);
  const relatedHtml=related.length>0?`<div style="margin-top:28px"><div class="label">Related Entries</div><div class="related-list">${related.map(r=>`<div class="related-card" onclick="goEntry('${r.dimId}','${r.id}')"><div class="related-top"><div class="related-name-wrap"><span class="related-name">${r.name}</span><span class="related-dim"><span class="ico">${r.dimIcon}</span>${r.dimName}</span></div><div class="related-arrow">→</div></div>${r.note?`<div class="related-note">${r.note}</div>`:''}</div>`).join('')}</div></div>`:'';

  const supportingImagesHtml=d.supportingImages&&d.supportingImages.length>0?`<div style="margin-top:20px"><div class="label">Supporting Images</div>${imgHint}<div class="supporting-images-grid${d.supportingImages.length===1?' imgs-1':d.supportingImages.length===2?' imgs-2':''}">${d.supportingImages.map(sp=>{
    const imgSrc=escAttr(sp.image||'');
    const imgClick=escAttr(escJsSingle(sp.image||''));
    const imgAlt=escAttr(cleanText(sp.title||'Supporting image'));
    return `<div class="supporting-image-card">${sp.image?`<img src="${imgSrc}" alt="${imgAlt}" onclick="openLightbox('${imgClick}')">`:''}<div class="supporting-image-title">${sp.title||''}</div></div>`;
  }).join('')}</div></div>`:'';

  return `<div class="content animate-in">
    <div class="entry-topbar"><div class="back-link" onclick="goDimension('${dim.id}')">← Back to ${dim.name}</div>${projectItemButton(item.id)}</div>
    <div class="entry-title">${item.name}</div>
    <div class="entry-meta">Dimension: ${dim.name} · Reinforced Concrete ${regionSummary(d)?' · '+regionTag(d):''}</div>
    ${decisionPathPanel(d)}
    <div class="question-box"><div class="label label-accent">Design Question</div><div class="question-text">${d.question}</div></div>
    ${d.background?`<div class="label">Background</div><div class="consideration-text">${d.background}</div>`:''}
    <div class="param-box"><div class="label">Design Parameter</div><div class="param-value">${d.parameter}</div></div>
    <div class="label">Design Guidance</div><div class="threshold-list" style="margin-top:10px">${thresholds}</div>
    ${notesHtml}
    ${workedExampleHtml}
    ${applicabilityHtml}
    ${alts.length>0?`<div class="label" style="margin-top:28px">Recommended Actions</div><div class="alt-list" style="margin-top:10px">${alts}</div>`:''}
    ${d.evidence?`<div class="evidence-box"><div class="label">Evidence Basis</div><div class="evidence-text">${d.evidence}</div></div>`:''}
    ${examplesHtml}
    ${supportingImagesHtml}
    ${relatedHtml}
    ${evidenceSupportBox(d)}
    ${regionLogHtml(d)}
    ${renderComments(d)}
    <div class="entry-actions">
      <button class="entry-btn" onclick="goComment('${dim.id}','${item.id}')"><span class="ico">💬</span> Add a comment</button>
      <button class="entry-btn" onclick="goEditEntry('${dim.id}','${item.id}')"><span class="ico">✏️</span> Suggest a change</button>
      <div class="entry-actions-hint">A comment is a community note shown under this entry. Suggesting a change proposes an edit to the entry itself. Both are reviewed and de-identified before publishing — please don't include project, company, client, or designer names.</div>
    </div>
    <div class="date-stamp"><div><div class="date-label">Entry Added</div><div class="date-value">${d.dateAdded}</div></div><div><div class="date-label">Last Reviewed</div><div class="date-value">${d.dateReviewed}</div></div></div>
  </div>`;
}

// ===== LIGHTBOX =====
function openLightbox(src){const lb=document.createElement('div');lb.className='lightbox';lb.onclick=()=>lb.remove();lb.innerHTML=`<img src="${src}">`;document.body.appendChild(lb)}

// ===== HASH-BASED NAVIGATION =====
function goHome(){window.location.hash=''}
function applyTheme(t){
  const theme=t==='light'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme);
  try{localStorage.setItem('theme',theme);}catch(e){}
  const ic=document.getElementById('theme-toggle-icon');
  if(ic)ic.textContent=theme==='light'?'☀️':'🌙';
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')==='light'?'light':'dark';
  applyTheme(cur==='light'?'dark':'light');
}
function goGuide(){window.location.hash='guide'}
function goEvidenceSupport(level){state.evidenceFilter=level||'all';window.location.hash='evidence-support';if(state.view==='evidence')render();}
function goByDate(){window.location.hash='by-date'}
function goDimension(id){state.locationFilter=null;state.elementFilter=[];state.phaseFilter=[];window.location.hash=id}
function goEntry(dimId,id){window.location.hash=dimId+'/'+id}
function setLocationFilter(val){
  if(!val){state.locationFilter=null}
  else if(val.includes('|')){const[c,s]=val.split('|');state.locationFilter={country:c,state:s}}
  else{state.locationFilter={country:val}}
  render();
}

function parseHash(){
  const hash=window.location.hash.replace(/^#\/?/,'');
  if(!hash){state.view='home';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash==='guide'){state.view='guide';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash==='evidence-support'){state.view='evidence';state.dimId=null;state.itemId=null;state.locationFilter=null;if(!state.evidenceFilter)state.evidenceFilter='all';}
  else if(hash==='project-lists'||hash==='review-lists'){state.view='projectIndex';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash==='project-list'||hash==='review-list'){state.view='projectList';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash==='by-date'){state.view='byDate';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash==='browse'){state.view='browse';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash.includes('/')){
    const[dimId,seg]=hash.split('/');
    const dim=dimensions.find(d=>d.id===dimId);
    let id=decodeURIComponent(seg||'');
    // Legacy support: old position-based links (e.g. #methods/3) still resolve.
    if(dim&&/^\d+$/.test(id)&&!dim.items.some(it=>it.id===id)){
      const byIndex=dim.items[parseInt(id,10)];
      if(byIndex)id=byIndex.id;
    }
    state.view='entry';state.dimId=dimId;state.itemId=id;
  }else{
    state.view='dimension';state.dimId=hash;state.itemId=null;state.locationFilter=null;
  }
}

window.addEventListener('hashchange',()=>{state.sharedPreview=null;parseHash();render();window.scrollTo({top:0,left:0,behavior:'auto'});});

// ===== INIT =====
async function init(){
  await loadData();
  loadSortPref();
  parseHash();
  render();
  handleShareLink();
}
init();
</script>
