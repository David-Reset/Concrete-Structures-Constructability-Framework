<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constructability Framework — RC Design Guidance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1a; --surface: #111827; --surface-light: #1a2234;
    --border: #2a3548; --text: #e2e8f0; --text-muted: #8899aa;
    --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.15);
    --red: #ef4444; --orange: #f97316; --yellow: #eab308; --green: #22c55e;
    --red-bg: rgba(239,68,68,0.12); --orange-bg: rgba(249,115,22,0.12);
    --yellow-bg: rgba(234,179,8,0.1); --green-bg: rgba(34,197,94,0.1);
  }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif; min-height:100vh; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation:fadeIn 0.3s ease; }
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
  .header-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
  .header-sub{font-size:11px;color:var(--text-muted)}

  .breadcrumb{padding:10px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;background:var(--surface)}
  .breadcrumb-link{color:var(--accent);cursor:pointer} .breadcrumb-link:hover{text-decoration:underline}
  .breadcrumb-sep{color:var(--text-muted)} .breadcrumb-current{color:var(--text)}

  .content{padding:28px 32px;max-width:900px;margin:0 auto}
  .section-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
  .section-desc{font-size:14px;color:var(--text-muted);line-height:1.6;max-width:600px}

  .dim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-top:24px}
  .dim-card{padding:20px 22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s}
  .dim-card:hover{border-color:var(--accent);background:var(--surface-light)}
  .dim-icon{font-size:26px;margin-bottom:10px} .dim-name{font-size:15px;font-weight:700;margin-bottom:6px}
  .dim-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:12px}
  .dim-count{font-size:11px;color:var(--accent);font-weight:600}

  .back-link{font-size:12px;color:var(--accent);cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
  .back-link:hover{text-decoration:underline}
  .dim-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .dim-header-icon{font-size:30px} .dim-header-title{font-size:24px;font-weight:800;letter-spacing:-0.5px}

  .item-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .item-row{padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:space-between;transition:all 0.2s}
  .item-row.available{cursor:pointer} .item-row.available:hover{border-color:var(--accent);background:var(--surface-light)}
  .item-row.unavailable{opacity:0.45}
  .item-name{font-size:14px;font-weight:600} .item-meta{font-size:11px;color:var(--text-muted);margin-top:4px}
  .item-arrow{color:var(--accent);font-size:18px}
  .item-coming{font-size:10px;color:var(--text-muted);padding:4px 10px;background:var(--surface-light);border-radius:4px;border:1px solid var(--border)}

  .entry-title{font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:6px}
  .entry-meta{font-size:12px;color:var(--text-muted);margin-bottom:24px}
  .question-box{padding:20px 24px;background:var(--accent-glow);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;margin-bottom:28px}
  .label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
  .img-hint{font-size:11px;color:var(--text-muted);opacity:0.75;margin:-2px 0 10px;display:flex;align-items:center;gap:5px}
  .img-hint svg{width:12px;height:12px;fill:var(--text-muted);flex-shrink:0}
  .label-accent{color:var(--accent)}
  .question-text{font-size:15px;color:var(--text);line-height:1.6}
  .param-box{padding:14px 18px;background:var(--surface-light);border:1px solid var(--border);border-radius:8px;margin-bottom:28px}
  .param-value{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);margin-top:4px}
  .consideration-text{font-size:14px;color:var(--text);line-height:1.7;opacity:0.9;margin-bottom:28px}

  .threshold-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
  .threshold-band{display:flex;gap:16px;padding:14px 18px;border-radius:8px;align-items:flex-start}
  .threshold-range{width:125px;min-width:125px;max-width:125px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;padding-top:1px;line-height:1.35;white-space:normal;overflow-wrap:break-word}
  .threshold-rating{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .threshold-guidance{font-size:13px;color:var(--text);line-height:1.6;margin-top:4px;opacity:0.85}

  .alt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:28px}
  .alt-item{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;background:var(--surface-light);border-radius:6px;border:1px solid var(--border)}
  .alt-num{width:22px;height:22px;border-radius:50%;background:rgba(59,130,246,0.15);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
  .alt-text{font-size:13px;color:var(--text);opacity:0.9;line-height:1.6}
  .alt-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
  .alt-desc{font-size:13px;color:var(--text);opacity:0.85;line-height:1.6}

  .applicability-box{margin-top:28px;margin-bottom:28px;padding:14px 18px;background:var(--yellow-bg);border:1px solid rgba(234,179,8,0.28);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0}
  .applicability-text{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;margin-bottom:12px}
  .applicability-list{display:flex;flex-direction:column;gap:8px}
  .applicability-item{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9}
  .applicability-item strong{color:var(--text)}
  .applicability-item ul{padding-left:22px;margin:8px 0}
  .applicability-item li{margin-bottom:6px}

  .worked-example-box{margin-top:8px;margin-bottom:28px;padding:18px 22px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.25);border-left:3px solid var(--accent);border-radius:0 8px 8px 0}
  .worked-example-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
  .worked-example-caveat{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.55;margin-bottom:14px}
  .worked-example-headline{font-size:14px;font-weight:600;color:var(--text);line-height:1.6;margin-bottom:14px}
  .worked-example-table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:13px}
  .worked-example-table th{text-align:left;padding:8px 10px;background:var(--surface-light);border:1px solid var(--border);color:var(--text);font-weight:700;font-size:12px}
  .worked-example-table td{padding:8px 10px;border:1px solid var(--border);color:var(--text);opacity:0.9}
  .worked-example-howto{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;margin-bottom:4px}
  .worked-example-howto strong{color:var(--text);opacity:1}
  .worked-example-howto em{color:var(--text-muted);font-style:italic}
  .worked-example-howto ul{padding-left:22px;margin:8px 0;list-style:disc}
  .worked-example-howto li{margin-bottom:6px;line-height:1.6}
  .worked-example-assumptions{margin-top:16px;padding-top:14px;border-top:1px solid rgba(59,130,246,0.18)}
  .worked-example-assumptions-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .worked-example-assumptions ul{padding-left:20px;margin:6px 0;list-style:disc}
  .worked-example-assumptions li{font-size:12px;color:var(--text);line-height:1.55;opacity:0.75;margin-bottom:4px}
  .worked-example-assumptions-note{font-size:12px;color:var(--text-muted);line-height:1.55;margin-top:8px;font-style:italic}

  .evidence-box{padding:14px 18px;background:var(--surface-light);border-radius:8px;border:1px solid var(--border)}
  .evidence-text{font-size:13px;color:var(--text);line-height:1.6;opacity:0.8}
  .evidence-text ul,.applicability-text ul,.consideration-text ul,.alt-desc ul{padding-left:22px;margin:8px 0}
  .evidence-text li,.applicability-text li,.consideration-text li,.alt-desc li{margin-bottom:6px}

  .related-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;margin-bottom:28px}
  .related-card{display:block;text-align:left;width:100%;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.2s}
  .related-card:hover{border-color:var(--accent);background:var(--surface-light)}
  .related-top{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .related-name-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
  .related-name{font-size:14px;font-weight:600;color:var(--text)}
  .related-dim{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--text-muted);background:var(--surface-light);border:1px solid var(--border);border-radius:4px;padding:2px 8px;letter-spacing:0.3px}
  .related-dim span.ico{font-size:11px;line-height:1}
  .related-arrow{color:var(--accent);font-size:18px;flex-shrink:0}
  .related-note{font-size:12px;color:var(--text);line-height:1.6;opacity:0.8;margin-top:8px}

  .date-stamp{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:24px}
  .date-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
  .date-value{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);margin-top:2px}

  .comments-section{margin-top:28px}
  .comment-card{padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
  .comment-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .comment-by{font-size:13px;font-weight:700;color:var(--text)}
  .comment-role{font-size:11px;color:var(--accent);font-weight:600}
  .comment-verified{font-size:10px;font-weight:700;color:var(--green)}
  .comment-flag{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--yellow);text-transform:uppercase;letter-spacing:1px}
  .comment-date{font-size:11px;color:var(--text-muted)}
  .comment-region{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:2px 8px;background:var(--surface-light);border:1px solid var(--border);border-radius:4px}
  .comment-body{font-size:13px;color:var(--text);line-height:1.6;opacity:0.9}

  .entry-actions{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px}
  .entry-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
  .entry-btn:hover{border-color:var(--accent);background:var(--surface-light)}
  .entry-btn .ico{font-size:15px}
  .entry-actions-hint{flex-basis:100%;font-size:11px;color:var(--text-muted);line-height:1.5;margin-top:4px}

  .suggest-banner{margin-top:16px;padding:18px 22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;transition:all 0.2s}
  .suggest-banner:hover{border-color:var(--accent);background:var(--surface-light)}
  .suggest-banner-title{font-size:15px;font-weight:700;color:var(--text)}
  .suggest-banner-sub{font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:3px;max-width:560px}
  .suggest-banner-btn{flex-shrink:0;font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:26px 28px;animation:fadeIn 0.25s ease}
  .modal-title{font-size:19px;font-weight:800;letter-spacing:-0.3px;margin-bottom:14px}
  .modal-dim{font-size:13px;color:var(--text);background:var(--accent-glow);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;margin-bottom:16px;line-height:1.5}
  .modal-body{font-size:13.5px;color:var(--text);line-height:1.65}
  .modal-body p{margin-bottom:12px;opacity:0.92}
  .modal-body ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin:0 0 14px}
  .modal-body li{position:relative;padding-left:20px;opacity:0.92}
  .modal-body li::before{content:'';position:absolute;left:4px;top:8px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .modal-link{color:var(--accent);cursor:pointer;font-weight:600}
  .modal-link:hover{text-decoration:underline}
  .modal-fineprint{font-size:11.5px;color:var(--text-muted);border-top:1px solid var(--border);padding-top:12px;margin-bottom:0}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  .entry-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .entry-btn.primary:hover{background:#2f6fd6;border-color:#2f6fd6}

  .examples-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px;margin-bottom:20px}
  .examples-grid.imgs-1{grid-template-columns:1fr}
  .examples-grid.imgs-2{grid-template-columns:repeat(2,1fr)}
  .example-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
  .example-card img{width:100%;max-height:200px;object-fit:cover;display:block;background:#1e2a3a}
  .examples-grid.imgs-1 .example-card{flex-direction:row;align-items:stretch}
  .examples-grid.imgs-1 .example-card img{width:55%;max-width:55%;max-height:300px;object-fit:contain;align-self:center}
  .examples-grid.imgs-1 .example-caption{flex:1;display:flex;flex-direction:column;justify-content:center;border-top:none;border-left:1px solid var(--border)}
  .example-caption{padding:14px 16px;background:var(--surface-light);border-top:1px solid var(--border);flex:1}
  .example-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:8px}
  .example-tag.concern{background:var(--red-bg);color:var(--red)}
  .example-tag.acceptable{background:var(--yellow-bg);color:var(--yellow)}
  .example-tag.recommended{background:var(--green-bg);color:var(--green)}
  .example-desc{font-size:13px;color:var(--text);line-height:1.6;opacity:0.8}

  .supporting-images-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;margin-bottom:28px;align-items:stretch}
  .supporting-images-grid.imgs-1{grid-template-columns:1fr}
  .supporting-images-grid.imgs-2{grid-template-columns:repeat(2,1fr)}
  .supporting-image-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
  .supporting-image-card img{width:100%;height:160px;object-fit:cover;display:block;background:#1e2a3a;flex-shrink:0}
  .supporting-images-grid.imgs-1 .supporting-image-card{flex-direction:row;align-items:stretch}
  .supporting-images-grid.imgs-1 .supporting-image-card img{width:55%;max-width:55%;height:auto;max-height:340px;object-fit:contain;align-self:center;flex-shrink:0}
  .supporting-images-grid.imgs-1 .supporting-image-title{flex:1;display:flex;flex-direction:column;justify-content:center;border-top:none;border-left:1px solid var(--border)}
  .supporting-image-title{padding:14px 16px;font-size:13px;color:var(--text);background:var(--surface-light);border-top:1px solid var(--border);line-height:1.6;opacity:0.8;flex:1}
  .supporting-image-title strong{color:var(--text);font-weight:700;display:block;margin-bottom:6px;opacity:1}
  .supporting-image-card img,.example-card img{cursor:pointer;transition:opacity 0.2s}
  .supporting-image-card img:hover,.example-card img:hover{opacity:0.8}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:fadeIn 0.2s ease}
  .lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}


  .evidence-support-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;border-radius:4px;padding:2px 8px;background:var(--surface-light);border:1px solid var(--border)}
  .evidence-support-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.9}
  .evidence-support-pill.high{color:var(--green);border-color:rgba(34,197,94,0.32);background:rgba(34,197,94,0.08)}
  .evidence-support-pill.medium{color:var(--yellow);border-color:rgba(234,179,8,0.32);background:rgba(234,179,8,0.08)}
  .evidence-support-pill.low{color:#f87171;border-color:rgba(248,113,113,0.32);background:rgba(248,113,113,0.08)}
  .evidence-support-box{margin-top:28px;margin-bottom:28px;padding:14px 18px;background:var(--surface-light);border:1px solid var(--border);border-radius:8px}
  .evidence-support-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .evidence-support-text{font-size:13px;color:var(--text);line-height:1.6;opacity:0.82}

  .loc-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text-muted);background:var(--surface-light);border:1px solid var(--border);border-radius:4px;padding:2px 8px;letter-spacing:0.3px}
  .loc-tag svg{width:10px;height:10px;fill:var(--text-muted);flex-shrink:0}
  .loc-filter{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
  .loc-filter-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
  .loc-filter select{background:var(--surface-light);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;outline:none}
  .loc-filter select:focus{border-color:var(--accent)}
  .loc-filter-count{font-size:11px;color:var(--text-muted);margin-left:auto}
  .search-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 14px;transition:border-color .2s,box-shadow .2s}
  .search-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .search-icon{width:18px;height:18px;fill:var(--text-muted);flex-shrink:0}
  .search-input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;font-size:15px;padding:14px 0}
  .search-input::placeholder{color:var(--text-muted)}
  .search-clear{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface-light);color:var(--text-muted);font-size:11px;cursor:pointer;flex-shrink:0;border:1px solid transparent}
  .search-clear:hover{color:var(--text);border-color:var(--border)}
  .search-region-wrap{display:flex;align-items:center;gap:10px;margin-top:10px}
  .search-region-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}

<div id="app"><div class="content" style="text-align:center;padding-top:80px;color:var(--text-muted)">Loading framework...</div></div>
<script>
// ===== STATE =====
let dimensions = [];
let guide = null;
let state = { view:'home', dimId:null, itemId:null, locationFilter:null, evidenceFilter:'all' };
let searchQuery='';
let searchRegion=null;

// ===== HELPERS =====
function colorVar(c){const m={green:'--green',orange:'--orange',red:'--red',yellow:'--yellow'};return `var(${m[c]||'--green'})`}
function bgVar(c){const m={green:'--green-bg',orange:'--orange-bg',red:'--red-bg',yellow:'--yellow-bg'};return `var(${m[c]||'--green-bg'})`}

function evidenceSupportLevel(d){return d&&d.evidenceSupport&&d.evidenceSupport.level?String(d.evidenceSupport.level).toLowerCase():''}
function evidenceSupportLabel(level){const m={high:'High',medium:'Medium',low:'Low'};return m[level]||''}
function evidenceSupportPill(d){const level=evidenceSupportLevel(d);if(!level)return'';return `<span class="evidence-support-pill ${level}">Evidence support: ${evidenceSupportLabel(level)}</span>`}
function evidenceSupportBox(d){const level=evidenceSupportLevel(d);if(!level)return'';const summary=d.evidenceSupport.summary||'';return `<div class="evidence-support-box"><div class="evidence-support-head"><div class="label" style="margin-bottom:0">Evidence Support</div>${evidenceSupportPill(d)}</div>${summary?`<div class="evidence-support-text">${summary}</div>`:''}</div>`}
function getDim(){return dimensions.find(d=>d.id===state.dimId)}
function getItem(){const dim=getDim();return dim?dim.items.find(it=>it.id===state.itemId)||null:null}
// Stable id helper — must match the slug rule used when ids are authored in data.json.
function slugify(s){return (s||'').toLowerCase().replace(/&/g,' and ').replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')}

// ===== RELATED ENTRIES =====
// Resolves an {id} reference to a live, available entry (or null), searching all dimensions.
function resolveRef(ref){
  for(const dim of dimensions){
    const item=dim.items.find(it=>it.id===ref.id);
    if(item){
      if(!item.available)return null;
      return {dimId:dim.id,id:item.id,name:item.name,dimName:dim.name,dimIcon:dim.icon};
    }
  }
  return null;
}
// Combines links authored on this entry (forward) with links that point AT it
// from any other entry (reverse), so a relationship only needs to be written once.
function getRelatedEntries(curId,curData){
  const out=[],seen=new Set();
  const add=(ref,note)=>{
    const r=resolveRef(ref);
    if(!r)return;
    if(r.id===curId||seen.has(r.id))return;
    seen.add(r.id);
    out.push(Object.assign(r,{note:note||''}));
  };
  (curData.relatedEntries||[]).forEach(ref=>add(ref,ref.note));
  dimensions.forEach(dim=>dim.items.forEach(it=>{
    if(!it.available||!it.data||!it.data.relatedEntries)return;
    it.data.relatedEntries.forEach(ref=>{
      if(ref.id===curId){
        add({id:it.id},ref.note);
      }
    });
  }));
  return out;
}

// ===== LOCATION HELPERS =====
const PIN_SVG='<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>';
function locLabel(loc){if(!loc)return'';return loc.state?`${loc.state}, ${loc.country}`:loc.country}
function locTag(loc){if(!loc)return'';return `<span class="loc-tag">${PIN_SVG} ${locLabel(loc)}</span>`}
function getLocations(dim){
  const locs=new Map();
  dim.items.forEach(item=>{
    if(item.available&&item.data&&item.data.location){
      const loc=item.data.location;
      if(!locs.has(loc.country))locs.set(loc.country,new Set());
      if(loc.state)locs.get(loc.country).add(loc.state);
    }
  });
  return locs;
}
function itemMatchesFilter(item){
  if(!state.locationFilter)return true;
  if(!item.available||!item.data||!item.data.location)return !state.locationFilter;
  const loc=item.data.location;
  const f=state.locationFilter;
  if(f.state)return loc.country===f.country&&loc.state===f.state;
  return loc.country===f.country;
}

// ===== SEARCH =====
// Words too common to be useful as search terms.
const SEARCH_STOP=new Set("a an the of to in on for and or with at by is are be do does should i my we you it this that what when where how near not no use using need want can could would there then than into onto over under through via as if it's".split(' '));
// Bridge between the words a searcher types and the words an entry uses. Extend freely.
const SEARCH_SYN={
  rebar:'reinforcement bar',rebars:'reinforcement bar',bars:'bar reinforcement',
  mesh:'mat reinforcement',shutter:'formwork',shuttering:'formwork',form:'formwork',
  boundary:'boundary obstruction fence',fence:'fence obstruction boundary',wall:'wall upturn',
  falling:'fall',fell:'fall',reuse:'cycle reuse repeated',reusing:'cycle reuse repeated',
  pt:'post-tensioned',rc:'reinforced concrete',column:'column vertical',hole:'void opening penetration',
  gap:'clearance gap',spacing:'clearance spacing',pour:'pour placement placing',cure:'curing',
  cracking:'crack cracking',stirrups:'stirrup'
};
// Each meaningful word the user types becomes a "concept" group: the word plus its synonyms.
// An entry "covers" a concept if it matches any word in that group.
function searchConcepts(q){
  const raw=(q||'').toLowerCase().match(/[a-z0-9][a-z0-9\-]*/g)||[];
  const groups=[];
  raw.forEach(t=>{
    if(t.length<2||SEARCH_STOP.has(t))return;
    const variants=new Set([t]);
    (SEARCH_SYN[t]||'').split(' ').forEach(s=>{if(s)variants.add(s);});
    groups.push([...variants]);
  });
  return groups;
}
function matchesRegion(it,f){
  if(!f)return true;
  if(!it.data||!it.data.location)return false;
  const loc=it.data.location;
  // A state filter also surfaces country-level entries (per the framework's regional model).
  if(f.state)return loc.country===f.country&&(loc.state===f.state||!loc.state);
  return loc.country===f.country;
}
// Returns [text, weight, isSnippetSource] for each searchable field of an entry.
function entryFields(it,dim){
  const da=it.data||{};
  const thr=(da.thresholds||[]).map(t=>t.guidance||'').join(' ');
  const alts=(da.alternatives||[]).map(a=>typeof a==='string'?a:((a.title||'')+' '+(a.description||''))).join(' ');
  return [
    [cleanText(it.name),5,false],
    [cleanText(da.question||''),4,true],
    [cleanText((da.keywords||[]).join(' ')),4,false],
    [cleanText(da.parameter||''),2,true],
    [cleanText(da.background||''),2,true],
    [cleanText(dim.name),2,false],
    [cleanText(thr),1,true],
    [cleanText(alts),1,true],
    [cleanText(locLabel(da.location)),1,false]
  ];
}
function runSearch(q){
  const groups=searchConcepts(q);
  if(!groups.length)return [];
  const flat=[...new Set(groups.flat())];
  const reOf={}; flat.forEach(t=>reOf[t]=new RegExp('\\b'+escRe(t)));
  // Pass 1: collect candidate entries and document frequency for each term.
  const docs=[]; const df={}; flat.forEach(t=>df[t]=0);
  dimensions.forEach(dim=>dim.items.forEach(it=>{
    if(!it.available||!it.data)return;
    if(!matchesRegion(it,searchRegion))return;
    const fields=entryFields(it,dim).map(f=>[f[0].toLowerCase(),f[1],f[2],f[0]]); // [low,weight,isSrc,orig]
    const combined=fields.map(f=>f[0]).join(' ');
    flat.forEach(t=>{if(reOf[t].test(combined))df[t]++;});
    docs.push({it,dim,fields});
  }));
  const N=docs.length||1;
  // IDF: a term in few entries (e.g. "stirrup") counts far more than a common one (e.g. "wall").
  const idf={}; flat.forEach(t=>idf[t]=Math.log(1+N/(1+df[t])));
  // Pass 2: score each entry by its best match per concept, weighted by field and rarity.
  const matched=[];
  docs.forEach(({it,dim,fields})=>{
    let score=0,coverage=0;
    groups.forEach(group=>{
      let best=0;
      group.forEach(t=>{
        fields.forEach(([low,fw])=>{if(reOf[t].test(low)){const v=fw*idf[t];if(v>best)best=v;}});
      });
      if(best>0){score+=best;coverage++;}
    });
    if(coverage>0)matched.push({dimId:dim.id,id:it.id,name:it.name,dimName:dim.name,dimIcon:dim.icon,
      location:it.data.location||null,evidenceSupport:it.data.evidenceSupport||null,dateReviewed:it.data.dateReviewed||it.data.dateAdded||'',coverage,score,snippet:buildSnippet(fields,flat)});
  });
  if(!matched.length)return [];
  matched.sort((a,b)=>b.score-a.score||b.coverage-a.coverage);
  // Relevance floor: drop entries scoring well below the best match (keep the top one always).
  const top=matched[0].score;
  return matched.filter((r,i)=>i===0||r.score>=top*0.30);
}
function buildSnippet(fields,terms){
  const res=terms.map(t=>new RegExp('\\b'+escRe(t)));
  for(const [low,w,isSrc,orig] of fields){
    if(!isSrc||!orig)continue;
    let pos=-1;
    res.forEach(re=>{const m=re.exec(low);if(m&&(pos<0||m.index<pos))pos=m.index;});
    if(pos<0)continue;
    const start=Math.max(0,pos-60),end=Math.min(orig.length,pos+100);
    const s=(start>0?'… ':'')+orig.slice(start,end).trim()+(end<orig.length?' …':'');
    return highlightTerms(escHtml(s),terms);
  }
  return '';
}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTerms(text,terms){
  let out=text;
  [...terms].sort((a,b)=>b.length-a.length).forEach(t=>{
    out=out.replace(new RegExp('\\b('+escRe(t)+')','ig'),'<span class="search-hl">$1</span>');
  });
  return out;
}
function escAttr(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
// --- snippet text hygiene: entry fields contain HTML (<br>,<em>,<strong>) + entities ---
function stripTags(s){return (s||'').replace(/<[^>]*>/g,' ');}
const SEARCH_ENT={'&nbsp;':' ','&amp;':'&','&lt;':'<','&gt;':'>','&mdash;':'\u2014','&ndash;':'\u2013','&le;':'\u2264','&ge;':'\u2265','&times;':'\u00d7','&deg;':'\u00b0','&rsquo;':'\u2019','&lsquo;':'\u2018','&prime;':'\u2032','&radic;':'\u221a','&ouml;':'\u00f6'};
function decodeEnt(s){return (s||'').replace(/&[a-z]+;|&#\d+;/g,m=>SEARCH_ENT[m]||m);}
function cleanText(s){return decodeEnt(stripTags(s)).replace(/\s+/g,' ').trim();}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function searchRegionOptions(){
  const locs=new Map();
  dimensions.forEach(dim=>dim.items.forEach(it=>{
    if(it.available&&it.data&&it.data.location){
      const l=it.data.location;
      if(!locs.has(l.country))locs.set(l.country,new Set());
      if(l.state)locs.get(l.country).add(l.state);
    }
  }));
  let opts='<option value="">All regions</option>';
  for(const [country,states] of locs){
    const csel=searchRegion&&searchRegion.country===country&&!searchRegion.state?'selected':'';
    opts+=`<option value="${country}" ${csel}>${country}</option>`;
    for(const st of [...states].sort()){
      const ssel=searchRegion&&searchRegion.country===country&&searchRegion.state===st?'selected':'';
      opts+=`<option value="${country}|${st}" ${ssel}>&nbsp;&nbsp;${st}, ${country}</option>`;
    }
  }
  return opts;
}
function renderSearchResults(){
  const q=searchQuery.trim();
  if(!q)return '';
  const res=runSearch(q);
  if(!res.length){
    return `<div class="search-empty"><div class="search-empty-title">No entries match “${escAttr(q)}”${searchRegion?' in this region':''}.</div><div class="search-empty-sub">Try fewer or different words${searchRegion?', widen the region,':''} or browse the dimensions below. If the framework doesn't cover this yet, you can <span class="search-empty-link" onclick="goSuggest()">suggest a new entry</span>.</div></div>`;
  }
  const rows=res.map(r=>{const support=r.evidenceSupport?evidenceSupportPill({evidenceSupport:r.evidenceSupport}):'';const supportRow=support?`<div class="search-result-meta">${support}</div>`:'';const reviewed=r.dateReviewed?`<div class="item-meta">Reviewed ${r.dateReviewed}</div>`:'';const right=`<div style="text-align:right;flex-shrink:0"><div class="item-arrow">→</div>${reviewed}</div>`;return `<div class="item-row available search-result" onclick="goEntry('${r.dimId}','${r.id}')"><div class="search-result-main"><div class="search-result-top"><span class="item-name">${escHtml(r.name)}</span><span class="related-dim"><span class="ico">${r.dimIcon}</span>${escHtml(r.dimName)}</span>${r.location?locTag(r.location):''}</div>${r.snippet?`<div class="search-snippet">${r.snippet}</div>`:''}${supportRow}</div>${right}</div>`}).join('');
  return `<div class="search-count">${res.length} ${res.length===1?'entry':'entries'} found</div><div class="item-list search-list">${rows}</div>`;
}
function onSearchInput(v){
  searchQuery=v;
  const has=v.trim().length>0;
  const panel=document.getElementById('search-results');if(panel)panel.innerHTML=renderSearchResults();
  const grid=document.getElementById('dim-grid-wrap');if(grid)grid.style.display=has?'none':'';
  const clr=document.getElementById('search-clear');if(clr)clr.style.display=v?'flex':'none';
  const reg=document.getElementById('search-region-wrap');if(reg)reg.style.display=has?'flex':'none';
}
function onSearchRegion(v){
  if(!v)searchRegion=null;
  else if(v.includes('|')){const[c,s]=v.split('|');searchRegion={country:c,state:s};}
  else searchRegion={country:v};
  const panel=document.getElementById('search-results');if(panel)panel.innerHTML=renderSearchResults();
}
function clearSearch(){
  searchQuery='';searchRegion=null;
  const inp=document.getElementById('search-input');if(inp){inp.value='';inp.focus();}
  const reg=document.getElementById('search-region');if(reg)reg.value='';
  onSearchInput('');
}
// ===== SUGGEST A NEW ENTRY (homepage / dimension pages) =====
// NOTE: `base` must be the NEW Submission form's PUBLIC /viewform URL.
// Until that's supplied it falls back to the old suggest form below.
// To enable dimension pre-fill, set `dimField` to the dimension question's
// entry ID (from a "Get pre-filled link" with a dimension selected). The
// dimOptions labels MUST match the form's dropdown text exactly.
const SUBMIT={
  base:'https://docs.google.com/forms/d/e/1FAIpQLSdRkltPd-q5WRI_QFTWrsY-EGn0QlG2uf9zQtB_lYyQhSlq-Q/viewform',
  dimField:'entry.794898151', // dimension dropdown — prefill value must match option text exactly
  dimOptions:{
    methods:'Construction Methods',
    detailing:'Detailing',
    logistics:'Logistics',
    safety:'Safety in Design',
    communication:'Design Communication'
  }
};
function submitFormUrl(dimId){
  let url=SUBMIT.base;
  if(dimId&&SUBMIT.dimField&&SUBMIT.dimOptions[dimId]){
    const sep=url.includes('?')?'&':'?usp=pp_url&';
    url+=sep+SUBMIT.dimField+'='+encodeURIComponent(SUBMIT.dimOptions[dimId]);
  }
  return url;
}
// goSuggest opens the in-app guidance panel first (optionally noting a dimension);
// the panel's Continue button is what actually opens the Google Form.
function goSuggest(dimId){showSuggestPanel(dimId);}
function openSuggestForm(dimId){closeSuggestPanel();window.open(submitFormUrl(dimId),'_blank');}
function firstExampleEntry(){
  for(const dm of dimensions){for(const it of dm.items){if(it.available&&it.data)return{dimId:dm.id,id:it.id,name:it.name};}}
  return null;
}
function openExampleEntry(){const ex=firstExampleEntry();if(ex)window.open(entryUrl(ex.dimId,ex.id),'_blank');}
function closeSuggestPanel(){const m=document.querySelector('.modal-overlay');if(m)m.remove();}
function showSuggestPanel(dimId){
  closeSuggestPanel();
  const dimName=dimId&&dimensions.find(d=>d.id===dimId);
  const dimNote=dimName?`<div class="modal-dim">This suggestion will be filed under <strong>${dimName.name}</strong>.${SUBMIT.dimField?' The form opens with that dimension already selected.':''}</div>`:'';
  const ex=firstExampleEntry();
  const exampleLine=ex?`<li>Not sure how an entry should look? <span class="modal-link" onclick="openExampleEntry()">See an example entry</span> (opens in a new tab).</li>`:'';
  const notSureLine=dimId?'':`<li><strong>Not sure which dimension?</strong> Choose “Not sure” and do your best with everything else — a reviewer will place it in the right dimension by root cause.</li>`;
  const dimArg=dimId?`'${dimId}'`:'';
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.onclick=closeSuggestPanel;
  overlay.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Before you suggest an entry</div>
    ${dimNote}
    <div class="modal-body">
      <p>A good entry is a <strong>specific, design-stage issue that can be checked from drawings, specifications or design decisions</strong> — not a broad topic. For example: “drip grooves on exposed soffit edges”, not “waterproofing”.</p>
      <ul>
        <li>Choose the dimension by the <strong>root cause</strong> of the issue, not just where the problem shows up on site.</li>
        ${notSureLine}
        <li><strong>De-identify everything.</strong> No project, company, client or designer names, site addresses or title blocks — in text or images.</li>
        <li>You don't need every field. <strong>Submit what you know</strong>; the framework team reviews, edits and structures each entry before publishing.</li>
        ${exampleLine}
      </ul>
      <p class="modal-fineprint">Submissions are reviewed before publishing and, if used, released under the framework's CC BY-SA licence.</p>
    </div>
    <div class="modal-actions">
      <button class="entry-btn" onclick="closeSuggestPanel()">Cancel</button>
      <button class="entry-btn primary" onclick="openSuggestForm(${dimArg})">Continue to the form →</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

// ===== PRE-FILLED FORMS (per-entry comment / edit) =====
// Field IDs come from each form's "Get pre-filled link". nameField = Entry name,
// linkField = Entry link (a deep link to the entry, which embeds the stable id
// after the # — this is the rename-proof reference the review tool reads back).
const FORMS={
  comment:{
    base:'https://docs.google.com/forms/d/e/1FAIpQLScAywdw3JvZLIvUXrrGGxKNk60BZGkV3s5Mtx_QsEsZkI0WGw/viewform',
    nameField:'entry.1274016018',
    linkField:'entry.981497976'
  },
  edit:{
    base:'https://docs.google.com/forms/d/e/1FAIpQLSdTRRqO41OKp3Lxwz5CqVHL-B7IpAhitqnGqBWXYl1lmtizZA/viewform',
    nameField:'entry.528194579',
    linkField:'entry.1843851936'
  }
};
// Canonical public deep link to an entry (strips a trailing index.html so it
// matches the GitHub Pages directory URL; the #dimId/id hash drives routing).
function entryUrl(dimId,id){
  const base=(location.origin+location.pathname).replace(/index\.html$/,'');
  return base+'#'+dimId+'/'+id;
}


// ===== REVIEW LIST =====
const REVIEW_LIST_KEY='constructabilityReviewList.v1';
const DEFAULT_REVIEW_PURPOSE='This checklist contains constructability framework entries selected for review on this project. Each item is a design-stage prompt, not a compliance assessment or formal sign-off. Open the full entry for thresholds, applicability, recommended actions and evidence.';
function defaultReviewList(){return {name:'',purpose:DEFAULT_REVIEW_PURPOSE,ids:[],updated:''};}
function getReviewList(){
  try{
    const parsed=JSON.parse(localStorage.getItem(REVIEW_LIST_KEY));
    if(!parsed)return defaultReviewList();
    // Legacy support if an early prototype stored only an array of ids.
    if(Array.isArray(parsed))return {name:'',purpose:DEFAULT_REVIEW_PURPOSE,ids:parsed,updated:''};
    return {name:parsed.name||'',purpose:(parsed.purpose!==undefined?parsed.purpose:DEFAULT_REVIEW_PURPOSE),ids:Array.isArray(parsed.ids)?parsed.ids:[],updated:parsed.updated||''};
  }catch(e){return defaultReviewList();}
}
function saveReviewList(list){
  const cleanIds=[...new Set((list.ids||[]).filter(Boolean))];
  const clean={name:list.name||'',purpose:(list.purpose!==undefined?list.purpose:DEFAULT_REVIEW_PURPOSE),ids:cleanIds,updated:new Date().toISOString().slice(0,10)};
  localStorage.setItem(REVIEW_LIST_KEY,JSON.stringify(clean));
  return clean;
}
function reviewCount(){return getReviewList().ids.length;}
function isInReviewList(id){return getReviewList().ids.includes(id);}
function setReviewListName(v){const list=getReviewList();list.name=v;saveReviewList(list);}
function setReviewListPurpose(v){const list=getReviewList();list.purpose=v;saveReviewList(list);}
function addToReviewList(id){const list=getReviewList();if(!list.ids.includes(id))list.ids.push(id);saveReviewList(list);render();}
function removeFromReviewList(id){const list=getReviewList();list.ids=list.ids.filter(x=>x!==id);saveReviewList(list);render();}
function toggleReviewList(id){isInReviewList(id)?removeFromReviewList(id):addToReviewList(id);}
function goReviewList(){window.location.hash='review-list';}
function resolveEntryId(id){
  for(const dim of dimensions){
    const item=dim.items.find(it=>it.id===id);
    if(item&&item.available&&item.data)return {dim,item,data:item.data};
  }
  return null;
}
function reviewItems(){return getReviewList().ids.map(id=>resolveEntryId(id)).filter(Boolean);}
function reviewItemButton(id){
  const added=isInReviewList(id);
  return `<button class="entry-btn entry-top-review-btn ${added?'added':''}" onclick="toggleReviewList('${id}')"><span class="ico">${added?'✓':'＋'}</span> ${added?'Remove entry from review list':'Add entry to review list'}</button>`;
}
function copyTextFallback(text){
  const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');alert('Checklist copied to clipboard.');}catch(e){alert('Could not copy automatically. The checklist text will open in a prompt.');prompt('Copy checklist:',text);}
  ta.remove();
}
function reviewExportRows(){
  return reviewItems().map(({dim,item,data})=>({
    title:cleanText(item.name),
    dimension:cleanText(dim.name),
    question:cleanText(data.question||''),
    parameter:cleanText(data.parameter||''),
    url:entryUrl(dim.id,item.id)
  }));
}
function reviewExportTitle(){
  const list=getReviewList();
  return list.name&&list.name.trim()?cleanText(list.name.trim()):'Untitled review list';
}
function reviewExportDate(){return new Date().toISOString().slice(0,10);}
function reviewExportPurpose(){const p=(getReviewList().purpose||'').trim();return cleanText(p||DEFAULT_REVIEW_PURPOSE);}
function safeFileName(name,ext){
  const base=(name||'constructability-review-checklist').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,70)||'constructability-review-checklist';
  return base+'.'+ext;
}
function buildReviewChecklistText(){
  const rows=reviewExportRows();
  const title=reviewExportTitle();
  const parts=[
    `Constructability Review Checklist`,
    ``,
    `Project/list: ${title}`,
    `Generated: ${reviewExportDate()}`,
    `Selected entries: ${rows.length}`,
    ``,
    `Purpose: ${reviewExportPurpose()}`,
    ``
  ];
  rows.forEach((r,i)=>{
    parts.push(`${i+1}. [ ] ${r.title}`);
    parts.push(`Dimension: ${r.dimension}`);
    parts.push(`Review question: ${r.question}`);
    parts.push(`Design parameter: ${r.parameter}`);
    parts.push(`Framework entry: ${r.url}`);
    parts.push(``);
  });

}

function copyReviewChecklist(){
  if(!reviewItems().length){alert('Your review list is empty.');return;}
  const text=buildReviewChecklistText();
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>alert('Review checklist copied to clipboard.')).catch(()=>copyTextFallback(text));}
  else copyTextFallback(text);
}
function downloadTextFile(filename,text,mime){
  const blob=new Blob([text],{type:mime||'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},0);
}
function downloadReviewMarkdown(){
  if(!reviewItems().length){alert('Your review list is empty.');return;}
  downloadTextFile(safeFileName(reviewExportTitle(),'md'),buildReviewChecklistMarkdown(),'text/markdown;charset=utf-8');
}
function pdfTextClean(s){
  return cleanText(s||'').replace(/[“”]/g,'"').replace(/[‘’]/g,"'").replace(/[–—]/g,'-').replace(/≤/g,'<=').replace(/≥/g,'>=').replace(/×/g,'x').replace(/°/g,' deg').replace(/…/g,'...').replace(/[^\x09\x0A\x0D\x20-\x7E]/g,'');
}
function pdfEscape(s){return pdfTextClean(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');}
function makePdf(lines,annotations){
  const enc=new TextEncoder();
  const objects=[];
  function obj(s){objects.push(s);return objects.length;}
  obj('<< /Type /Catalog /Pages 2 0 R >>');
  obj('PAGES_PLACEHOLDER');
  const font1=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
  const font2=obj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
  const pageIds=[];
  const contentByPage=new Map();
  lines.forEach(l=>{if(!contentByPage.has(l.page))contentByPage.set(l.page,[]);contentByPage.get(l.page).push(l);});
  const annByPage=new Map();
  annotations.forEach(a=>{if(!annByPage.has(a.page))annByPage.set(a.page,[]);annByPage.get(a.page).push(a);});
  const pageCount=Math.max(...lines.map(l=>l.page),0)+1;
  for(let p=0;p<pageCount;p++){
    const annIds=[];
    (annByPage.get(p)||[]).forEach(a=>{
      const w=Math.max(80,Math.min(495,(a.text||'').length*5.2));
      annIds.push(obj(`<< /Type /Annot /Subtype /Link /Rect [${a.x} ${a.y-3} ${a.x+w} ${a.y+11}] /Border [0 0 0] /A << /S /URI /URI (${pdfEscape(a.url)}) >> >>`));
    });
    const stream=(contentByPage.get(p)||[]).map(l=>{
      const f=l.bold?'/F2':'/F1';
      const colour=l.color?`${l.color} rg `:'';
      const textOp=`BT ${f} ${l.size} Tf 1 0 0 1 ${l.x.toFixed(1)} ${l.y.toFixed(1)} Tm (${pdfEscape(l.text)}) Tj ET`;
      const w=Math.max(20,Math.min(495,(l.text||'').length*l.size*0.48));
      const underline=l.underline?`\nq ${l.color||'0 0 0'} RG 0.7 w ${l.x.toFixed(1)} ${(l.y-2).toFixed(1)} m ${(l.x+w).toFixed(1)} ${(l.y-2).toFixed(1)} l S Q`:'';
      return l.color?`q ${colour}${textOp} Q${underline}`:`${textOp}${underline}`;
    }).join('\n');
    const contentId=obj(`<< /Length ${enc.encode(stream).length} >>\nstream\n${stream}\nendstream`);
    const annotsStr=annIds.length?` /Annots [${annIds.map(id=>id+' 0 R').join(' ')}]`:'';
    const pageId=obj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 ${font1} 0 R /F2 ${font2} 0 R >> >> /Contents ${contentId} 0 R${annotsStr} >>`);
    pageIds.push(pageId);
  }
  objects[1]=`<< /Type /Pages /Kids [${pageIds.map(id=>id+' 0 R').join(' ')}] /Count ${pageIds.length} >>`;
  let pdf='%PDF-1.4\n';
  const offsets=[0];
  objects.forEach((o,i)=>{offsets[i+1]=enc.encode(pdf).length;pdf+=`${i+1} 0 obj\n${o}\nendobj\n`;});
  const xref=enc.encode(pdf).length;
  pdf+=`xref\n0 ${objects.length+1}\n0000000000 65535 f \n`;
  for(let i=1;i<=objects.length;i++)pdf+=String(offsets[i]).padStart(10,'0')+' 00000 n \n';
  pdf+=`trailer\n<< /Size ${objects.length+1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
  return new Blob([enc.encode(pdf)],{type:'application/pdf'});
}
function downloadReviewPdf(){
  const rows=reviewExportRows();
  if(!rows.length){alert('Your review list is empty.');return;}
  const lines=[],ann=[];
  const margin=50,bottom=52,width=495;
  let page=0,y=792;
  function newPage(){page++;y=792;}
  function addLine(text,size=10,bold=false,indent=0,gap=14,linkUrl='',opts={}){
    if(y<bottom+gap)newPage();
    const x=margin+indent;
    lines.push({page,x,y,text,size,bold,color:opts.color||'',underline:!!opts.underline});
    if(linkUrl)ann.push({page,x,y,text,url:linkUrl});
    y-=gap;
  }
  function wrap(text,size=10,indent=0){
    const maxChars=Math.max(24,Math.floor((width-indent)/(size*0.48)));
    const words=pdfTextClean(text).split(/\s+/).filter(Boolean);
    const out=[];let cur='';
    words.forEach(w=>{if((cur+' '+w).trim().length>maxChars){if(cur)out.push(cur);cur=w;}else cur=(cur+' '+w).trim();});
    if(cur)out.push(cur);
    return out;
  }
  function addWrapped(label,text,size=10,indent=0){
    if(label)addLine(label,size,true,indent,13);
    wrap(text,size,indent).forEach(l=>addLine(l,size,false,indent,13));
    y-=4;
  }
  addLine('Constructability Review Checklist',18,true,0,24);
  addLine('Project/list: '+reviewExportTitle(),11,true,0,16);
  addLine('Generated: '+reviewExportDate()+'    Selected entries: '+rows.length,10,false,0,18);
  addWrapped('Purpose',reviewExportPurpose(),10,0);
  y-=4;
  rows.forEach((r,i)=>{
    if(y<165)newPage();
    addLine((i+1)+'. [ ] '+r.title,13,true,0,18);
    addLine('Dimension: '+r.dimension,10,false,14,14);
    addWrapped('Review question:',r.question,10,14);
    addWrapped('Design parameter:',r.parameter,10,14);
    addLine('Open full framework entry',10,false,14,18,r.url,{color:'0 0.25 0.85',underline:true});
    y-=8;
  });
  const blob=makePdf(lines,ann);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=safeFileName(reviewExportTitle(),'pdf');
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},0);
}

// ===== LOAD DATA =====
async function loadData(){
  try{
    const resp=await fetch('data.json');
    const data=await resp.json();
    dimensions=data.dimensions;
    guide=data.guide||null;
    // Safety net: guarantee every entry has a unique id even if one was omitted in data.json.
    const seenIds=new Set();
    dimensions.forEach(dim=>dim.items.forEach(it=>{
      if(!it.id)it.id=slugify(it.name);
      let base=it.id,n=2;
      while(seenIds.has(it.id)){it.id=base+'-'+n;n++;}
      seenIds.add(it.id);
    }));
  }catch(e){
    document.getElementById('app').innerHTML='<div class="content" style="text-align:center;padding-top:80px;color:var(--red)">Error loading framework data. Make sure data.json is in the same folder as this file.</div>';
  }
}

// ===== EVIDENCE SUPPORT INDEX =====
function allAvailableEntries(){
  const out=[];
  dimensions.forEach(dim=>dim.items.forEach(it=>{
    if(it.available&&it.data){out.push({dim,item:it,data:it.data});}
  }));
  return out;
}
function evidenceSupportCounts(){
  const counts={all:0,high:0,medium:0,low:0};
  allAvailableEntries().forEach(e=>{
    const level=evidenceSupportLevel(e.data);
    counts.all++;
    if(counts[level]!==undefined)counts[level]++;
  });
  return counts;
}
function setEvidenceFilter(level){state.evidenceFilter=level||'all';render();}
function renderEvidenceSupportView(){
  const counts=evidenceSupportCounts();
  const active=state.evidenceFilter||'all';

      html+=gAnatomyBlock(3,f[2],`<div class="label">Design Guidance</div><div class="threshold-list" style="margin-top:10px;margin-bottom:0">${gThresholds(ad,false)}</div>`);
      html+=gAnatomyBlock(4,f[3],gApplicability(ad));
      html+=gAnatomyBlock(5,f[4],`<div class="label">Recommended Actions</div><div class="alt-list" style="margin-top:10px;margin-bottom:0">${gActions(ad)}</div>`);
      html+=`<div class="guide-more">${a.moreFields} ${found?`<span class="guide-link" onclick="goEntry('${found.dim.id}','${found.item.id}')">Open the full entry →</span>`:''}</div>`;
    }else{
      html+=`<p class="guide-sub">Reference entry not found in data.json.</p>`;
    }
  }

  // condition -> band -> response trace
  if(g.trace){
    const steps=g.trace.steps.map((s,i)=>`<div class="trace-step" style="${s.color?`background:${bgVar(s.color)};border-color:${colorVar(s.color)}66`:''}"><div class="trace-step-label">${s.label}</div><div class="trace-step-value" style="${s.color?`color:${colorVar(s.color)}`:''}">${s.value}</div><div class="trace-step-sub">${s.sub}</div></div>${i<g.trace.steps.length-1?'<div class="trace-arrow">→</div>':''}`).join('');
    html+=`<div class="label" style="margin-top:36px">${g.trace.title}</div><p class="guide-sub">${g.trace.intro}</p><div class="trace-flow">${steps}</div>`;
  }

  // Project review list workflow
  if(g.projectReview){
    const pr=g.projectReview;
    const steps=(pr.steps||[]).map((s,i)=>`<div class="trace-step"><div class="trace-step-label">${s.label}</div><div class="trace-step-value">${s.value}</div><div class="trace-step-sub">${s.sub}</div></div>${i<(pr.steps||[]).length-1?'<div class="trace-arrow">→</div>':''}`).join('');
    html+=`<div class="label" style="margin-top:36px">${pr.title}</div><p class="guide-sub">${pr.intro}</p><div class="trace-flow">${steps}</div>${pr.note?`<div class="guide-more">${pr.note}</div>`:''}`;
  }

  // The parameter takes different shapes (numeric / categorical / qualitative)
  if(g.shapes){
    const cards=g.shapes.items.map(s=>{
      const found=findEntryById(s.entryRef.id),sd=found?found.item.data:null;
      return `<div class="shape-card"><div class="shape-tag">${s.shape}</div><div class="shape-param">${sd?sd.parameter:''}</div><div class="shape-desc">${s.desc}</div><div class="threshold-list shape-thresholds">${sd?gThresholds(sd,true):''}</div>${found?`<div class="shape-link" onclick="goEntry('${found.dim.id}','${found.item.id}')">See full entry →</div>`:''}</div>`;
    }).join('');
    html+=`<div class="label" style="margin-top:36px">${g.shapes.title}</div><p class="guide-sub">${g.shapes.intro}</p><div class="shape-grid">${cards}</div>`;
  }

  // Contribution pathways
  if(g.contributing){
    const c=g.contributing;
    const cards=(c.items||[]).map(it=>`<div class="dimension-guide-card"><div class="dimension-guide-label">${it.label}</div><div class="dimension-guide-text">${it.text}</div></div>`).join('');
    html+=`<div class="label" style="margin-top:36px">${c.title}</div><p class="guide-sub">${c.intro}</p><div class="dimension-guide-grid">${cards}</div>${c.note?`<div class="guide-more">${c.note}</div>`:''}`;
  }

  // FAQ accordion
  if(g.faq){
    html+=`<div class="label" style="margin-top:36px">${g.faq.title}</div><div class="faq-list">${g.faq.items.map((f,i)=>`<div class="faq-item"><div class="faq-q" onclick="toggleFaq(${i})"><span>${f.q}</span><span class="faq-chevron" id="faq-chev-${i}">+</span></div><div class="faq-a" id="faq-a-${i}">${f.a}</div></div>`).join('')}</div>`;
  }

  return `<div class="content animate-in">${html}</div>`;
}

function renderDimensionView(){
  const dim=getDim();
  
  // Build location filter options
  const locs=getLocations(dim);
  let filterHtml='';
  if(locs.size>0){
    let opts='<option value="">All regions</option>';
    for(const [country,states] of locs){
      opts+=`<option value="${country}" ${state.locationFilter&&state.locationFilter.country===country&&!state.locationFilter.state?'selected':''}>${country}</option>`;
      for(const st of [...states].sort()){
        const val=`${country}|${st}`;
        opts+=`<option value="${val}" ${state.locationFilter&&state.locationFilter.state===st?'selected':''}>&nbsp;&nbsp;${st}, ${country}</option>`;
      }
    }
    const matchCount=dim.items.filter(item=>itemMatchesFilter(item)).length;
    const totalAvail=dim.items.filter(item=>item.available).length;
    const countText=state.locationFilter?`Showing ${matchCount} of ${totalAvail} entries`:'';
    filterHtml=`<div class="loc-filter"><div class="loc-filter-label">Region</div><select onchange="setLocationFilter(this.value)">${opts}</select><div class="loc-filter-count">${countText}</div></div>`;
  }

  const items=dim.items.map((item,i)=>{
    const matches=itemMatchesFilter(item);
    const hidden=state.locationFilter&&!matches&&item.available?'style="display:none"':'';
    const cls=item.available?'item-row available':'item-row unavailable';
    const onclick=item.available?`onclick="goEntry('${dim.id}','${item.id}')"`:'';
    const loc=item.available&&item.data&&item.data.location?locTag(item.data.location):'';
    const right=item.available?`<div style="text-align:right"><div class="item-arrow">→</div>${item.data?`<div class="item-meta">Reviewed ${item.data.dateReviewed || item.data.dateAdded}</div>`:''}</div>`:'<div class="item-coming">Coming soon</div>';
    const support=item.available&&item.data?evidenceSupportPill(item.data):'';
    const meta=item.available&&item.data?`<div class="item-meta">Parameter: ${item.data.parameter}</div>${support?`<div class="item-meta" style="margin-top:8px">${support}</div>`:''}`:'';
    return `<div class="${cls}" ${onclick} ${hidden}><div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div class="item-name">${item.name}</div>${loc}</div>${meta}</div>${right}</div>`;
  }).join('');

  let guidanceHtml='';
  if(dim.generalGuidance&&dim.generalGuidance.length>0){
    guidanceHtml=`<div style="margin-top:20px;margin-bottom:24px;padding:18px 22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;"><div class="label" style="margin-bottom:10px">General Guidance</div>${dim.generalGuidance.map(g=>`<div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;"><div style="color:var(--accent);font-size:14px;margin-top:1px;flex-shrink:0;">•</div><div style="font-size:13px;color:var(--text);line-height:1.6;opacity:0.9;">${g}</div></div>`).join('')}</div>`;
  }

  return `<div class="content animate-in"><div class="back-link" onclick="goHome()">← Back to dimensions</div><div class="dim-header"><span class="dim-header-icon">${dim.icon}</span><h1 class="dim-header-title">${dim.name}</h1></div><p class="section-desc">${dim.description}</p>${guidanceHtml}${filterHtml}<div class="label">Entries</div><div class="item-list">${items}</div><div class="suggest-banner" onclick="goSuggest('${dim.id}')"><div class="suggest-banner-text"><div class="suggest-banner-title">Missing something in ${dim.name}?</div><div class="suggest-banner-sub">Suggest a new entry for this dimension — the form opens filed under ${dim.name}.</div></div><div class="suggest-banner-btn">Suggest an entry →</div></div></div>`;
}

// Renders approved comments stored on the entry (d.comments). Tolerant of missing
// fields: name defaults to "Anonymous"; role, date, region, verified are optional.
function renderComments(d){
  const cs=(d.comments||[]).filter(c=>c&&c.body);
  if(!cs.length)return '';
  const cards=cs.map(c=>{
    const by=c.by||'Anonymous';
    const role=c.role?`<span class="comment-role">${c.role}</span>`:'';
    const verified=c.verified?`<span class="comment-verified" title="Verified by the maintainer">✓ verified</span>`:'';
    const date=c.date?`<span class="comment-date">${c.date}</span>`:'';
    const regionTxt=c.region?(typeof c.region==='string'?c.region:locTag(c.region)):'';
    const region=regionTxt?`<span class="comment-region">${regionTxt}</span>`:'';
    const regional=c.about&&/region/i.test(c.about)?`<span class="comment-flag">Regional</span>`:'';
    return `<div class="comment-card"><div class="comment-head"><span class="comment-by">${by}</span>${role}${verified}${regional}${date}${region}</div><div class="comment-body">${c.body}</div></div>`;
  }).join('');
  return `<div class="comments-section"><div class="label">Comments (${cs.length})</div>${cards}</div>`;
}

function renderEntryDetail(){
  const dim=getDim(),item=getItem();
  if(!dim||!item||!item.available||!item.data){
    return `<div class="content animate-in"><div class="back-link" onclick="goHome()">← Back to dimensions</div><p class="section-desc">Entry not found — it may have been renamed or removed. <span class="breadcrumb-link" onclick="goHome()">Return to the framework home →</span></p></div>`;
  }
  const d=item.data;

  const thresholds=d.thresholds.map(t=>`<div class="threshold-band" style="background:${bgVar(t.color)};border:1px solid ${colorVar(t.color)}33;"><div class="threshold-range" style="color:${colorVar(t.color)}">${t.range}</div><div style="flex:1"><div class="threshold-rating" style="color:${colorVar(t.color)}">${t.rating}</div><div class="threshold-guidance">${t.guidance}</div></div></div>`).join('');

  const alts=(d.alternatives||[]).filter(a=>a).map((a,i)=>{
    if(typeof a==='string'){
      return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text">${a}</div></div>`;
    }
    return `<div class="alt-item"><div class="alt-num">${i+1}</div><div class="alt-text"><div class="alt-title">${a.title}</div><div class="alt-desc">${a.description}</div></div></div>`;
  }).join('');

  const applicabilityHtml=d.applicability?`
    <div class="applicability-box">
      <div class="label" style="color:var(--yellow)">Applicability and Limitations</div>
      ${d.applicability.appliesWhere?`<div class="applicability-text"><strong>Applies where:</strong> ${d.applicability.appliesWhere}</div>`:''}
      ${d.applicability.checks&&d.applicability.checks.length>0?`
        <div class="applicability-text" style="margin-bottom:8px"><strong>Check before applying this guidance:</strong></div>
        <div class="applicability-list">
          ${d.applicability.checks.map(c=>`<div class="applicability-item"><strong>${c.title}:</strong> ${c.description}</div>`).join('')}
        </div>
      `:''}
      ${d.applicability.note?`<div class="applicability-text" style="margin-top:12px;margin-bottom:0"><strong>Note:</strong> ${d.applicability.note}</div>`:''}
    </div>
  `:'';

  const notesHtml=d.additionalNotes?`<div style="margin-top:12px;padding:12px 16px;background:var(--surface-light);border:1px solid var(--border);border-radius:6px;"><div style="font-size:10px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Note</div><div style="font-size:13px;color:var(--text);line-height:1.6;opacity:0.85;">${d.additionalNotes}</div></div>`:'';

  const workedExampleHtml=d.workedExample?(()=>{
    const we=d.workedExample;
    const tableHtml=we.tableHeaders&&we.tableRows?`<table class="worked-example-table"><thead><tr>${we.tableHeaders.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${we.tableRows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'';
    const assumptionsHtml=we.assumptions&&we.assumptions.length>0?`<div class="worked-example-assumptions"><div class="worked-example-assumptions-title">${we.assumptionsTitle||'How these numbers were derived'}</div><ul>${we.assumptions.map(a=>`<li>${a}</li>`).join('')}</ul>${we.assumptionsNote?`<div class="worked-example-assumptions-note">${we.assumptionsNote}</div>`:''}</div>`:'';
    return `<div class="worked-example-box"><div class="worked-example-title">${we.title||'Worked example'}</div>${we.caveat?`<div class="worked-example-caveat">${we.caveat}</div>`:''}${we.headline?`<div class="worked-example-headline">${we.headline}</div>`:''}${tableHtml}${we.howToUse?`<div class="worked-example-howto"><strong>How to use it:</strong> ${we.howToUse}</div>`:''}${assumptionsHtml}</div>`;
  })():'';

  const imgHint=`<div class="img-hint"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14zm.5-7v2H8v2H6V9H4V7h2V5h2v2z"/></svg> Click any image to enlarge</div>`;
  const examplesHtml=d.examples&&d.examples.length>0?`<div style="margin-top:28px"><div class="label">Examples</div>${imgHint}<div class="examples-grid${d.examples.length===1?' imgs-1':d.examples.length===2?' imgs-2':''}">${d.examples.map(ex=>`<div class="example-card">${ex.image?`<img src="${ex.image}" alt="${ex.caption}" onclick="openLightbox('${ex.image}')">`:''}<div class="example-caption"><div class="example-tag ${ex.tag}">${ex.tag==='concern'?'Concern':ex.tag==='acceptable'?'Acceptable':'Recommended'}</div><div class="example-desc">${ex.caption}</div></div></div>`).join('')}</div></div>`:'';

  const related=getRelatedEntries(item.id,d);
  const relatedHtml=related.length>0?`<div style="margin-top:28px"><div class="label">Related Entries</div><div class="related-list">${related.map(r=>`<div class="related-card" onclick="goEntry('${r.dimId}','${r.id}')"><div class="related-top"><div class="related-name-wrap"><span class="related-name">${r.name}</span><span class="related-dim"><span class="ico">${r.dimIcon}</span>${r.dimName}</span></div><div class="related-arrow">→</div></div>${r.note?`<div class="related-note">${r.note}</div>`:''}</div>`).join('')}</div></div>`:'';

  const supportingImagesHtml=d.supportingImages&&d.supportingImages.length>0?`<div style="margin-top:20px"><div class="label">Supporting Images</div>${imgHint}<div class="supporting-images-grid${d.supportingImages.length===1?' imgs-1':d.supportingImages.length===2?' imgs-2':''}">${d.supportingImages.map(sp=>`<div class="supporting-image-card">${sp.image?`<img src="${sp.image}" alt="${sp.title}" onclick="openLightbox('${sp.image}')">`:''}<div class="supporting-image-title">${sp.title}</div></div>`).join('')}</div></div>`:'';

  return `<div class="content animate-in">
    <div class="entry-topbar"><div class="back-link" onclick="goDimension('${dim.id}')">← Back to ${dim.name}</div>${reviewItemButton(item.id)}</div>
    <div class="entry-title">${item.name}</div>
    <div class="entry-meta">Dimension: ${dim.name} · Reinforced Concrete ${d.location?' · '+locTag(d.location):''}</div>
    <div class="question-box"><div class="label label-accent">Design Question</div><div class="question-text">${d.question}</div></div>
    ${d.background?`<div class="label">Background</div><div class="consideration-text">${d.background}</div>`:''}
    <div class="param-box"><div class="label">Design Parameter</div><div class="param-value">${d.parameter}</div></div>
    <div class="label">Design Guidance</div><div class="threshold-list" style="margin-top:10px">${thresholds}</div>
    ${notesHtml}
    ${workedExampleHtml}
    ${applicabilityHtml}
    ${alts.length>0?`<div class="label" style="margin-top:28px">Recommended Actions</div><div class="alt-list" style="margin-top:10px">${alts}</div>`:''}
    ${d.evidence?`<div class="evidence-box"><div class="label">Evidence Basis</div><div class="evidence-text">${d.evidence}</div></div>`:''}
    ${examplesHtml}
    ${supportingImagesHtml}
    ${relatedHtml}
    ${evidenceSupportBox(d)}
    ${renderComments(d)}
    <div class="entry-actions">
      <button class="entry-btn" onclick="goComment('${dim.id}','${item.id}')"><span class="ico">💬</span> Add a comment</button>
      <button class="entry-btn" onclick="goEditEntry('${dim.id}','${item.id}')"><span class="ico">✏️</span> Suggest a change</button>
      <div class="entry-actions-hint">A comment is a community note shown under this entry. Suggesting a change proposes an edit to the entry itself. Both are reviewed and de-identified before publishing — please don't include project, company, client, or designer names.</div>
    </div>
    <div class="date-stamp"><div><div class="date-label">Entry Added</div><div class="date-value">${d.dateAdded}</div></div><div><div class="date-label">Last Reviewed</div><div class="date-value">${d.dateReviewed}</div></div></div>
  </div>`;
}

// ===== LIGHTBOX =====
function openLightbox(src){const lb=document.createElement('div');lb.className='lightbox';lb.onclick=()=>lb.remove();lb.innerHTML=`<img src="${src}">`;document.body.appendChild(lb)}

// ===== HASH-BASED NAVIGATION =====
function goHome(){window.location.hash=''}
function goGuide(){window.location.hash='guide'}
function goEvidenceSupport(level){state.evidenceFilter=level||'all';window.location.hash='evidence-support';if(state.view==='evidence')render();}
function goDimension(id){state.locationFilter=null;window.location.hash=id}
function goEntry(dimId,id){window.location.hash=dimId+'/'+id}
function setLocationFilter(val){
  if(!val){state.locationFilter=null}
  else if(val.includes('|')){const[c,s]=val.split('|');state.locationFilter={country:c,state:s}}
  else{state.locationFilter={country:val}}
  render();
}

function parseHash(){
  const hash=window.location.hash.replace(/^#\/?/,'');
  if(!hash){state.view='home';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash==='guide'){state.view='guide';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash==='evidence-support'){state.view='evidence';state.dimId=null;state.itemId=null;state.locationFilter=null;if(!state.evidenceFilter)state.evidenceFilter='all';}
  else if(hash==='review-list'){state.view='review';state.dimId=null;state.itemId=null;state.locationFilter=null;}
  else if(hash.includes('/')){
    const[dimId,seg]=hash.split('/');
    const dim=dimensions.find(d=>d.id===dimId);
    let id=decodeURIComponent(seg||'');
    // Legacy support: old position-based links (e.g. #methods/3) still resolve.
    if(dim&&/^\d+$/.test(id)&&!dim.items.some(it=>it.id===id)){
      const byIndex=dim.items[parseInt(id,10)];
      if(byIndex)id=byIndex.id;
    }
    state.view='entry';state.dimId=dimId;state.itemId=id;
  }else{
    state.view='dimension';state.dimId=hash;state.itemId=null;state.locationFilter=null;
  }
}

window.addEventListener('hashchange',()=>{parseHash();render();window.scrollTo({top:0,left:0,behavior:'auto'});});

// ===== INIT =====
async function init(){
  await loadData();
  parseHash();
  render();
}
init();
</script>
